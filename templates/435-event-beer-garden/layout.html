<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#d97706; --ink:#2a1c08; --muted:#7c6a4a; --line:#f0e3c8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf8ec; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(160deg,#f59e0b,#d97706 60%,#b45309); color:#fff; border-radius:20px; padding:34px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(217,119,6,.24); }
    .ae-hero::after { content:"🍺 🍻 🍺 🍻 🍺 🍻 🍺 🍻"; position:absolute; bottom:10px; left:0; right:0; font-size:15px; letter-spacing:4px; opacity:.4; }
    .ae-hero .em { font-size:44px; margin-bottom:2px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:22px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-menu { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-menu .t { font-weight:700; font-size:14px; margin-bottom:12px; }
    .ae-m { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-m:first-of-type { border-top:0; } .ae-m .nm { display:flex; gap:8px; align-items:center; } .ae-m .pr { font-weight:800; color:var(--accent); }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🍺</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">7.1〜8.31 17:00–22:00</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">屋上テラス</div></div>
      <div class="ae-i"><div class="ic">🎟️</div><div class="k">プラン</div><div class="v">飲み放題あり</div></div>
    </div>
    <div class="ae-menu">
      <div class="t">こだわりのドリンク＆フード</div>
      <div class="ae-m"><span class="nm">🍺 クラフトビール 6種飲み比べ</span><span class="pr">¥2,200</span></div>
      <div class="ae-m"><span class="nm">🍹 サワー・カクテル飲み放題(90分)</span><span class="pr">¥2,000</span></div>
      <div class="ae-m"><span class="nm">🍗 BBQプレート＆おつまみ盛り</span><span class="pr">¥1,800</span></div>
    </div>
    <div class="ae-card">
      <div class="t">ご予約・席のリクエスト</div>
      <div class="d">団体プランや雨天対応のご相談も承ります</div>
      %%content%%
    </div>
  </div>
</body>
</html>
