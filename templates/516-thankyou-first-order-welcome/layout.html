<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#c2410c; --ink:#2a1810; --muted:#7c6155; --line:#f0e2d6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf6ef; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:20px; }
    .ae-done .em { font-size:56px; line-height:1; margin-bottom:8px; }
    .ae-done h1 { font-size:25px; margin:0 0 6px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-coupon { background:linear-gradient(135deg,#ea580c,#c2410c); color:#fff; border-radius:18px; padding:26px 22px; text-align:center; margin:22px 0 18px; position:relative; overflow:hidden; box-shadow:0 16px 36px rgba(194,65,12,.26); }
    .ae-coupon::after { content:""; position:absolute; right:-30px; top:-30px; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,.25),transparent 70%); }
    .ae-coupon .lab { font-size:13px; opacity:.95; } .ae-coupon .big { font-size:34px; font-weight:900; line-height:1.1; margin:2px 0; } .ae-coupon .sub { font-size:13px; opacity:.95; }
    .ae-coupon .code { display:inline-block; margin-top:12px; background:rgba(255,255,255,.18); border:1px dashed rgba(255,255,255,.6); border-radius:9px; padding:7px 16px; font-family:ui-monospace,Menlo,Consolas,monospace; font-weight:700; letter-spacing:2px; }
    .ae-perks { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:18px; box-shadow:0 8px 22px rgba(194,65,12,.05); }
    .ae-perks .t { font-weight:700; font-size:13px; margin-bottom:10px; }
    .ae-pk { display:flex; gap:11px; padding:7px 0; font-size:14px; } .ae-pk .e { font-size:18px; flex:0 0 auto; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="em">🎉</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-coupon">
      <div class="lab">次回使える 初回お礼クーポン</div>
      <div class="big">2回目 15%OFF</div>
      <div class="sub">またのご利用をお待ちしています</div>
      <div class="code">THANKS-15</div>
    </div>
    <div class="ae-perks">
      <div class="t">これからもよろしくお願いします</div>
      <div class="ae-pk"><span class="e">📦</span><span>発送が完了するとメールで追跡番号をお知らせします</span></div>
      <div class="ae-pk"><span class="e">🔁</span><span>気に入ったら「定期便」でいつでもお得に</span></div>
      <div class="ae-pk"><span class="e">💬</span><span>ご感想・レビューで次回ポイントプレゼント</span></div>
    </div>
    <div class="ae-card">
      <div class="t">お得情報・新商品のお知らせを受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
