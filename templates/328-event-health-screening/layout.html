<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2421; --muted:#5a746f; --line:#d7ece0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fbf8; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#14b8a6,#0d9488); color:#fff; text-align:center; padding:50px 20px 40px; }
    .ae-hero .em { font-size:48px; }
    .ae-hero h1 { font-size:27px; margin:6px 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:34px 20px 48px; }
    .ae-info { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; box-shadow:0 8px 22px rgba(13,148,136,.06); }
    .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:15px; }
    .ae-menu { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:24px; }
    .ae-menu .t { font-weight:700; text-align:center; margin-bottom:12px; }
    .ae-m { display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-m:first-of-type { border-top:0; }
    .ae-m .em { font-size:20px; } .ae-m .free { margin-left:auto; font-size:11px; font-weight:700; color:#16a34a; background:#dcfce7; padding:2px 10px; border-radius:999px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <div class="em">🩺</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-i"><div class="k">実施日</div><div class="v">10.18 (土) – 10.19 (日)</div></div>
      <div class="ae-i"><div class="k">会場</div><div class="v">市民健康プラザ</div></div>
      <div class="ae-i"><div class="k">対象</div><div class="v">20歳以上の地域住民</div></div>
      <div class="ae-i"><div class="k">所要時間</div><div class="v">約60分</div></div>
    </div>
    <div class="ae-menu">
      <div class="t">受けられる検査</div>
      <div class="ae-m"><span class="em">🩸</span><span>血液検査（生活習慣病チェック）</span><span class="free">無料</span></div>
      <div class="ae-m"><span class="em">🫀</span><span>血圧・心電図測定</span><span class="free">無料</span></div>
      <div class="ae-m"><span class="em">📊</span><span>体組成・骨密度測定</span><span class="free">無料</span></div>
      <div class="ae-m"><span class="em">👩‍⚕️</span><span>保健師による健康相談</span><span class="free">無料</span></div>
    </div>
    <div class="ae-card">
      <div class="t">受診のご予約</div>
      <div class="d">ご予約優先で待ち時間を短縮できます</div>
      %%content%%
    </div>
  </div>
</body>
</html>
