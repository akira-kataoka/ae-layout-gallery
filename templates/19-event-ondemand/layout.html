<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --dark:#1e1b34; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f3fb; line-height:1.7; }
    .ae-grid { max-width:1040px; margin:0 auto; padding:48px 20px; display:grid; grid-template-columns:1.1fr .9fr; gap:32px; align-items:center; }
    .ae-video { background:var(--dark); border-radius:16px; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; box-shadow:0 16px 44px rgba(30,27,52,.3); }
    .ae-video::before { content:""; position:absolute; inset:0; background:radial-gradient(circle at 50% 50%,rgba(124,58,237,.5),transparent 60%); }
    .ae-play { width:72px; height:72px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; }
    .ae-play::after { content:""; border-left:22px solid var(--accent); border-top:14px solid transparent; border-bottom:14px solid transparent; margin-left:6px; }
    .ae-form h1 { margin:0 0 8px; font-size:26px; }
    .ae-form > p { color:var(--muted); margin:0 0 20px; }
    .ae-card { background:#fff; border-radius:16px; box-shadow:0 8px 28px rgba(124,58,237,.10); padding:28px 26px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
    @media (max-width:820px){ .ae-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-grid">
    <div class="ae-video"><div class="ae-play"></div></div>
    <div class="ae-form">
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      <div class="ae-card">%%content%%</div>
    </div>
  </div>
</body>
</html>
