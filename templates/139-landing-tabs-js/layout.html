<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    :root { --accent:#2563eb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f8fc; line-height:1.7; }
    .ae-head { text-align:center; padding:48px 20px 8px; }
    .ae-head h1 { font-size:28px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-tabs { max-width:760px; margin:24px auto 0; padding:0 20px; }
    .ae-tabnav { display:flex; gap:6px; background:#fff; border:1px solid var(--line); border-radius:12px; padding:6px; }
    .ae-tabnav button { flex:1; border:0; background:transparent; padding:12px; border-radius:9px; font-weight:700; font-size:14px; cursor:pointer; color:var(--muted); }
    .ae-tabnav button.active { background:var(--accent); color:#fff; }
    .ae-panel { display:none; background:#fff; border:1px solid var(--line); border-top:0; border-radius:0 0 14px 14px; padding:28px 26px; }
    .ae-panel.active { display:block; animation:fade .25s ease; }
    @keyframes fade { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    .ae-panel h2 { margin-top:0; }
    .ae-panel ul { padding-left:18px; color:#334155; }
    .ae-body { max-width:560px; margin:24px auto 56px; padding:0 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <header class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></header>
  <section class="ae-tabs">
    <div class="ae-tabnav">
      <button class="active" data-tab="t1">特徴</button>
      <button data-tab="t2">料金</button>
      <button data-tab="t3">サポート</button>
    </div>
    <div class="ae-panel active" id="t1"><h2>主な特徴</h2><ul><li>かんたん導入・最短当日</li><li>直感的な操作画面</li><li>外部サービスと柔軟に連携</li></ul></div>
    <div class="ae-panel" id="t2"><h2>料金プラン</h2><ul><li>Starter：¥0 / 月</li><li>Business：¥9,800 / 月</li><li>Enterprise：個別見積</li></ul></div>
    <div class="ae-panel" id="t3"><h2>サポート体制</h2><ul><li>メール・チャットサポート</li><li>導入支援・オンボーディング</li><li>専任担当（上位プラン）</li></ul></div>
  </section>
  <div class="ae-body"><div class="ae-card"><div class="t">資料請求・お問い合わせ</div>%%content%%</div></div>

  <script>
  jQuery(function ($) {
    $(".ae-tabnav button").on("click", function () {
      var id = $(this).data("tab");
      $(".ae-tabnav button").removeClass("active");
      $(this).addClass("active");
      $(".ae-panel").removeClass("active");
      $("#" + id).addClass("active");
    });
  });
  </script>
</body>
</html>
