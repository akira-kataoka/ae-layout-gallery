<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1d4ed8; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef3fc; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:14px; }
    .ae-head .ic { font-size:42px; }
    .ae-head h1 { margin:6px 0; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-reward { background:linear-gradient(135deg,#1d4ed8,#0891b2); color:#fff; border-radius:14px; padding:16px; text-align:center; margin:14px 0; }
    .ae-reward .big { font-size:26px; font-weight:900; } .ae-reward .sm { opacity:.95; font-size:13px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(29,78,216,.1); }
    .ae-card h2 { margin-top:0; font-size:16px; color:var(--muted); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ic">🤝</div><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-reward"><div class="big">紹介成立で 10万円</div><div class="sm">入社が決まると紹介者に謝礼を進呈</div></div>
    <div class="ae-card"><h2>知人をご紹介ください</h2>%%content%%</div>
  </div>
</body>
</html>
