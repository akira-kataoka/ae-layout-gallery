<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0b5cab; --accent2:#22b8cf; --ink:#1b2733; --muted:#5b6b7b; --line:#e3e9f0; --bg:#eef2f7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:var(--bg); line-height:1.8; }
    .ae-wrap { max-width:680px; margin:0 auto; padding:48px 20px 64px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; box-shadow:0 10px 34px rgba(27,39,51,.10); overflow:hidden; }
    .ae-bar { height:6px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
    .ae-body { padding:42px 38px; }
    .ae-body h1,.ae-body h2 { color:var(--ink); margin-top:0; line-height:1.4; }
    .ae-body h1 { font-size:26px; }
    .ae-body a { color:var(--accent); }
    .ae-body img { max-width:100%; height:auto; border-radius:10px; }
    .ae-body form input[type=text],.ae-body form input[type=email],.ae-body form input[type=tel],
    .ae-body form select,.ae-body form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px; font-size:15px; font-family:inherit; }
    .ae-body form p { margin:0 0 13px; }
    .ae-body form .submit input,.ae-body form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
    .ae-footer { text-align:center; color:var(--muted); font-size:12px; margin-top:28px; }
    @media (max-width:600px){ .ae-body { padding:30px 22px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-bar"></div>
      <div class="ae-body">
        %%content%%
      </div>
    </div>
    <p class="ae-footer">&copy; %%account-name%% — Powered by Account Engagement</p>
  </div>
</body>
</html>
