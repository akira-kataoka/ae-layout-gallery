<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f43f5e; --ink:#f1f5f9; --muted:#94a3b8; --line:#26304a; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#0b1020; line-height:1.7; }
    .ae-wrap { max-width:640px; margin:0 auto; padding:56px 20px; }
    .ae-head { text-align:center; margin-bottom:28px; }
    .ae-head .badge { display:inline-block; border:1px solid var(--accent); color:var(--accent); font-weight:700; font-size:12px; letter-spacing:3px; padding:6px 16px; border-radius:999px; margin-bottom:16px; }
    .ae-head h1 { font-size:32px; margin:0 0 10px; line-height:1.3; }
    .ae-head .grad { background:linear-gradient(135deg,#fb7185,#f43f5e,#e11d48); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-stage { aspect-ratio:16/9; border-radius:18px; background:radial-gradient(circle at 50% 30%,#1e293b,#0b1020); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:80px; margin-bottom:18px; box-shadow:0 24px 60px rgba(244,63,94,.18); }
    .ae-when { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:30px; }
    .ae-chip { background:#121a30; border:1px solid var(--line); border-radius:12px; padding:12px 20px; text-align:center; min-width:130px; }
    .ae-chip .k { font-size:11px; color:var(--muted); } .ae-chip .v { font-weight:800; font-size:15px; color:#fff; }
    .ae-card { background:#121a30; border:1px solid var(--line); border-radius:18px; padding:26px; text-align:center; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#0b1020; color:#fff; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:linear-gradient(135deg,#fb7185,#e11d48); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">PRODUCT LAUNCH</span>
      <h1>ついに、<span class="grad">次の体験</span>が始まる。</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-stage">📱</div>
    <div class="ae-when">
      <div class="ae-chip"><div class="k">発表日時</div><div class="v">10.18 19:00</div></div>
      <div class="ae-chip"><div class="k">配信</div><div class="v">オンライン生中継</div></div>
      <div class="ae-chip"><div class="k">参加</div><div class="v">無料・登録制</div></div>
    </div>
    <div class="ae-card">
      <div class="t">%%title%%</div>
      <div class="d">登録者には開始前にリマインドと視聴リンクをお送りします</div>
      %%content%%
    </div>
  </div>
</body>
</html>
