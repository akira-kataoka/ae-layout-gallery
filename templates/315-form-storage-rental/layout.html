<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#b45309; --ink:#2a1d0c; --muted:#6e5d45; --line:#f0e4cf; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf9f0; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-sizes { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .ae-s { background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 8px; text-align:center; box-shadow:0 6px 18px rgba(180,83,9,.05); }
    .ae-s .nm { font-weight:800; font-size:13px; } .ae-s .sz { font-size:11px; color:var(--muted); } .ae-s .pr { color:var(--accent); font-weight:900; font-size:13px; margin-top:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">📦</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-sizes">
      <div class="ae-s"><div class="nm">Sサイズ</div><div class="sz">0.5畳・宅配便数箱</div><div class="pr">¥2,980/月</div></div>
      <div class="ae-s"><div class="nm">Mサイズ</div><div class="sz">1畳・家具少々</div><div class="pr">¥5,480/月</div></div>
      <div class="ae-s"><div class="nm">Lサイズ</div><div class="sz">2畳・引越し1部屋分</div><div class="pr">¥9,800/月</div></div>
    </div>
    <div class="ae-card">
      <div class="t">お申し込み・無料見積もり</div>
      %%content%%
    </div>
  </div>
</body>
</html>
