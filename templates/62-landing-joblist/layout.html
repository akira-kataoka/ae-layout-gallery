<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#2563eb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f7f9fc; line-height:1.7; }
    .ae-hero { background:linear-gradient(120deg,#1e3a8a,#2563eb); color:#fff; padding:48px 20px; text-align:center; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.9; }
    .ae-jobs { max-width:760px; margin:28px auto; padding:0 20px; }
    .ae-job { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 20px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:14px; box-shadow:0 4px 14px rgba(37,99,235,.06); }
    .ae-job h3 { margin:0 0 4px; font-size:15px; }
    .ae-job .tags { font-size:12px; color:var(--muted); }
    .ae-job .tags span { background:#eff6ff; color:var(--accent); padding:2px 9px; border-radius:999px; margin-right:5px; }
    .ae-job a { flex:none; text-decoration:none; background:var(--accent); color:#fff; padding:9px 16px; border-radius:8px; font-size:13px; font-weight:700; }
    .ae-card { max-width:520px; margin:24px auto 56px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:26px 24px; text-align:center; box-shadow:0 8px 24px rgba(37,99,235,.08); }
    .ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:700; cursor:pointer; }
    @media (max-width:560px){ .ae-job { flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>
  <header class="ae-hero"><h1>%%title%%</h1><p>%%description%%</p></header>
  <section class="ae-jobs">
    <div class="ae-job"><div><h3>ソフトウェアエンジニア</h3><div class="tags"><span>正社員</span><span>リモート可</span>東京</div></div><a href="#">詳細を見る</a></div>
    <div class="ae-job"><div><h3>プロダクトデザイナー</h3><div class="tags"><span>正社員</span><span>フレックス</span>大阪</div></div><a href="#">詳細を見る</a></div>
    <div class="ae-job"><div><h3>カスタマーサクセス</h3><div class="tags"><span>契約社員</span><span>未経験可</span>福岡</div></div><a href="#">詳細を見る</a></div>
  </section>
  <section class="ae-card"><p style="font-weight:700;">新着求人をメールで受け取る</p>%%content%%</section>
</body>
</html>
