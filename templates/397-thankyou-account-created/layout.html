<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#15172e; --muted:#64698c; --line:#e3e2f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f5fc; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#818cf8,#4f46e5); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 14px; box-shadow:0 12px 30px rgba(79,70,229,.3); }
    .ae-done h1 { font-size:24px; margin:0 0 6px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-steps { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:18px; box-shadow:0 8px 22px rgba(79,70,229,.06); }
    .ae-steps .t { font-weight:700; font-size:14px; margin-bottom:12px; }
    .ae-st { display:flex; gap:12px; align-items:center; padding:9px 0; border-top:1px solid var(--line); }
    .ae-st:first-of-type { border-top:0; }
    .ae-st .ic { width:36px; height:36px; border-radius:10px; background:#eef2ff; display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto; }
    .ae-st .nm { font-weight:700; font-size:14px; } .ae-st .de { font-size:12px; color:var(--muted); }
    .ae-st .go { margin-left:auto; color:var(--accent); font-weight:800; font-size:13px; text-decoration:none; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-steps">
      <div class="t">さっそく始めましょう（3ステップ）</div>
      <div class="ae-st"><div class="ic">👤</div><div><div class="nm">プロフィールを設定</div><div class="de">あなたに合った情報をお届けします</div></div><a class="go" href="#">設定 →</a></div>
      <div class="ae-st"><div class="ic">📱</div><div><div class="nm">アプリを入手</div><div class="de">いつでもどこでも使えます</div></div><a class="go" href="#">入手 →</a></div>
      <div class="ae-st"><div class="ic">🎁</div><div><div class="nm">初回特典を受け取る</div><div class="de">新規登録者限定クーポン</div></div><a class="go" href="#">受取 →</a></div>
    </div>
    <div class="ae-card">
      <div class="t">お役立ち情報・お得なお知らせを受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
