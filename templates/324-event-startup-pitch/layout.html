<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#6366f1; --ink:#e2e8f0; --muted:#94a3b8; --line:#2a3350; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#0b1120; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#4f46e5,#0891b2); color:#fff; text-align:center; padding:54px 20px 44px; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.2); font-weight:700; font-size:12px; letter-spacing:2px; padding:6px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:640px; margin:0 auto; padding:36px 20px 48px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .ae-i { background:#111a2e; border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center; }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-agenda { background:#111a2e; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:24px; }
    .ae-agenda .t { font-weight:700; text-align:center; margin-bottom:12px; color:#fff; }
    .ae-a { display:flex; align-items:center; gap:12px; padding:8px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-a:first-of-type { border-top:0; }
    .ae-a .tm { color:#a5b4fc; font-weight:700; font-size:12px; width:64px; flex:0 0 auto; }
    .ae-roles { display:flex; gap:10px; margin-bottom:24px; }
    .ae-role { flex:1; background:#111a2e; border:1px solid var(--line); border-radius:12px; padding:14px; text-align:center; }
    .ae-role .em { font-size:22px; } .ae-role .nm { font-size:12px; font-weight:700; color:#fff; }
    .ae-card { background:#111a2e; border:1px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#0b1120; color:#e2e8f0; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:linear-gradient(135deg,#818cf8,#6366f1); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">DEMO DAY</span>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">11.14 (土) 14:00</div></div>
      <div class="ae-i"><div class="ic">🚀</div><div class="k">登壇</div><div class="v">12社が登壇</div></div>
      <div class="ae-i"><div class="ic">🎟️</div><div class="k">参加</div><div class="v">無料・事前登録</div></div>
    </div>
    <div class="ae-agenda">
      <div class="t">タイムテーブル</div>
      <div class="ae-a"><span class="tm">14:00</span><span>オープニング・審査基準の説明</span></div>
      <div class="ae-a"><span class="tm">14:15</span><span>スタートアップ ピッチ（各社5分）</span></div>
      <div class="ae-a"><span class="tm">16:30</span><span>審査・表彰／ネットワーキング</span></div>
    </div>
    <div class="ae-roles">
      <div class="ae-role"><div class="em">🧑‍💼</div><div class="nm">投資家として</div></div>
      <div class="ae-role"><div class="em">🚀</div><div class="nm">起業家として</div></div>
      <div class="ae-role"><div class="em">👀</div><div class="nm">見学・聴講</div></div>
    </div>
    <div class="ae-card">
      <div class="t">参加登録</div>
      <div class="d">ご参加の立場を選んでお申し込みください</div>
      %%content%%
    </div>
  </div>
</body>
</html>
