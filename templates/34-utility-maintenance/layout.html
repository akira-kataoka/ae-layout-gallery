<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f59e0b; --ink:#0f172a; --muted:#94a3b8; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#e2e8f0; line-height:1.7;
      background:radial-gradient(900px 500px at 50% 0%,#422006,transparent), #0b1220; display:flex; align-items:center; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 24px; text-align:center; }
    .ae-gear { font-size:56px; }
    .ae-wrap h1 { font-size:28px; margin:12px 0 8px; }
    .ae-wrap > p { color:var(--muted); margin:0 0 22px; }
    .ae-status { display:inline-flex; align-items:center; gap:8px; background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.4); color:#fcd34d; padding:7px 16px; border-radius:999px; font-size:13px; margin-bottom:24px; }
    .ae-status .dot { width:9px; height:9px; border-radius:50%; background:#fbbf24; box-shadow:0 0 0 4px rgba(251,191,36,.25); }
    .ae-card { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:24px 22px; }
    .ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid rgba(255,255,255,.18); border-radius:10px; background:rgba(0,0,0,.3); color:#fff; font-size:14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; margin-top:10px; background:var(--accent); color:#3b2406; border:0; padding:13px; border-radius:10px; font-weight:800; cursor:pointer; }
    .ae-card form p { margin:0; }
    .ae-eta { margin-top:16px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-gear">🛠️</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-status"><span class="dot"></span>メンテナンス作業中</div>
    <div class="ae-card">
      <p style="margin-bottom:12px;color:#cbd5e1;">復旧をメールでお知らせします</p>
      %%content%%
    </div>
    <div class="ae-eta">復旧予定: 本日 18:00 頃（予定は前後する場合があります）</div>
  </div>
</body>
</html>
