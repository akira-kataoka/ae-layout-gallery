<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#34d399; --ink:#e5e7eb; --muted:#94a3b8; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); line-height:1.7;
      background:radial-gradient(900px 500px at 80% 0%,#134e4a,transparent), #0b1220; display:flex; align-items:center; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:40px 22px; width:100%; }
    .ae-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.10); border-radius:18px; padding:38px 32px; backdrop-filter:blur(8px); box-shadow:0 20px 60px rgba(0,0,0,.4); }
    .ae-card h1 { margin:0 0 6px; font-size:24px; }
    .ae-card > p { color:var(--muted); margin:0 0 22px; }
    .ae-card form label { font-size:13px; color:var(--muted); }
    .ae-card form input[type=text],
    .ae-card form input[type=email],
    .ae-card form input[type=tel],
    .ae-card form select,
    .ae-card form textarea { width:100%; padding:12px 13px; border:1px solid rgba(255,255,255,.16); border-radius:10px; background:rgba(0,0,0,.3); color:#fff; font-size:14px; }
    .ae-card form p { margin:0 0 15px; }
    .ae-card form .submit input,
    .ae-card form button { width:100%; background:var(--accent); color:#04261c; border:0; padding:14px; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      %%content%%
    </div>
  </div>
</body>
</html>
