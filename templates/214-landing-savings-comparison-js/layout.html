<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#15803d; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f8f3; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:16px; }
    .ae-head h1 { margin:0 0 6px; font-size:25px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-calc { background:#fff; border:1px solid var(--line); border-radius:16px; padding:26px; box-shadow:0 8px 26px rgba(21,128,61,.1); margin-bottom:16px; }
    .ae-field label { font-size:13px; font-weight:600; display:block; margin-bottom:4px; }
    .ae-field input[type=number] { width:100%; padding:14px; border:1px solid var(--line); border-radius:10px; font-size:18px; }
    .ae-bars { margin-top:18px; }
    .ae-bar { margin-bottom:12px; }
    .ae-bar .lbl { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
    .ae-bar .track { height:22px; border-radius:6px; background:#e2e8f0; overflow:hidden; }
    .ae-bar .fill { height:100%; border-radius:6px; }
    .ae-bar.cur .fill { background:#94a3b8; } .ae-bar.our .fill { background:var(--accent); }
    .ae-save { background:linear-gradient(135deg,#15803d,#0d9488); color:#fff; border-radius:12px; padding:16px; text-align:center; margin-top:8px; }
    .ae-save .big { font-size:30px; font-weight:900; font-variant-numeric:tabular-nums; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-calc">
      <div class="ae-field"><label>現在の月額コスト（円）</label><input type="number" id="cur" value="18000" min="0" step="500"></div>
      <div class="ae-bars">
        <div class="ae-bar cur"><div class="lbl"><span>現在</span><span id="curlbl">¥18,000</span></div><div class="track"><div class="fill" id="curfill" style="width:100%"></div></div></div>
        <div class="ae-bar our"><div class="lbl"><span>当社プラン</span><span>¥9,800</span></div><div class="track"><div class="fill" id="ourfill" style="width:54%"></div></div></div>
      </div>
      <div class="ae-save"><div>月々の節約額</div><div class="big" id="save">¥8,200</div><div id="yearly">年間 ¥98,400 おトク</div></div>
    </div>
    <div class="ae-card"><div class="t">詳しい比較資料を受け取る</div>%%content%%</div>
  </div>

  <script>
  (function () {
    var OUR = 9800;
    var cur = document.getElementById("cur");
    function yen(n) { return "¥" + Math.max(0, Math.round(n)).toLocaleString("ja-JP"); }
    function update() {
      var c = parseFloat(cur.value) || 0;
      var max = Math.max(c, OUR, 1);
      document.getElementById("curlbl").textContent = yen(c);
      document.getElementById("curfill").style.width = (c / max * 100) + "%";
      document.getElementById("ourfill").style.width = (OUR / max * 100) + "%";
      var save = c - OUR;
      document.getElementById("save").textContent = yen(save);
      document.getElementById("yearly").textContent = "年間 " + yen(save * 12) + " おトク";
    }
    cur.addEventListener("input", update);
    update();
  })();
  </script>
</body>
</html>
