<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fdfa; line-height:1.7; }
    .ae-wrap { max-width:680px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head h1 { margin:0 0 6px; font-size:26px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-calc { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 26px rgba(13,148,136,.1); margin-bottom:18px; }
    .ae-row { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .ae-row label { flex:1; font-size:14px; font-weight:600; }
    .ae-row input[type=range] { flex:1.6; accent-color:var(--accent); }
    .ae-row .val { width:96px; text-align:right; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-result { background:linear-gradient(135deg,#0d9488,#0891b2); color:#fff; border-radius:14px; padding:22px; text-align:center; }
    .ae-result .lbl { font-size:13px; opacity:.9; }
    .ae-result .big { font-size:40px; font-weight:900; font-variant-numeric:tabular-nums; }
    .ae-result .note { font-size:12px; opacity:.9; margin-top:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; margin-top:18px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-calc">
      <div class="ae-row"><label>従業員数</label><input type="range" id="emp" min="1" max="500" value="50"><span class="val" id="empv">50 名</span></div>
      <div class="ae-row"><label>月間の対象作業時間 / 人</label><input type="range" id="hrs" min="1" max="80" value="20"><span class="val" id="hrsv">20 h</span></div>
      <div class="ae-row"><label>平均時給</label><input type="range" id="wage" min="1000" max="6000" step="100" value="2500"><span class="val" id="wagev">¥2,500</span></div>
      <div class="ae-result"><div class="lbl">想定される年間削減額</div><div class="big" id="saving">¥0</div><div class="note">※ 作業時間を40%削減できた場合の試算</div></div>
    </div>
    <div class="ae-card"><div class="t">詳しい試算レポートを受け取る</div>%%content%%</div>
  </div>

  <script>
  jQuery(function ($) {
    var yen = function (n) { return "¥" + Math.round(n).toLocaleString("ja-JP"); };
    function update() {
      var emp = +$("#emp").val(), hrs = +$("#hrs").val(), wage = +$("#wage").val();
      $("#empv").text(emp + " 名");
      $("#hrsv").text(hrs + " h");
      $("#wagev").text(yen(wage));
      // 月間総コスト × 12 × 削減率40%
      var saving = emp * hrs * wage * 12 * 0.4;
      $("#saving").text(yen(saving));
    }
    $("#emp, #hrs, #wage").on("input", update);
    update();
  });
  </script>
</body>
</html>
