<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0891b2; --accent2:#6366f1; --ink:#0c1f29; --muted:#5a707a; --line:#d8e7ec; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eff7fa; line-height:1.7; }
    .ae-hero { background:linear-gradient(120deg,#0891b2,#6366f1); color:#fff; text-align:center; padding:48px 20px 70px; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.2); font-weight:700; font-size:12px; letter-spacing:2px; padding:6px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:760px; margin:0 auto; padding:0 20px 48px; }
    .ae-screen { background:#fff; border:1px solid var(--line); border-radius:18px; margin-top:-46px; padding:10px; box-shadow:0 16px 40px rgba(8,145,178,.16); }
    .ae-stage { aspect-ratio:16/9; border-radius:12px; background:linear-gradient(135deg,#0c1f29,#1e3a5f); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; }
    .ae-stage .play { width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; font-size:26px; margin-bottom:10px; }
    .ae-stage .lbl { font-size:13px; opacity:.85; }
    .ae-actions { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-act { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 12px; text-align:center; box-shadow:0 6px 18px rgba(8,145,178,.06); }
    .ae-act .ic { font-size:26px; } .ae-act .nm { font-weight:700; font-size:13px; margin-top:6px; } .ae-act .de { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; text-align:center; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:560px){ .ae-actions { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">VIRTUAL BOOTH</span>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-screen">
      <div class="ae-stage"><div class="play">▶</div><div class="lbl">製品紹介ムービー（3:24）</div></div>
    </div>
    <div class="ae-actions">
      <div class="ae-act"><div class="ic">📄</div><div class="nm">資料ダウンロード</div><div class="de">製品カタログ・価格表</div></div>
      <div class="ae-act"><div class="ic">💬</div><div class="nm">オンライン商談</div><div class="de">担当者とビデオ通話</div></div>
      <div class="ae-act"><div class="ic">🎫</div><div class="nm">ノベルティ応募</div><div class="de">来場者限定プレゼント</div></div>
    </div>
    <div class="ae-card">
      <div class="t">ブースに入場する（来場登録）</div>
      <div class="d">ご登録いただくと、資料DL・商談予約がご利用いただけます</div>
      %%content%%
    </div>
  </div>
</body>
</html>
