<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#0f172a; --muted:#64748b; --line:#cbd5e1; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(160deg,#e0e7ff,#eef2ff); line-height:1.7; display:flex; align-items:center; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:32px 24px; width:100%; text-align:center; }
    .ae-wrap h1 { font-size:30px; margin:0 0 6px; }
    .ae-wrap > p { color:var(--muted); font-size:17px; margin:0 0 24px; }
    .ae-card { background:#fff; border-radius:20px; padding:34px 30px; box-shadow:0 16px 44px rgba(79,70,229,.18); }
    .ae-card form label { font-size:15px; font-weight:700; display:block; text-align:left; margin-bottom:4px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:18px 18px; border:2px solid var(--line); border-radius:14px; font-size:18px; }
    .ae-card form p { margin:0 0 18px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:20px; border-radius:14px; font-weight:800; font-size:20px; cursor:pointer; }
    .ae-note { margin-top:16px; font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-card">%%content%%</div>
    <div class="ae-note">名刺をお持ちの方はスタッフにお渡しください。</div>
  </div>
</body>
</html>
