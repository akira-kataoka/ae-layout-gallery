<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#15803d; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f2f8f4; line-height:1.7; }
    .ae-grid { max-width:940px; margin:0 auto; padding:48px 20px; display:grid; grid-template-columns:1fr 1.05fr; gap:30px; align-items:start; }
    .ae-prop { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 8px 24px rgba(21,128,61,.08); }
    .ae-photo { height:200px; background:linear-gradient(160deg,#86efac,#15803d); display:flex; align-items:center; justify-content:center; font-size:60px; }
    .ae-pbody { padding:18px 20px; }
    .ae-pbody h1 { font-size:20px; margin:0 0 4px; }
    .ae-price { color:var(--accent); font-weight:800; font-size:22px; }
    .ae-specs { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; font-size:12px; }
    .ae-specs span { background:#f0fdf4; color:var(--accent); padding:4px 10px; border-radius:999px; font-weight:700; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(21,128,61,.1); }
    .ae-card h2 { margin-top:0; font-size:18px; }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
    @media (max-width:760px){ .ae-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-grid">
    <div class="ae-prop">
      <div class="ae-photo">🏡</div>
      <div class="ae-pbody">
        <h1>%%title%%</h1>
        <div class="ae-price">3,480万円</div>
        <p style="color:var(--muted);font-size:14px;margin:6px 0 0;">%%description%%</p>
        <div class="ae-specs"><span>3LDK</span><span>78.4㎡</span><span>南向き</span><span>駅徒歩7分</span></div>
      </div>
    </div>
    <div class="ae-card"><h2>内見・お問い合わせ</h2>%%content%%</div>
  </div>
</body>
</html>
