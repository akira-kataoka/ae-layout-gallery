<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#15803d; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --warn:#b91c1c; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f5f4; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-alert { background:#fef2f2; border:1px solid #fecaca; color:var(--warn); border-radius:12px; padding:12px 16px; font-weight:700; font-size:14px; margin-bottom:16px; display:flex; gap:8px; align-items:center; }
    .ae-head { margin-bottom:16px; }
    .ae-head h1 { margin:0 0 4px; font-size:22px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 6px 20px rgba(15,23,42,.06); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form .status label { display:flex; align-items:center; gap:10px; padding:12px 14px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; font-weight:600; cursor:pointer; font-size:14px; }
    .ae-card form input[type=text],.ae-card form input[type=tel],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-alert">⚠️ 緊急時の安否確認です。速やかにご回答ください。</div>
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
