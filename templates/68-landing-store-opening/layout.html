<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#e11d48; --gold:#f59e0b; --ink:#1a1014; --muted:#6b7280; --line:#f1dde2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff5f7; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#9f1239,#e11d48); color:#fff; padding:54px 20px; text-align:center; position:relative; overflow:hidden; }
    .ae-ribbon { display:inline-block; background:var(--gold); color:#3b2406; font-weight:800; padding:7px 20px; border-radius:999px; letter-spacing:.08em; font-size:13px; }
    .ae-hero h1 { font-size:clamp(26px,6vw,40px); margin:14px 0 6px; }
    .ae-hero .open { font-size:18px; opacity:.95; }
    .ae-info { max-width:760px; margin:-22px auto 0; padding:0 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .ae-info div { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; text-align:center; box-shadow:0 6px 18px rgba(225,29,72,.1); }
    .ae-info .lbl { font-size:12px; color:var(--muted); } .ae-info .val { font-weight:800; margin-top:4px; }
    .ae-map { max-width:760px; margin:18px auto 0; padding:0 20px; }
    .ae-map .box { height:160px; background:#fde4ea; border:1px dashed #f9a8c0; border-radius:14px; display:flex; align-items:center; justify-content:center; color:var(--muted); }
    .ae-card { max-width:520px; margin:24px auto 56px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; text-align:center; box-shadow:0 10px 30px rgba(225,29,72,.1); }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:9px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-weight:800; cursor:pointer; }
    @media (max-width:560px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="ae-hero"><span class="ae-ribbon">GRAND OPEN</span><h1>%%title%%</h1><div class="open">%%description%%</div></header>
  <section class="ae-info">
    <div><div class="lbl">オープン日</div><div class="val">2026.7.20</div></div>
    <div><div class="lbl">場所</div><div class="val">サンプル駅前店</div></div>
    <div><div class="lbl">特典</div><div class="val">先着100名様</div></div>
  </section>
  <div class="ae-map"><div class="box">📍 アクセスマップ（差し替え）</div></div>
  <section class="ae-card"><p style="font-weight:700;">オープン記念クーポンを受け取る</p>%%content%%</section>
</body>
</html>
