<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#5865f2; --ink:#0f172a; --muted:#64748b; --line:#e6e8f5; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3f4fd; line-height:1.7; }
    .ae-wrap { max-width:660px; margin:0 auto; padding:54px 20px; text-align:center; }
    .ae-avatars { display:flex; justify-content:center; margin-bottom:18px; }
    .ae-avatars span { width:42px; height:42px; border-radius:50%; border:3px solid #f3f4fd; margin-left:-10px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:15px; }
    .ae-avatars span:nth-child(1){ background:#5865f2; margin-left:0; } .ae-avatars span:nth-child(2){ background:#eb459e; }
    .ae-avatars span:nth-child(3){ background:#3ba55d; } .ae-avatars span:nth-child(4){ background:#faa61a; }
    .ae-avatars span:nth-child(5){ background:#94a3b8; font-size:13px; }
    .ae-wrap h1 { font-size:30px; margin:6px 0 10px; }
    .ae-wrap > p { color:var(--muted); max-width:480px; margin:0 auto 24px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:30px 28px; box-shadow:0 12px 34px rgba(88,101,242,.12); }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:10px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
    .ae-perks { display:flex; gap:18px; justify-content:center; margin-top:24px; flex-wrap:wrap; font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-avatars"><span>A</span><span>R</span><span>K</span><span>M</span><span>+9k</span></div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-card">%%content%%</div>
    <div class="ae-perks"><span>💬 質問し放題</span><span>🎓 限定イベント</span><span>🚀 最新情報をいち早く</span></div>
  </div>
</body>
</html>
