<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9a8478; --ink:#2a2420; --muted:#7c736b; --line:#e7ddd3; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Mincho ProN","Yu Mincho",serif; color:var(--ink); background:#faf6f0; line-height:1.9; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:56px 20px; text-align:center; }
    .ae-orn { color:var(--accent); letter-spacing:.4em; font-size:14px; }
    .ae-names { font-size:30px; margin:14px 0 6px; letter-spacing:.08em; }
    .ae-amp { color:var(--accent); font-style:italic; }
    .ae-sub { color:var(--muted); margin:0 0 8px; }
    .ae-card-info { background:#fff; border:1px solid var(--line); border-radius:6px; padding:24px; margin:24px 0; box-shadow:0 8px 24px rgba(154,132,120,.12); }
    .ae-card-info .row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--line); font-size:14px; }
    .ae-card-info .row:last-child { border-bottom:0; }
    .ae-card-info .row span:first-child { color:var(--muted); }
    .ae-rsvp { background:#fff; border:1px solid var(--line); border-radius:6px; padding:26px 24px; box-shadow:0 8px 24px rgba(154,132,120,.12); }
    .ae-rsvp h2 { font-size:18px; margin-top:0; color:var(--accent); }
    .ae-rsvp form input[type=text],.ae-rsvp form input[type=email],.ae-rsvp form select { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:4px; font-size:14px; font-family:inherit; }
    .ae-rsvp form .att label { display:inline-flex; gap:6px; align-items:center; margin:2px 14px 2px 0; }
    .ae-rsvp form p { margin:0 0 13px; }
    .ae-rsvp form .submit input,.ae-rsvp form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:4px; font-weight:700; cursor:pointer; font-family:inherit; letter-spacing:.1em; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-orn">— WEDDING INVITATION —</div>
    <div class="ae-names">Taro <span class="ae-amp">&amp;</span> Hanako</div>
    <p class="ae-sub">%%title%%</p>
    <p class="ae-sub">%%description%%</p>
    <div class="ae-card-info">
      <div class="row"><span>日時</span><span>2026年10月10日（土）11:00</span></div>
      <div class="row"><span>会場</span><span>サンプル迎賓館</span></div>
      <div class="row"><span>住所</span><span>東京都サンプル区1-2-3</span></div>
    </div>
    <div class="ae-rsvp"><h2>ご出欠のお返事</h2>%%content%%</div>
  </div>
</body>
</html>
