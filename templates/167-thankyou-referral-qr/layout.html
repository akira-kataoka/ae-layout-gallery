<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f97316; --ink:#1c1610; --muted:#78716c; --line:#f0e4d8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff7ed; line-height:1.7; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:60px 20px; text-align:center; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:36px 30px; box-shadow:0 12px 34px rgba(249,115,22,.14); }
    .ae-emoji { font-size:46px; }
    .ae-card h1 { margin:8px 0; font-size:23px; }
    .ae-card > p { color:var(--muted); }
    .ae-qr { width:130px; height:130px; margin:18px auto 12px; border-radius:12px; background:repeating-linear-gradient(45deg,#1c1610 0 7px,#fff 7px 14px); border:6px solid #fff; box-shadow:0 0 0 1px var(--line); }
    .ae-code { background:#fff7ed; border:2px dashed #fdba74; border-radius:12px; padding:14px; }
    .ae-code .lbl { font-size:12px; color:var(--muted); }
    .ae-code .v { font-family:ui-monospace,monospace; font-size:24px; font-weight:800; letter-spacing:.15em; color:var(--accent); }
    .ae-share { display:flex; gap:8px; justify-content:center; margin-top:16px; }
    .ae-share a { text-decoration:none; color:#fff; padding:10px 16px; border-radius:9px; font-size:13px; font-weight:700; }
    .ae-share .x { background:#0f172a; } .ae-share .li { background:#06c755; } .ae-share .ln { background:#0a66c2; }
    .ae-reward { margin-top:16px; font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-emoji">🎁</div>
      %%content%%
      <div class="ae-qr"></div>
      <div class="ae-code"><div class="lbl">あなたの紹介コード</div><div class="v">TARO-2026</div></div>
      <div class="ae-share"><a class="x" href="#">𝕏でシェア</a><a class="li" href="#">LINEで送る</a><a class="ln" href="#">リンクをコピー</a></div>
      <div class="ae-reward">お友達が登録すると、あなたとお友達の両方に特典 🎉</div>
    </div>
  </div>
</body>
</html>
