<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#b45309; --ink:#2a1c0e; --muted:#7c6a54; --line:#efe2cf; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf7ee; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(180,83,9,.09); }
    .ae-field { margin-bottom:18px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-act { display:flex; gap:6px; background:#f5e7d4; border-radius:10px; padding:4px; }
    .ae-act button { flex:1; border:0; background:transparent; padding:9px 4px; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; color:var(--muted); }
    .ae-act button.on { background:#fff; color:var(--accent); box-shadow:0 2px 8px rgba(180,83,9,.18); }
    .ae-out { background:linear-gradient(135deg,#d97706,#b45309); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .lab { font-size:13px; opacity:.9; } .ae-out .big { font-size:42px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-out .big small { font-size:16px; } .ae-out .sub { font-size:13px; opacity:.95; margin-top:6px; }
    .ae-row2 { display:flex; gap:8px; margin-top:14px; } .ae-g { flex:1; background:rgba(255,255,255,.15); border-radius:10px; padding:10px 6px; } .ae-g .k { font-size:11px; opacity:.9; } .ae-g .n { font-weight:800; font-variant-numeric:tabular-nums; }
    .ae-note { font-size:11px; color:var(--muted); margin-top:12px; text-align:center; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>ペットの種類</label>
        <div class="ae-act" id="pet">
          <button type="button" data-p="dog" class="on">🐶 犬</button>
          <button type="button" data-p="cat">🐱 猫</button>
        </div></div>
      <div class="ae-field"><label>体重 <span class="v"><span id="vW">5.0</span> kg</span></label>
        <input type="range" id="w" min="1" max="60" step="0.5" value="5"></div>
      <div class="ae-field"><label>活動量・状態</label>
        <div class="ae-act" id="act">
          <button type="button" data-f="low">避妊・去勢済</button>
          <button type="button" data-f="mid" class="on">標準</button>
          <button type="button" data-f="high">活発・成長期</button>
        </div></div>
      <div class="ae-out">
        <div class="lab">1日に必要なフードの量</div>
        <div class="big"><span id="grams">0</span><small> g/日</small></div>
        <div class="sub">一般的なドライフード（約350kcal/100g）換算</div>
        <div class="ae-row2">
          <div class="ae-g"><div class="k">必要エネルギー</div><div class="n"><span id="kcal">0</span> kcal/日</div></div>
          <div class="ae-g"><div class="k">1回あたり(朝夕2回)</div><div class="n"><span id="per">0</span> g</div></div>
        </div>
      </div>
      <div class="ae-note">※ 目安です。年齢・体調・フードの種類により異なります。獣医師にご相談ください。</div>
    </div>
    <div class="ae-cta">
      <div class="t">うちの子に合うフード・健康情報を受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var w = document.getElementById("w"), vW = document.getElementById("vW");
    var gramsEl = document.getElementById("grams"), kcalEl = document.getElementById("kcal"), perEl = document.getElementById("per");
    var petBtns = Array.prototype.slice.call(document.querySelectorAll("#pet button"));
    var actBtns = Array.prototype.slice.call(document.querySelectorAll("#act button"));
    var pet = "dog", act = "mid";
    var factors = { dog: { low: 1.6, mid: 1.8, high: 2.2 }, cat: { low: 1.2, mid: 1.4, high: 1.6 } };
    function calc() {
      var kg = parseFloat(w.value) || 0;
      vW.textContent = kg.toFixed(1);
      var rer = 70 * Math.pow(kg, 0.75);
      var der = rer * factors[pet][act];
      var grams = der / 350 * 100;
      kcalEl.textContent = Math.round(der).toLocaleString();
      gramsEl.textContent = Math.round(grams);
      perEl.textContent = Math.round(grams / 2);
    }
    w.addEventListener("input", calc);
    petBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        petBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); pet = b.getAttribute("data-p"); calc();
      });
    });
    actBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        actBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); act = b.getAttribute("data-f"); calc();
      });
    });
    calc();
  })();
  </script>
</body>
</html>
