<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --gold:#d4a13a; --ink:#1c1633; --muted:#6a6488; --line:#e7e2f5; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f3fc; line-height:1.7; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:54px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head h1 { font-size:23px; margin:0 0 6px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-gift { background:linear-gradient(135deg,#7c3aed,#5b21b6); color:#fff; border-radius:18px; padding:24px; margin-bottom:22px; position:relative; overflow:hidden; box-shadow:0 16px 36px rgba(124,58,237,.28); }
    .ae-gift::after { content:""; position:absolute; right:-30px; top:-30px; width:130px; height:130px; border-radius:50%; background:radial-gradient(circle,rgba(212,161,58,.5),transparent 70%); }
    .ae-gift .brand { font-size:12px; opacity:.85; letter-spacing:2px; } .ae-gift .chip { width:38px; height:28px; border-radius:6px; background:linear-gradient(135deg,#f3d27a,#d4a13a); margin:10px 0 18px; }
    .ae-gift .no { font-family:ui-monospace,Menlo,Consolas,monospace; letter-spacing:3px; font-size:15px; } .ae-gift .lab { font-size:11px; opacity:.8; margin-top:12px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; margin-bottom:4px; text-align:center; }
    .ae-card .s { font-size:13px; color:var(--muted); margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    .ae-note { font-size:12px; color:var(--muted); text-align:center; margin-top:14px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-gift">
      <div class="brand">SAMPLE GIFT CARD</div>
      <div class="chip"></div>
      <div class="no">•••• •••• •••• 1234</div>
      <div class="lab">カード裏面の番号とPINをご用意ください</div>
    </div>
    <div class="ae-card">
      <div class="t">残高を照会する</div>
      <div class="s">カード番号を入力すると、現在のご利用可能残高を確認できます</div>
      %%content%%
      <div class="ae-note">🔒 カード情報は残高照会のみに使用し、保存されません</div>
    </div>
  </div>
</body>
</html>
