<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#1a0e15; --muted:#6b7280; --line:#f3d9e4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff1f6; line-height:1.7; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:52px 20px; text-align:center; }
    .ae-cake { font-size:54px; }
    .ae-wrap h1 { font-size:25px; margin:8px 0; }
    .ae-wrap > p { color:var(--muted); margin:0 0 18px; }
    .ae-gift { display:inline-block; background:linear-gradient(120deg,#f472b6,#db2777); color:#fff; padding:10px 22px; border-radius:14px; font-weight:800; margin-bottom:20px; box-shadow:0 10px 26px rgba(219,39,119,.3); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(219,39,119,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=date] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-cake">🎂</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-gift">🎁 お誕生月クーポンをプレゼント</div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
