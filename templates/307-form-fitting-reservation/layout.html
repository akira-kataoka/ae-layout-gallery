<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9d174d; --ink:#2a1020; --muted:#7a5566; --line:#f3dce6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf2f7; line-height:1.7; }
    .ae-wrap { max-width:580px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-perks { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
    .ae-perk { background:#fff; border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:12px; font-weight:700; color:var(--accent); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">👗</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-perks">
      <span class="ae-perk">✓ 専属スタイリスト</span>
      <span class="ae-perk">✓ 完全予約制・貸切</span>
      <span class="ae-perk">✓ ドリンクサービス</span>
    </div>
    <div class="ae-card">
      <div class="t">ご試着のご予約</div>
      %%content%%
    </div>
  </div>
</body>
</html>
