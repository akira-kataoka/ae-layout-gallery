<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1e3a8a; --gold:#c8a24a; --ink:#10182e; --muted:#5a6480; --line:#dce1ee; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef1f9; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head .badge { display:inline-block; background:#e1e6f4; color:var(--accent); font-weight:700; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-cardvis { background:linear-gradient(135deg,#1e3a8a,#0f1f4a); border-radius:14px; padding:20px; color:#fff; margin-bottom:18px; box-shadow:0 12px 30px rgba(30,58,138,.3); position:relative; overflow:hidden; }
    .ae-cardvis::after { content:""; position:absolute; right:-20px; top:-20px; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle,rgba(200,162,74,.35),transparent 70%); }
    .ae-cardvis .brand { font-size:12px; letter-spacing:2px; opacity:.85; } .ae-cardvis .chip { width:38px; height:28px; border-radius:6px; background:linear-gradient(135deg,#f3d27a,var(--gold)); margin:14px 0; }
    .ae-cardvis .no { font-family:ui-monospace,Menlo,Consolas,monospace; letter-spacing:3px; font-size:15px; }
    .ae-perks { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px; }
    .ae-pk { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 8px; text-align:center; }
    .ae-pk .ic { font-size:20px; } .ae-pk .k { font-size:12px; font-weight:700; margin-top:4px; } .ae-pk .d { font-size:11px; color:var(--muted); }
    .ae-cardx { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(30,58,138,.08); }
    .ae-cardx .t { font-weight:700; font-size:17px; margin-bottom:4px; }
    .ae-cardx .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-cardx form input[type=text],.ae-cardx form input[type=email],.ae-cardx form input[type=tel],.ae-cardx form input[type=date],.ae-cardx form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cardx form p { margin:0 0 13px; }
    .ae-cardx form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-cardx form .submit input,.ae-cardx form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:440px){ .ae-perks { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">新規入会で最大10,000ポイント</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-cardvis">
      <div class="brand">SAMPLE CARD</div>
      <div class="chip"></div>
      <div class="no">•••• •••• •••• 1234</div>
    </div>
    <div class="ae-perks">
      <div class="ae-pk"><div class="ic">💳</div><div class="k">年会費無料</div><div class="d">ずっと0円</div></div>
      <div class="ae-pk"><div class="ic">🎁</div><div class="k">高還元</div><div class="d">いつでも1.0%</div></div>
      <div class="ae-pk"><div class="ic">🛡️</div><div class="k">安心保険</div><div class="d">不正利用補償</div></div>
    </div>
    <div class="ae-cardx">
      <div class="t">オンライン入会お申し込み</div>
      <div class="s">最短即時審査。お手続きはスマホで完結します。</div>
      %%content%%
      <div class="ae-note">🔒 SSL暗号化通信で安全にお申し込みいただけます</div>
    </div>
  </div>
</body>
</html>
