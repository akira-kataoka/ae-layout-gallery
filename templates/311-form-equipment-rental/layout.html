<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0c1f2e; --muted:#5a7080; --line:#dbe7ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eff5fa; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-gear { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
    .ae-g { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 6px; text-align:center; box-shadow:0 6px 18px rgba(3,105,161,.05); }
    .ae-g .em { font-size:24px; } .ae-g .nm { font-size:11px; font-weight:700; } .ae-g .pr { font-size:11px; color:var(--accent); font-weight:800; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form input[type=number],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-gear { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">📷</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-gear">
      <div class="ae-g"><div class="em">📷</div><div class="nm">一眼カメラ</div><div class="pr">¥3,000/日</div></div>
      <div class="ae-g"><div class="em">🎥</div><div class="nm">ビデオ機材</div><div class="pr">¥5,000/日</div></div>
      <div class="ae-g"><div class="em">💡</div><div class="nm">照明セット</div><div class="pr">¥2,000/日</div></div>
      <div class="ae-g"><div class="em">🎤</div><div class="nm">音響・マイク</div><div class="pr">¥2,500/日</div></div>
    </div>
    <div class="ae-card">
      <div class="t">レンタルのお申し込み</div>
      %%content%%
    </div>
  </div>
</body>
</html>
