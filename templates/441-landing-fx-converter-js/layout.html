<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0e7490; --ink:#0a232a; --muted:#577680; --line:#d2e8ee; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#edfafd; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(14,116,144,.09); }
    .ae-field { margin-bottom:16px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-cur { display:flex; gap:10px; align-items:flex-end; }
    .ae-cur .c { flex:1; }
    .ae-cur .c label { font-size:12px; font-weight:700; color:var(--muted); display:block; margin-bottom:5px; }
    .ae-cur select { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#fff; }
    .ae-swap { flex:0 0 auto; }
    .ae-swap button { width:42px; height:42px; border-radius:50%; border:1px solid var(--line); background:#f0fafc; color:var(--accent); font-size:18px; cursor:pointer; }
    .ae-out { background:linear-gradient(135deg,#0891b2,#0e7490); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .from { font-size:13px; opacity:.9; } .ae-out .big { font-size:36px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.15; } .ae-out .rate { font-size:12px; opacity:.9; margin-top:6px; }
    .ae-note { font-size:11px; color:var(--muted); margin-top:12px; text-align:center; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>金額 <span class="v"><span id="vA">1,000</span></span></label>
        <input type="range" id="a" min="1" max="10000" step="1" value="1000"></div>
      <div class="ae-cur">
        <div class="c"><label>From</label>
          <select id="from">
            <option value="JPY" selected>🇯🇵 JPY 円</option>
            <option value="USD">🇺🇸 USD ドル</option>
            <option value="EUR">🇪🇺 EUR ユーロ</option>
            <option value="GBP">🇬🇧 GBP ポンド</option>
            <option value="AUD">🇦🇺 AUD 豪ドル</option>
            <option value="KRW">🇰🇷 KRW ウォン</option>
            <option value="CNY">🇨🇳 CNY 元</option>
          </select></div>
        <div class="ae-swap"><button type="button" id="swap" title="通貨を入れ替え">⇄</button></div>
        <div class="c"><label>To</label>
          <select id="to">
            <option value="JPY">🇯🇵 JPY 円</option>
            <option value="USD" selected>🇺🇸 USD ドル</option>
            <option value="EUR">🇪🇺 EUR ユーロ</option>
            <option value="GBP">🇬🇧 GBP ポンド</option>
            <option value="AUD">🇦🇺 AUD 豪ドル</option>
            <option value="KRW">🇰🇷 KRW ウォン</option>
            <option value="CNY">🇨🇳 CNY 元</option>
          </select></div>
      </div>
      <div class="ae-out">
        <div class="from"><span id="fromTxt">1,000 JPY</span> は</div>
        <div class="big"><span id="result">0</span> <span id="toCode">USD</span></div>
        <div class="rate" id="rate">—</div>
      </div>
      <div class="ae-note">※ 表示レートはサンプルです。実際の両替レートは金融機関にご確認ください。</div>
    </div>
    <div class="ae-cta">
      <div class="t">海外旅行・送金のお得情報を受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    // 1通貨あたりの円換算（サンプルレート）
    var JPY = { JPY:1, USD:155, EUR:168, GBP:197, AUD:103, KRW:0.112, CNY:21.4 };
    var a = document.getElementById("a"), vA = document.getElementById("vA");
    var from = document.getElementById("from"), to = document.getElementById("to"), swap = document.getElementById("swap");
    var result = document.getElementById("result"), toCode = document.getElementById("toCode");
    var fromTxt = document.getElementById("fromTxt"), rate = document.getElementById("rate");
    function fmt(n, code) {
      var d = (code === "JPY" || code === "KRW") ? 0 : 2;
      return n.toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });
    }
    function calc() {
      var amt = parseInt(a.value, 10) || 0;
      var f = from.value, t = to.value;
      vA.textContent = amt.toLocaleString();
      var inJpy = amt * JPY[f];
      var converted = inJpy / JPY[t];
      fromTxt.textContent = fmt(amt, f) + " " + f;
      result.textContent = fmt(converted, t);
      toCode.textContent = t;
      var one = JPY[f] / JPY[t];
      rate.textContent = "1 " + f + " = " + fmt(one, t) + " " + t;
    }
    a.addEventListener("input", calc);
    from.addEventListener("change", calc);
    to.addEventListener("change", calc);
    swap.addEventListener("click", function () {
      var tmp = from.value; from.value = to.value; to.value = tmp; calc();
    });
    calc();
  })();
  </script>
</body>
</html>
