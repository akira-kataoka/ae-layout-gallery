<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --a:#2563eb; --b:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3f6fb; line-height:1.7; }
    .ae-hero { background:linear-gradient(110deg,var(--a) 0%, var(--a) 48%, var(--b) 52%, var(--b) 100%); color:#fff; padding:46px 20px; text-align:center; }
    .ae-cobrand { display:inline-flex; align-items:center; gap:16px; margin-bottom:14px; }
    .ae-logo { background:rgba(255,255,255,.95); color:#0f172a; font-weight:800; padding:8px 16px; border-radius:10px; font-size:14px; }
    .ae-x { font-size:18px; opacity:.9; }
    .ae-hero h1 { margin:6px 0; font-size:26px; }
    .ae-hero p { margin:0; opacity:.92; }
    .ae-grid { max-width:980px; margin:28px auto; padding:0 20px 56px; display:grid; grid-template-columns:1.2fr .8fr; gap:30px; align-items:start; }
    .ae-detail h2 { margin-top:0; }
    .ae-detail .who { display:flex; gap:14px; margin-top:16px; }
    .ae-detail .who div { flex:1; background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; font-size:13px; }
    .ae-apply { background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(37,99,235,.10); padding:26px 24px; position:sticky; top:20px; }
    .ae-apply h3 { margin-top:0; }
    .ae-apply form input[type=text],.ae-apply form input[type=email],.ae-apply form select { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
    .ae-apply form p { margin:0 0 13px; }
    .ae-apply form .submit input,.ae-apply form button { width:100%; background:var(--a); color:#fff; border:0; padding:13px; border-radius:8px; font-weight:700; cursor:pointer; }
    @media (max-width:820px){ .ae-grid { grid-template-columns:1fr; } .ae-apply { position:static; } }
  </style>
</head>
<body>
  <header class="ae-hero">
    <div class="ae-cobrand"><span class="ae-logo">SAMPLE</span><span class="ae-x">×</span><span class="ae-logo">PARTNER</span></div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </header>
  <div class="ae-grid">
    <article class="ae-detail">
      %%content%%
      <div class="who"><div><b>主催</b><br>サンプル株式会社</div><div><b>共催</b><br>パートナー株式会社</div></div>
    </article>
    <aside class="ae-apply"><h3>参加登録</h3><p style="color:var(--muted);font-size:14px;margin-top:0;">両社共催の特別セッションです。</p></aside>
  </div>
</body>
</html>
