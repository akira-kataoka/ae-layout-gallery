<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --gold:#d4a13a; --ink:#2a1320; --muted:#8a657a; --line:#f4dde8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf2f7; line-height:1.7; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:54px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head .em { font-size:56px; line-height:1; margin-bottom:8px; }
    .ae-head h1 { font-size:25px; margin:0 0 6px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-gift { background:linear-gradient(135deg,#ec4899,#db2777); color:#fff; border-radius:18px; padding:28px 22px; text-align:center; margin:22px 0 18px; position:relative; overflow:hidden; box-shadow:0 16px 36px rgba(219,39,119,.28); }
    .ae-gift::after { content:"🎈"; position:absolute; right:-6px; top:-8px; font-size:60px; opacity:.35; }
    .ae-gift .lab { font-size:13px; opacity:.95; } .ae-gift .big { font-size:46px; font-weight:900; line-height:1.05; margin:2px 0; } .ae-gift .sub { font-size:13px; opacity:.95; }
    .ae-gift .code { display:inline-block; margin-top:12px; background:rgba(255,255,255,.18); border:1px dashed rgba(255,255,255,.65); border-radius:9px; padding:7px 18px; font-family:ui-monospace,Menlo,Consolas,monospace; font-weight:700; letter-spacing:2px; }
    .ae-valid { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 18px; text-align:center; font-size:13px; color:var(--muted); margin-bottom:18px; box-shadow:0 8px 22px rgba(219,39,119,.05); }
    .ae-valid b { color:var(--accent); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="em">🎂</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-gift">
      <div class="lab">お誕生日特別クーポン</div>
      <div class="big">1,000円 OFF</div>
      <div class="sub">日頃の感謝を込めて、あなただけにお贈りします</div>
      <div class="code">HAPPY-BIRTHDAY</div>
    </div>
    <div class="ae-valid">有効期限は<b>お誕生月の末日まで</b>。お買い物の際にクーポンコードをご入力ください。</div>
    <div class="ae-card">
      <div class="t">おすすめアイテム・限定情報を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
