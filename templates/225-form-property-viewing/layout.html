<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#b45309; --ink:#1c1410; --muted:#6b5d52; --line:#ece3d8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#faf6f0; line-height:1.7; }
    .ae-wrap { max-width:640px; margin:0 auto; padding:48px 20px; }
    .ae-prop { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:22px; box-shadow:0 10px 30px rgba(180,83,9,.07); }
    .ae-prop .photo { aspect-ratio:16/9; background:linear-gradient(135deg,#fbbf24,#b45309); display:flex; align-items:center; justify-content:center; font-size:54px; }
    .ae-prop .body { padding:18px 20px; }
    .ae-prop .tag { display:inline-block; background:#fff7ed; color:var(--accent); font-weight:700; font-size:12px; padding:3px 10px; border-radius:999px; margin-bottom:8px; }
    .ae-prop h1 { font-size:21px; margin:0 0 6px; }
    .ae-prop .meta { color:var(--muted); font-size:14px; }
    .ae-prop .price { font-size:24px; font-weight:900; color:var(--accent); margin-top:8px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:14px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-prop">
      <div class="photo">🏡</div>
      <div class="body">
        <span class="tag">NEW ・ 駅徒歩5分</span>
        <h1>サンシャインレジデンス 305号室</h1>
        <div class="meta">3LDK / 72.5㎡ / 南向き / 築3年</div>
        <div class="price">¥4,280<span style="font-size:14px;font-weight:700;">万</span></div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">%%title%%</div>
      <div class="s">%%description%%</div>
      %%content%%
    </div>
  </div>
</body>
</html>
