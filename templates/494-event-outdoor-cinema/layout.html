<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f59e0b; --ink:#e8eefc; --muted:#94a8c8; --line:#1e2c48; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#070d1c; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(180deg,#16223f,#0a1024 70%,#070b18); border:1px solid var(--line); border-radius:20px; padding:36px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 44px rgba(0,0,0,.55); }
    .ae-hero::after { content:"· ✦ · · ✦ · ✦ · · ✦ · ✦ · · ✦ ·"; position:absolute; top:12px; left:0; right:0; font-size:12px; letter-spacing:5px; color:rgba(245,158,11,.35); }
    .ae-hero .em { font-size:46px; margin-bottom:4px; }
    .ae-hero .badge { display:inline-block; border:1px solid var(--accent); color:var(--accent); font-weight:700; font-size:11px; letter-spacing:3px; padding:5px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; color:#fff; }
    .ae-hero p { margin:0; color:var(--muted); font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#0e1830; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-fun { background:#0e1830; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-fun .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#fff; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#0e1830; border:1px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#070d1c; color:#e8eefc; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#2a1c00; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🎬</div>
      <span class="badge">OPEN-AIR CINEMA</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">上映</div><div class="v">9.6 (土) 日没後 19:00〜</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">芝生の丘パーク</div></div>
      <div class="ae-i"><div class="ic">🎫</div><div class="k">料金</div><div class="v">¥1,200（飲み物付）</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">星空シネマのたのしみ</div>
      <div class="g">
        <div class="ae-f"><span class="e">🌌</span> 大スクリーンで名作を1本</div>
        <div class="ae-f"><span class="e">🪑</span> 寝転んで観られる芝生席</div>
        <div class="ae-f"><span class="e">🍿</span> ポップコーン＆キッチンカー</div>
        <div class="ae-f"><span class="e">🔥</span> 焚き火＆ブランケット貸出</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">チケット予約・上映情報の登録</div>
      <div class="d">座席数に限りがあります。雨天時の順延もご案内します</div>
      %%content%%
    </div>
  </div>
</body>
</html>
