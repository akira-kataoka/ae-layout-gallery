<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#b45309; --ink:#2a1c0a; --muted:#7c6a52; --line:#f0e4d2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf8f0; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .badge { display:inline-block; background:#fbe8cf; color:var(--accent); font-weight:700; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-pts { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .ae-pt { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 8px; text-align:center; }
    .ae-pt .ic { font-size:22px; } .ae-pt .k { font-size:12px; font-weight:700; margin-top:4px; } .ae-pt .d { font-size:11px; color:var(--muted); }
    .ae-urgent { background:#fff7ed; border:1px solid #fed7aa; border-radius:12px; padding:12px 16px; font-size:13px; color:#9a3412; text-align:center; margin-bottom:18px; }
    .ae-urgent b { font-size:16px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(180,83,9,.08); }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:440px){ .ae-pts { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">最短即日・出張対応</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-pts">
      <div class="ae-pt"><div class="ic">🔑</div><div class="k">鍵開け</div><div class="d">締め出し・紛失</div></div>
      <div class="ae-pt"><div class="ic">🔧</div><div class="k">鍵交換</div><div class="d">防犯性アップ</div></div>
      <div class="ae-pt"><div class="ic">🚪</div><div class="k">合鍵・修理</div><div class="d">特殊キーも</div></div>
    </div>
    <div class="ae-urgent">⏱️ お急ぎの方はお電話を <b>0120-000-000</b>（24時間受付）</div>
    <div class="ae-card">
      <div class="t">出張・お見積りのご依頼</div>
      <div class="s">トラブル内容と場所、ご希望時間をお選びください。最短で駆けつけます。</div>
      %%content%%
      <div class="ae-note">🔒 作業前に必ずお見積りをご提示。ご納得いただいてから作業します</div>
    </div>
  </div>
</body>
</html>
