<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9a3a5c; --ink:#2a151e; --muted:#8a6575; --line:#f0dde5; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf3f7; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .badge { display:inline-block; background:#f6dde7; color:var(--accent); font-weight:700; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-menu { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:22px; }
    .ae-m { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 6px; text-align:center; }
    .ae-m .ic { font-size:20px; } .ae-m .k { font-size:11px; font-weight:700; margin-top:2px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(154,58,92,.1); }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:420px){ .ae-menu { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">衣装・着付け・ヘアメイク込</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-menu">
      <div class="ae-m"><div class="ic">🎎</div><div class="k">七五三</div></div>
      <div class="ae-m"><div class="ic">🎓</div><div class="k">成人式</div></div>
      <div class="ae-m"><div class="ic">👨‍👩‍👧</div><div class="k">家族写真</div></div>
      <div class="ae-m"><div class="ic">👶</div><div class="k">お宮参り</div></div>
    </div>
    <div class="ae-card">
      <div class="t">撮影のご予約</div>
      <div class="s">撮影メニューと希望日時、人数をお選びください。空き状況をご案内します。</div>
      %%content%%
      <div class="ae-note">📷 自然光スタジオ＆経験豊富なフォトグラファーが対応します</div>
    </div>
  </div>
</body>
</html>
