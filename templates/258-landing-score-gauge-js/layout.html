<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2421; --muted:#5a746f; --line:#d8ebe7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fbf9; line-height:1.7; }
    .ae-wrap { max-width:720px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:28px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-gauges { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:30px; }
    .ae-g { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px 12px; text-align:center; box-shadow:0 8px 22px rgba(13,148,136,.07); }
    .ae-ring { width:120px; height:120px; border-radius:50%; margin:0 auto 12px; display:flex; align-items:center; justify-content:center; background:conic-gradient(var(--accent) 0deg, #e6f4f1 0deg); }
    .ae-ring .inner { width:90px; height:90px; border-radius:50%; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .ae-ring .v { font-size:26px; font-weight:900; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1; }
    .ae-ring .u { font-size:11px; color:var(--muted); }
    .ae-g .lbl { font-weight:700; font-size:14px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; text-align:center; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:560px){ .ae-gauges { grid-template-columns:1fr; } .ae-gauges .ae-g { display:flex; align-items:center; gap:16px; text-align:left; } .ae-ring { margin:0; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-gauges">
      <div class="ae-g"><div class="ae-ring" data-val="92"><div class="inner"><span class="v">0</span><span class="u">点</span></div></div><div class="lbl">顧客満足度</div></div>
      <div class="ae-g"><div class="ae-ring" data-val="98"><div class="inner"><span class="v">0</span><span class="u">%</span></div></div><div class="lbl">継続利用率</div></div>
      <div class="ae-g"><div class="ae-ring" data-val="87"><div class="inner"><span class="v">0</span><span class="u">%</span></div></div><div class="lbl">おすすめ度</div></div>
    </div>
    <div class="ae-card">
      <div class="t">選ばれる理由を、資料で詳しく</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var rings = Array.prototype.slice.call(document.querySelectorAll(".ae-ring"));
    function animate(ring) {
      var target = parseInt(ring.getAttribute("data-val"), 10) || 0;
      var vEl = ring.querySelector(".v");
      var start = null, dur = 1200;
      function step(ts) {
        if (start === null) start = ts;
        var p = Math.min((ts - start) / dur, 1);
        var eased = 1 - Math.pow(1 - p, 3);
        var cur = Math.round(target * eased);
        vEl.textContent = cur;
        ring.style.background = "conic-gradient(var(--accent) " + (cur * 3.6) + "deg, #e6f4f1 0deg)";
        if (p < 1) window.requestAnimationFrame(step);
      }
      window.requestAnimationFrame(step);
    }
    if ("IntersectionObserver" in window) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (en) {
          if (en.isIntersecting) { animate(en.target); io.unobserve(en.target); }
        });
      }, { threshold: 0.4 });
      rings.forEach(function (r) { io.observe(r); });
    } else {
      rings.forEach(animate);
    }
  })();
  </script>
</body>
</html>
