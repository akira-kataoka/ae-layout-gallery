<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#16a34a; --ink:#102417; --muted:#566b5d; --line:#d9ead9; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1faf3; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#4ade80,#16a34a); color:#fff; text-align:center; padding:50px 20px 40px; }
    .ae-hero .em { font-size:50px; }
    .ae-hero h1 { font-size:27px; margin:6px 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:34px 20px 48px; }
    .ae-info { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; box-shadow:0 8px 22px rgba(22,163,74,.06); }
    .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:15px; }
    .ae-act { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:24px; }
    .ae-act .t { font-weight:700; text-align:center; margin-bottom:12px; }
    .ae-a { display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-a:first-of-type { border-top:0; }
    .ae-a .em { font-size:22px; }
    .ae-safe { background:#f0fdf4; border:1px solid var(--line); border-radius:12px; padding:14px 16px; font-size:12px; color:#33514c; margin-bottom:24px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=number],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <div class="em">⛺</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-i"><div class="k">日程</div><div class="v">8.05 (火) – 8.07 (木) 2泊3日</div></div>
      <div class="ae-i"><div class="k">対象</div><div class="v">小学1〜6年生</div></div>
      <div class="ae-i"><div class="k">場所</div><div class="v">高原自然の家</div></div>
      <div class="ae-i"><div class="k">参加費</div><div class="v">28,000円（食事・保険込）</div></div>
    </div>
    <div class="ae-act">
      <div class="t">体験プログラム</div>
      <div class="ae-a"><span class="em">🏞️</span><span>川遊び・ネイチャーハイク</span></div>
      <div class="ae-a"><span class="em">🔥</span><span>飯ごう炊さん・キャンプファイヤー</span></div>
      <div class="ae-a"><span class="em">🔭</span><span>星空観察・自由研究サポート</span></div>
    </div>
    <div class="ae-safe">看護師が同行し、引率スタッフは子ども4〜5名に1名体制。アレルギー対応・緊急連絡体制も整えています。</div>
    <div class="ae-card">
      <div class="t">参加のお申し込み</div>
      <div class="d">先着順・定員になり次第締め切ります</div>
      %%content%%
    </div>
  </div>
</body>
</html>
