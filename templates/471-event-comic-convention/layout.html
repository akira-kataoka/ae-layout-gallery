<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --cyan:#06b6d4; --ink:#f2e9ff; --muted:#b39cd0; --line:#34234f; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#150a24; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(135deg,#db2777,#7c3aed 55%,#06b6d4); color:#fff; border-radius:20px; padding:34px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 44px rgba(124,58,237,.32); }
    .ae-hero::after { content:"★ ☆ ★ ☆ ★ ☆ ★ ☆ ★ ☆ ★"; position:absolute; top:12px; left:0; right:0; font-size:13px; letter-spacing:5px; opacity:.4; }
    .ae-hero .em { font-size:44px; margin-bottom:2px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; text-shadow:0 2px 12px rgba(0,0,0,.25); }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#21133a; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-fun { background:#21133a; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-fun .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#fff; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#21133a; border:1px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#150a24; color:#f2e9ff; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:linear-gradient(90deg,#db2777,#06b6d4); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🎀</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">11.22–11.23 10:00–17:00</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">国際展示ホール</div></div>
      <div class="ae-i"><div class="ic">🎫</div><div class="k">前売券</div><div class="v">1日 ¥1,500</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">みどころ</div>
      <div class="g">
        <div class="ae-f"><span class="e">🛒</span> 同人誌・グッズの物販エリア</div>
        <div class="ae-f"><span class="e">👗</span> コスプレ撮影＆コンテスト</div>
        <div class="ae-f"><span class="e">🎤</span> 声優・クリエイターのステージ</div>
        <div class="ae-f"><span class="e">🖊️</span> イラスト・サイン会</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">前売券の予約・最新情報の登録</div>
      <div class="d">ゲスト情報や物販の事前抽選をいち早くお届けします</div>
      %%content%%
    </div>
  </div>
</body>
</html>
