<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#3a1228; --muted:#9c6d83; --line:#f6dde8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf2f7; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(160deg,#fbcfe8,#f9a8d4 70%,#f472b6); color:#fff; border-radius:20px; padding:34px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(219,39,119,.2); }
    .ae-hero::after { content:"🌸 ❀ 🌸 ❀ 🌸 ❀ 🌸 ❀ 🌸 ❀"; position:absolute; top:10px; left:0; right:0; font-size:13px; letter-spacing:5px; opacity:.55; }
    .ae-hero .em { font-size:44px; margin-bottom:4px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; color:#fff; text-shadow:0 1px 8px rgba(190,24,93,.3); }
    .ae-hero p { margin:0; font-size:14px; color:#fff; opacity:.95; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:22px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-fun { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-fun .t { font-weight:700; font-size:14px; margin-bottom:12px; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🌸</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">4.5 (土) 11:00–17:00</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">さくら公園</div></div>
      <div class="ae-i"><div class="ic">🌤️</div><div class="k">雨天</div><div class="v">翌日順延</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">お花見の楽しみ</div>
      <div class="g">
        <div class="ae-f"><span class="e">🍱</span> 桜並木のキッチンカー＆屋台</div>
        <div class="ae-f"><span class="e">🎶</span> 和楽器＆アコースティックライブ</div>
        <div class="ae-f"><span class="e">🍵</span> 野点（のだて）茶席体験</div>
        <div class="ae-f"><span class="e">🏮</span> 夜桜ライトアップ（18時〜）</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">来場予約・開花情報の登録</div>
      <div class="d">満開の見頃やイベント詳細をいち早くお知らせします</div>
      %%content%%
    </div>
  </div>
</body>
</html>
