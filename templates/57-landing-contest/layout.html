<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f43f5e; --gold:#fbbf24; --ink:#1a1020; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#fff; line-height:1.7;
      background:radial-gradient(900px 500px at 50% -10%,#7c3aed,transparent), linear-gradient(160deg,#2e1065,#1a1020); }
    .ae-wrap { max-width:680px; margin:0 auto; padding:54px 20px; text-align:center; }
    .ae-conf { font-size:30px; letter-spacing:4px; }
    .ae-wrap h1 { font-size:clamp(28px,6vw,44px); margin:10px 0; }
    .ae-wrap h1 b { color:var(--gold); }
    .ae-prize { display:inline-block; background:linear-gradient(120deg,var(--gold),#f59e0b); color:#3b2406; font-weight:800; padding:10px 24px; border-radius:14px; margin:8px 0 22px; box-shadow:0 10px 30px rgba(251,191,36,.35); }
    .ae-sub { color:#e9d5ff; margin:0 0 22px; }
    .ae-card { background:#fff; color:var(--ink); border-radius:18px; padding:30px 28px; box-shadow:0 18px 50px rgba(0,0,0,.4); }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:13px 14px; border:1px solid #e5e7eb; border-radius:10px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; }
    .ae-deadline { margin-top:18px; font-size:13px; color:#fca5a5; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-conf">🎉 ✨ 🎊 ✨ 🎉</div>
    <h1>%%title%%</h1>
    <div class="ae-prize">🏆 豪華賞品が当たる</div>
    <p class="ae-sub">%%description%%</p>
    <div class="ae-card">%%content%%</div>
    <div class="ae-deadline">応募締切：2026年7月31日 23:59</div>
  </div>
</body>
</html>
