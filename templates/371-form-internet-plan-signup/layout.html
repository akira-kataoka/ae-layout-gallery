<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1d4ed8; --ink:#0f1b33; --muted:#5a6781; --line:#dde3ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f2f5fb; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-plans { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .ae-p { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 10px; text-align:center; box-shadow:0 6px 18px rgba(29,78,216,.05); }
    .ae-p.pop { border-color:var(--accent); position:relative; }
    .ae-p.pop::before { content:"人気"; position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:2px 10px; border-radius:999px; }
    .ae-p .nm { font-weight:800; font-size:13px; } .ae-p .sp { font-size:11px; color:var(--muted); } .ae-p .pr { color:var(--accent); font-weight:900; font-size:15px; margin-top:4px; }
    .ae-banner { background:linear-gradient(135deg,#1d4ed8,#3b82f6); color:#fff; border-radius:14px; padding:14px; text-align:center; margin-bottom:20px; }
    .ae-banner .big { font-size:18px; font-weight:900; } .ae-banner .sm { font-size:12px; opacity:.92; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:440px){ .ae-plans { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🌐</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-plans">
      <div class="ae-p"><div class="nm">マンション</div><div class="sp">最大1Gbps</div><div class="pr">¥3,850/月</div></div>
      <div class="ae-p pop"><div class="nm">ファミリー</div><div class="sp">最大1Gbps</div><div class="pr">¥4,950/月</div></div>
      <div class="ae-p"><div class="nm">10ギガ</div><div class="sp">最大10Gbps</div><div class="pr">¥6,380/月</div></div>
    </div>
    <div class="ae-banner">
      <div class="big">工事費実質0円＋3万円キャッシュバック</div>
      <div class="sm">他社からの乗り換えで違約金も還元</div>
    </div>
    <div class="ae-card">
      <div class="t">お申し込み・無料相談</div>
      %%content%%
    </div>
  </div>
</body>
</html>
