<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fdfa; line-height:1.7; }
    .ae-wrap { max-width:640px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { margin:0 0 6px; font-size:25px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-est { background:linear-gradient(135deg,#0d9488,#0891b2); color:#fff; border-radius:16px; padding:22px; text-align:center; margin-bottom:18px; }
    .ae-est .lbl { font-size:13px; opacity:.9; }
    .ae-est .val { font-size:36px; font-weight:800; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 8px 26px rgba(13,148,136,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=number],.ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form .row { display:flex; gap:14px; } .ae-card form .row > p { flex:1; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
    @media (max-width:520px){ .ae-card form .row { flex-direction:column; gap:0; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-est"><div class="lbl">想定される年間削減額</div><div class="val">¥3,840,000</div></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
