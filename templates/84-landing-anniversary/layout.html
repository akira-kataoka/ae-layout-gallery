<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9333ea; --gold:#facc15; --ink:#1a0f2e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#fff; line-height:1.7;
      background:radial-gradient(900px 500px at 50% -10%,#7e22ce,transparent), linear-gradient(160deg,#2e1065,#1a0f2e); }
    .ae-wrap { max-width:640px; margin:0 auto; padding:56px 20px; text-align:center; }
    .ae-conf { font-size:30px; letter-spacing:4px; }
    .ae-big { font-size:clamp(54px,16vw,110px); font-weight:900; line-height:.95; background:linear-gradient(120deg,var(--gold),#fb923c); -webkit-background-clip:text; background-clip:text; color:transparent; margin:8px 0; }
    .ae-wrap h1 { font-size:24px; margin:0 0 8px; }
    .ae-sub { color:#e9d5ff; margin:0 0 22px; }
    .ae-offer { display:inline-block; border:2px dashed var(--gold); color:var(--gold); padding:10px 22px; border-radius:14px; font-weight:800; margin-bottom:24px; }
    .ae-card { background:#fff; color:var(--ink); border-radius:18px; padding:30px 28px; box-shadow:0 18px 50px rgba(0,0,0,.4); }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:13px 14px; border:1px solid #e5e7eb; border-radius:10px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-conf">🎉 🎊 ✨ 🎊 🎉</div>
    <div class="ae-big">10th</div>
    <h1>%%title%%</h1>
    <p class="ae-sub">%%description%%</p>
    <div class="ae-offer">記念クーポン・抽選プレゼント実施中</div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
