<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#dc2626; --ink:#2a1212; --muted:#6e5555; --line:#f3dcdc; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf3f3; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; text-align:center; padding:50px 20px 40px; }
    .ae-hero .em { font-size:50px; }
    .ae-hero h1 { font-size:27px; margin:6px 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:34px 20px 48px; }
    .ae-info { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; box-shadow:0 8px 22px rgba(220,38,38,.06); }
    .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:15px; }
    .ae-need { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-bottom:24px; }
    .ae-need .t { font-weight:700; margin-bottom:10px; text-align:center; }
    .ae-types { display:flex; gap:8px; justify-content:center; }
    .ae-bt { width:50px; height:50px; border-radius:50%; background:#fef2f2; border:2px solid var(--accent); color:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:15px; }
    .ae-cond { font-size:12px; color:var(--muted); text-align:center; margin-bottom:24px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <div class="em">🩸</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-i"><div class="k">実施日</div><div class="v">10.12 (日) 10:00–16:00</div></div>
      <div class="ae-i"><div class="k">会場</div><div class="v">市民センター ロビー</div></div>
      <div class="ae-i"><div class="k">対象</div><div class="v">16〜69歳の健康な方</div></div>
      <div class="ae-i"><div class="k">所要時間</div><div class="v">約40分（受付含む）</div></div>
    </div>
    <div class="ae-need">
      <div class="t">特に不足している血液型</div>
      <div class="ae-types"><span class="ae-bt">A−</span><span class="ae-bt">O−</span><span class="ae-bt">B−</span><span class="ae-bt">AB−</span></div>
    </div>
    <p class="ae-cond">※ 当日の体調・服薬状況により、ご協力いただけない場合があります。本人確認書類をお持ちください。</p>
    <div class="ae-card">
      <div class="t">事前予約で待ち時間を短縮</div>
      <div class="d">ご予約の方を優先してご案内します（当日参加も歓迎）</div>
      %%content%%
    </div>
  </div>
</body>
</html>
