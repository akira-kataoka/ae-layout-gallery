<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0a2030; --muted:#577084; --line:#d3e6f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef7fc; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg,#38bdf8,#0369a1); color:#fff; display:flex; align-items:center; justify-content:center; font-size:34px; margin:0 auto 16px; box-shadow:0 14px 32px rgba(3,105,161,.26); }
    .ae-done h1 { font-size:24px; margin:0 0 6px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-appt { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:18px; box-shadow:0 8px 22px rgba(3,105,161,.06); }
    .ae-appt .row { display:flex; gap:12px; align-items:center; padding:10px 0; border-top:1px solid var(--line); }
    .ae-appt .row:first-child { border-top:0; }
    .ae-appt .ic { width:40px; height:40px; border-radius:11px; background:#e0f2fe; display:flex; align-items:center; justify-content:center; font-size:20px; flex:0 0 auto; }
    .ae-appt .k { font-size:12px; color:var(--muted); } .ae-appt .v { font-weight:700; font-size:14px; }
    .ae-prep { background:#e0f2fe; border:1px solid #bae6fd; border-radius:14px; padding:16px 18px; margin-bottom:18px; }
    .ae-prep .t { font-weight:700; font-size:13px; margin-bottom:8px; }
    .ae-p { display:flex; gap:10px; padding:4px 0; font-size:13px; color:#075985; } .ae-p .e { flex:0 0 auto; }
    .ae-cal { display:flex; gap:10px; margin-bottom:18px; }
    .ae-cal a { flex:1; text-align:center; background:#fff; border:1px solid var(--line); border-radius:11px; padding:12px; font-size:13px; font-weight:700; color:var(--accent); text-decoration:none; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">🛠️</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-appt">
      <div class="row"><div class="ic">📦</div><div><div class="k">工事内容</div><div class="v">エアコン取付け工事</div></div></div>
      <div class="row"><div class="ic">📅</div><div><div class="k">工事日時</div><div class="v">7月22日（火）13:00〜15:00</div></div></div>
      <div class="row"><div class="ic">👷</div><div><div class="k">担当</div><div class="v">工事スタッフ2名</div></div></div>
      <div class="row"><div class="ic">📍</div><div><div class="k">訪問先</div><div class="v">ご登録のご住所</div></div></div>
    </div>
    <div class="ae-prep">
      <div class="t">工事当日までのお願い</div>
      <div class="ae-p"><span class="e">🚪</span><span>設置場所まわりの片付けにご協力ください</span></div>
      <div class="ae-p"><span class="e">🅿️</span><span>作業車1台分の駐車スペースの確保をお願いします</span></div>
      <div class="ae-p"><span class="e">📞</span><span>日程変更は前日までにご連絡ください</span></div>
    </div>
    <div class="ae-cal">
      <a href="#">📅 カレンダーに追加</a>
      <a href="#">🔁 日程を変更</a>
    </div>
    <div class="ae-card">
      <div class="t">メンテナンス・お得情報を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
