<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f6fb; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .ic { font-size:38px; }
    .ae-head h1 { margin:6px 0; font-size:23px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-current { background:#fff; border:1px solid var(--line); border-left:4px solid var(--accent); border-radius:10px; padding:14px 16px; margin-bottom:16px; font-size:14px; }
    .ae-current .lbl { color:var(--muted); font-size:12px; } .ae-current b { display:block; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 8px 24px rgba(3,105,161,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form .opt { display:inline-flex; gap:6px; align-items:center; margin:2px 14px 2px 0; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ic">🗓️</div><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-current"><span class="lbl">現在のご予約</span><b>2026年7月10日（木）14:00 — オンライン相談</b></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
