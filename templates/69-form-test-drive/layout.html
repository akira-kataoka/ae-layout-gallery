<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1e293b; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f5f9; line-height:1.7; }
    .ae-grid { max-width:920px; margin:0 auto; padding:48px 20px; display:grid; grid-template-columns:1fr 1.05fr; gap:0; background:#fff; border-radius:18px; overflow:hidden; box-shadow:0 12px 40px rgba(15,23,42,.12); }
    .ae-visual { background:linear-gradient(160deg,#0f172a,#334155); color:#fff; padding:40px 32px; display:flex; flex-direction:column; justify-content:center; }
    .ae-visual .big { font-size:60px; }
    .ae-visual h1 { font-size:24px; margin:14px 0 8px; }
    .ae-visual p { opacity:.8; margin:0; }
    .ae-form { padding:36px 32px; }
    .ae-form h2 { margin-top:0; font-size:18px; }
    .ae-form form label { font-size:13px; font-weight:600; }
    .ae-form form input[type=text],.ae-form form input[type=email],.ae-form form input[type=tel],.ae-form form input[type=date],.ae-form form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-form form .row { display:flex; gap:12px; } .ae-form form .row > p { flex:1; }
    .ae-form form p { margin:0 0 14px; }
    .ae-form form .submit input,.ae-form form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
    @media (max-width:720px){ .ae-grid { grid-template-columns:1fr; } }
    @media (max-width:480px){ form .row{ flex-direction:column; gap:0; } }
  </style>
</head>
<body>
  <div class="ae-grid">
    <section class="ae-visual"><div class="big">🚗</div><h1>%%title%%</h1><p>%%description%%</p></section>
    <section class="ae-form"><h2>体験予約フォーム</h2>%%content%%</section>
  </div>
</body>
</html>
