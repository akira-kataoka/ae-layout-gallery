<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0c1f2e; --muted:#5a7080; --line:#dbe7ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef5fa; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#0369a1,#0e7490); color:#fff; text-align:center; padding:52px 20px 40px; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.18); font-weight:700; font-size:13px; padding:6px 16px; border-radius:999px; margin-bottom:14px; }
    .ae-hero h1 { font-size:28px; margin:0 0 10px; }
    .ae-hero .info { font-size:14px; opacity:.95; }
    .ae-wrap { max-width:820px; margin:0 auto; padding:34px 20px 48px; }
    .ae-meta { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:-58px 0 30px; }
    .ae-chip { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 18px; text-align:center; box-shadow:0 8px 22px rgba(3,105,161,.1); min-width:140px; }
    .ae-chip .k { font-size:11px; color:var(--muted); } .ae-chip .v { font-weight:800; font-size:15px; }
    .ae-sub { text-align:center; font-weight:700; margin:0 0 16px; }
    .ae-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:30px; }
    .ae-co { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px 10px; text-align:center; }
    .ae-co .lg { width:46px; height:46px; border-radius:10px; margin:0 auto 8px; display:flex; align-items:center; justify-content:center; font-size:22px; color:#fff; }
    .ae-co .nm { font-size:12px; font-weight:700; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; text-align:center; }
    .ae-cta .t { font-weight:700; font-size:18px; margin-bottom:4px; }
    .ae-cta .d { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email],.ae-cta form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:640px){ .ae-grid { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">入退場自由・服装自由</span>
    <h1>%%title%%</h1>
    <div class="info">2026.08.09(日) 11:00–17:00 ／ 東京国際フォーラム</div>
  </div>
  <div class="ae-wrap">
    <div class="ae-meta">
      <div class="ae-chip"><div class="k">参加企業</div><div class="v">40社</div></div>
      <div class="ae-chip"><div class="k">対象</div><div class="v">第二新卒〜中堅</div></div>
      <div class="ae-chip"><div class="k">参加費</div><div class="v">無料</div></div>
    </div>
    <p class="ae-sub">参加企業（一部）</p>
    <div class="ae-grid">
      <div class="ae-co"><div class="lg" style="background:#0369a1">N</div><div class="nm">ノヴァ商事</div></div>
      <div class="ae-co"><div class="lg" style="background:#7c3aed">T</div><div class="nm">テックラボ</div></div>
      <div class="ae-co"><div class="lg" style="background:#059669">G</div><div class="nm">グリーンワークス</div></div>
      <div class="ae-co"><div class="lg" style="background:#db2777">M</div><div class="nm">みらい製作所</div></div>
      <div class="ae-co"><div class="lg" style="background:#d97706">S</div><div class="nm">サンライズ物流</div></div>
      <div class="ae-co"><div class="lg" style="background:#0e7490">A</div><div class="nm">アクアシステム</div></div>
      <div class="ae-co"><div class="lg" style="background:#4f46e5">B</div><div class="nm">ブルームデザイン</div></div>
      <div class="ae-co"><div class="lg" style="background:#be123c">K</div><div class="nm">改革コンサル</div></div>
    </div>
    <div class="ae-cta">
      <div class="t">来場予約をする</div>
      <div class="d">事前予約で優先入場＆来場特典をプレゼント</div>
      %%content%%
    </div>
  </div>
</body>
</html>
