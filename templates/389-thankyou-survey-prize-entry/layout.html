<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9333ea; --ink:#1c1430; --muted:#6b6480; --line:#ece5f7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#faf8fe; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .em { font-size:52px; }
    .ae-done h1 { font-size:23px; margin:4px 0 4px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-prize { background:linear-gradient(135deg,#a855f7,#7c3aed); color:#fff; border-radius:18px; padding:24px; text-align:center; margin-bottom:18px; box-shadow:0 14px 36px rgba(147,51,234,.25); }
    .ae-prize .ic { font-size:34px; } .ae-prize .nm { font-size:18px; font-weight:900; margin:4px 0; } .ae-prize .sub { font-size:13px; opacity:.92; }
    .ae-meta { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:22px; box-shadow:0 8px 22px rgba(147,51,234,.06); }
    .ae-meta div { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
    .ae-meta .k { color:var(--muted); } .ae-meta b { color:var(--ink); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="em">🎊</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-prize">
      <div class="ic">🎁</div>
      <div class="nm">人気家電セット ほか豪華賞品</div>
      <div class="sub">抽選で合計100名さまに当たる！</div>
    </div>
    <div class="ae-meta">
      <div><span class="k">応募番号</span><b>PR-20260611-2048</b></div>
      <div><span class="k">抽選結果の発表</span><b>2026年7月上旬（賞品の発送をもって）</b></div>
    </div>
    <div class="ae-card">
      <div class="t">当選結果・次回キャンペーンのお知らせを受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
