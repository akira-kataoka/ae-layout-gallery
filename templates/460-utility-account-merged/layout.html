<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2622; --muted:#5a766e; --line:#d4ebe6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eefaf7; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .chk { width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg,#2dd4bf,#0d9488); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 16px; box-shadow:0 14px 32px rgba(13,148,136,.28); }
    .ae-head h1 { font-size:23px; margin:0 0 6px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-merge { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:18px; }
    .ae-acc { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 12px; text-align:center; min-width:96px; }
    .ae-acc .av { width:34px; height:34px; border-radius:50%; background:#e0f2ef; display:flex; align-items:center; justify-content:center; font-size:17px; margin:0 auto 6px; }
    .ae-acc .em { font-size:12px; color:var(--muted); word-break:break-all; }
    .ae-acc.primary { border-color:var(--accent); box-shadow:0 6px 16px rgba(13,148,136,.14); }
    .ae-plus { font-size:20px; color:var(--accent); font-weight:800; }
    .ae-keep { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:18px; box-shadow:0 8px 22px rgba(13,148,136,.05); }
    .ae-keep .t { font-weight:700; font-size:13px; margin-bottom:8px; }
    .ae-k { display:flex; gap:10px; padding:5px 0; font-size:13px; } .ae-k .e { color:var(--accent); flex:0 0 auto; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    .ae-foot { font-size:12px; color:var(--muted); text-align:center; margin-top:14px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-merge">
      <div class="ae-acc"><div class="av">👤</div><div class="em">old@example.com</div></div>
      <div class="ae-plus">→</div>
      <div class="ae-acc primary"><div class="av">⭐</div><div class="em">taro@example.com</div></div>
    </div>
    <div class="ae-keep">
      <div class="t">統合された内容</div>
      <div class="ae-k"><span class="e">✓</span><span>購入履歴・ポイントはすべて引き継がれました</span></div>
      <div class="ae-k"><span class="e">✓</span><span>お気に入り・保存データを1つに集約</span></div>
      <div class="ae-k"><span class="e">✓</span><span>今後はメインのアカウントでログインしてください</span></div>
    </div>
    <div class="ae-card">
      <div class="t">アカウントに関するお知らせを受け取る</div>
      %%content%%
      <div class="ae-foot">🔒 旧アカウントは無効化されました。ご不明な点はサポートまで</div>
    </div>
  </div>
</body>
</html>
