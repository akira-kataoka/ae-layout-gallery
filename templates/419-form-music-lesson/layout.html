<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#241638; --muted:#6f6488; --line:#e7e0f5; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f6f3fc; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .badge { display:inline-block; background:#ece4fb; color:var(--accent); font-weight:700; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-inst { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:22px; }
    .ae-in { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 6px; text-align:center; }
    .ae-in .ic { font-size:22px; } .ae-in .k { font-size:11px; font-weight:700; margin-top:2px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(124,58,237,.08); }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:420px){ .ae-inst { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">体験レッスン 無料</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-inst">
      <div class="ae-in"><div class="ic">🎹</div><div class="k">ピアノ</div></div>
      <div class="ae-in"><div class="ic">🎸</div><div class="k">ギター</div></div>
      <div class="ae-in"><div class="ic">🎻</div><div class="k">バイオリン</div></div>
      <div class="ae-in"><div class="ic">🎤</div><div class="k">ボーカル</div></div>
    </div>
    <div class="ae-card">
      <div class="t">無料体験レッスンのお申し込み</div>
      <div class="s">ご希望の楽器・コースと体験希望日をご入力ください。講師よりご連絡します。</div>
      %%content%%
      <div class="ae-note">🎵 楽器が無くてもOK。お子さまから大人まで歓迎です</div>
    </div>
  </div>
</body>
</html>
