<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#27121d; --muted:#6b5560; --line:#f0dde6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf2f8; line-height:1.7; }
    .ae-wrap { max-width:820px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:26px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:30px; }
    .ae-flip { background:transparent; perspective:1000px; height:200px; border:0; padding:0; cursor:pointer; font-family:inherit; }
    .ae-inner { position:relative; width:100%; height:100%; transition:transform .55s; transform-style:preserve-3d; }
    .ae-flip.flipped .ae-inner { transform:rotateY(180deg); }
    .ae-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:16px; padding:22px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; box-shadow:0 10px 26px rgba(219,39,119,.12); }
    .ae-front { background:#fff; border:1px solid var(--line); }
    .ae-front .emo { font-size:40px; margin-bottom:8px; }
    .ae-front .ti { font-weight:800; font-size:16px; }
    .ae-front .hint { font-size:11px; color:var(--muted); margin-top:8px; }
    .ae-back { background:linear-gradient(135deg,#db2777,#9333ea); color:#fff; transform:rotateY(180deg); }
    .ae-back p { margin:0; font-size:13px; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; text-align:center; }
    .ae-cta .t { font-weight:700; font-size:17px; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:680px){ .ae-grid { grid-template-columns:1fr; } .ae-flip { height:160px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-grid">
      <button type="button" class="ae-flip"><div class="ae-inner">
        <div class="ae-face ae-front"><div class="emo">⚡</div><div class="ti">スピード導入</div><div class="hint">タップして詳細</div></div>
        <div class="ae-face ae-back"><p>最短即日で利用開始。面倒な初期設定はテンプレートにお任せください。</p></div></div></button>
      <button type="button" class="ae-flip"><div class="ae-inner">
        <div class="ae-face ae-front"><div class="emo">🔒</div><div class="ti">安心セキュリティ</div><div class="hint">タップして詳細</div></div>
        <div class="ae-face ae-back"><p>通信は常時暗号化。第三者認証も取得済みで、機密データも安全に扱えます。</p></div></div></button>
      <button type="button" class="ae-flip"><div class="ae-inner">
        <div class="ae-face ae-front"><div class="emo">🤝</div><div class="ti">手厚いサポート</div><div class="hint">タップして詳細</div></div>
        <div class="ae-face ae-back"><p>専任担当が伴走。導入から運用定着まで、チャットでいつでも相談できます。</p></div></div></button>
    </div>
    <div class="ae-cta">
      <div class="t">資料請求・無料デモのお申し込み</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    Array.prototype.forEach.call(document.querySelectorAll(".ae-flip"), function (card) {
      card.addEventListener("click", function () { card.classList.toggle("flipped"); });
    });
  })();
  </script>
</body>
</html>
