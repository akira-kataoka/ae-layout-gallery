<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0a2030; --muted:#577084; --line:#d3e6f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef7fc; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(3,105,161,.09); }
    .ae-field { margin-bottom:18px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-out { background:linear-gradient(135deg,#0ea5e9,#0369a1); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .lab { font-size:13px; opacity:.9; } .ae-out .big { font-size:40px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-out .big small { font-size:15px; } .ae-out .sub { font-size:13px; opacity:.95; margin-top:6px; }
    .ae-row2 { display:flex; gap:8px; margin-top:14px; }
    .ae-g { flex:1; background:rgba(255,255,255,.15); border-radius:10px; padding:10px 6px; }
    .ae-g .k { font-size:11px; opacity:.9; } .ae-g .n { font-weight:800; font-variant-numeric:tabular-nums; }
    .ae-note { font-size:11px; color:var(--muted); margin-top:12px; text-align:center; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>商品の原価（仕入値） <span class="v">¥<span id="vC">1000</span></span></label>
        <input type="range" id="c" min="50" max="50000" step="50" value="1000"></div>
      <div class="ae-field"><label>目標の粗利率 <span class="v"><span id="vM">40</span>%</span></label>
        <input type="range" id="m" min="5" max="85" step="1" value="40"></div>
      <div class="ae-out">
        <div class="lab">設定すべき販売価格</div>
        <div class="big">¥<span id="price">0</span></div>
        <div class="sub">この価格なら目標の利益率を確保できます</div>
        <div class="ae-row2">
          <div class="ae-g"><div class="k">1個あたり粗利</div><div class="n">¥<span id="profit">0</span></div></div>
          <div class="ae-g"><div class="k">原価に対する利益率(値入率)</div><div class="n"><span id="markup">0</span>%</div></div>
        </div>
      </div>
      <div class="ae-note">※ 粗利率＝利益÷売価。値入率＝利益÷原価。税抜の概算です。</div>
    </div>
    <div class="ae-cta">
      <div class="t">価格戦略・利益改善のヒントを受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var c = document.getElementById("c"), m = document.getElementById("m");
    var vC = document.getElementById("vC"), vM = document.getElementById("vM");
    var priceEl = document.getElementById("price"), profitEl = document.getElementById("profit"), markupEl = document.getElementById("markup");
    function calc() {
      var cost = parseInt(c.value, 10) || 0;
      var margin = (parseInt(m.value, 10) || 0) / 100;
      vC.textContent = cost.toLocaleString();
      vM.textContent = parseInt(m.value, 10) || 0;
      var price = margin < 1 ? cost / (1 - margin) : cost;
      var profit = price - cost;
      priceEl.textContent = Math.round(price).toLocaleString();
      profitEl.textContent = Math.round(profit).toLocaleString();
      markupEl.textContent = cost > 0 ? Math.round(profit / cost * 100) : 0;
    }
    [c, m].forEach(function (el) { el.addEventListener("input", calc); });
    calc();
  })();
  </script>
</body>
</html>
