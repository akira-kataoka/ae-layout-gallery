<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f8fafc; line-height:1.7; }
    .ae-head { text-align:center; padding:56px 20px 8px; }
    .ae-head h1 { font-size:30px; margin:0 0 10px; }
    .ae-head p { color:var(--muted); max-width:560px; margin:0 auto; }
    .ae-plans { max-width:1040px; margin:0 auto; padding:32px 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:20px; align-items:stretch; }
    .ae-plan { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 26px; display:flex; flex-direction:column; }
    .ae-plan.pop { border:2px solid var(--accent); box-shadow:0 14px 40px rgba(79,70,229,.18); position:relative; }
    .ae-plan.pop::after { content:"人気"; position:absolute; top:-12px; right:20px; background:var(--accent); color:#fff; font-size:12px; font-weight:700; padding:4px 12px; border-radius:999px; }
    .ae-plan h3 { margin:0 0 6px; }
    .ae-price { font-size:32px; font-weight:800; }
    .ae-price small { font-size:14px; color:var(--muted); font-weight:400; }
    .ae-plan ul { list-style:none; padding:0; margin:18px 0; flex:1; }
    .ae-plan li { padding:7px 0 7px 24px; position:relative; font-size:14px; }
    .ae-plan li::before { content:"✓"; position:absolute; left:0; color:var(--accent); font-weight:700; }
    .ae-plan a { display:block; text-align:center; text-decoration:none; padding:12px; border-radius:9px; font-weight:700; background:#eef2ff; color:var(--accent); }
    .ae-plan.pop a { background:var(--accent); color:#fff; }
    .ae-body { max-width:760px; margin:8px auto 56px; padding:0 20px; color:var(--muted); text-align:center; }
    .ae-body form input[type=text],.ae-body form input[type=email],.ae-body form input[type=tel],.ae-body form select,.ae-body form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px; font-size:15px; font-family:inherit; }
    .ae-body form p { margin:0 0 12px; text-align:left; }
    .ae-body form .submit input,.ae-body form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
    @media (max-width:820px){ .ae-plans { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></header>
  <section class="ae-plans">
    <div class="ae-plan"><h3>Starter</h3><div class="ae-price">¥0<small>/月</small></div><ul><li>基本機能</li><li>1ユーザー</li><li>コミュニティサポート</li></ul><a href="#">無料で始める</a></div>
    <div class="ae-plan pop"><h3>Business</h3><div class="ae-price">¥9,800<small>/月</small></div><ul><li>全機能</li><li>10ユーザー</li><li>メールサポート</li><li>連携機能</li></ul><a href="#">申し込む</a></div>
    <div class="ae-plan"><h3>Enterprise</h3><div class="ae-price">お問合せ</div><ul><li>無制限ユーザー</li><li>専任サポート</li><li>SLA / SSO</li></ul><a href="#">相談する</a></div>
  </section>
  <section class="ae-body">%%content%%</section>
</body>
</html>
