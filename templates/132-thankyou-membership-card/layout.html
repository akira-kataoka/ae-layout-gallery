<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --gold:#eab308; --ink:#0f172a; --muted:#64748b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#0f0a1e; line-height:1.7; }
    .ae-wrap { max-width:460px; margin:0 auto; padding:56px 20px; text-align:center; color:#e9d5ff; }
    .ae-msg h1 { color:#fff; font-size:22px; margin:0 0 6px; } .ae-msg p { color:#c4b5fd; margin:0 0 22px; }
    .ae-card { background:linear-gradient(135deg,#4c1d95,#7c3aed); border-radius:18px; padding:24px; text-align:left; color:#fff; box-shadow:0 20px 50px rgba(124,58,237,.4); position:relative; overflow:hidden; }
    .ae-card::after { content:""; position:absolute; right:-40px; top:-40px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,.08); }
    .ae-card .brand { font-weight:800; letter-spacing:.05em; }
    .ae-card .rank { display:inline-block; background:var(--gold); color:#3b2406; font-weight:800; font-size:11px; padding:3px 10px; border-radius:999px; margin-top:6px; }
    .ae-card .qr { width:80px; height:80px; border-radius:10px; background:repeating-linear-gradient(45deg,#1e1033 0 5px,#fff 5px 10px); margin:18px 0 12px; }
    .ae-card .no { font-family:ui-monospace,monospace; letter-spacing:.12em; font-size:15px; }
    .ae-card .nm { font-size:13px; opacity:.9; margin-top:2px; }
    .ae-foot { margin-top:18px; font-size:12px; color:#a78bfa; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-msg">%%content%%</div>
    <div class="ae-card">
      <div class="brand">SAMPLE MEMBERS</div>
      <span class="rank">★ GOLD</span>
      <div class="qr"></div>
      <div class="no">1234 5678 9012</div>
      <div class="nm">YAMADA TARO</div>
    </div>
    <div class="ae-foot">店頭ではこの画面のQRコードをご提示ください。</div>
  </div>
</body>
</html>
