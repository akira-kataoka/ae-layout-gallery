<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#16a34a; --ink:#0f231a; --muted:#5b7167; --line:#d7ece0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fbf4; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:60px 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:38px 30px; text-align:center; box-shadow:0 16px 40px rgba(22,163,74,.1); }
    .ae-ico { width:80px; height:80px; border-radius:50%; background:#dcfce7; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; }
    .ae-ico .c { width:58px; height:58px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:30px; }
    .ae-card h1 { font-size:23px; margin:0 0 10px; }
    .ae-card .lead { color:var(--muted); margin:0 0 22px; font-size:14px; }
    .ae-pay { display:flex; align-items:center; gap:14px; background:#f8fdfa; border:1px solid var(--line); border-radius:14px; padding:16px 18px; text-align:left; margin-bottom:16px; }
    .ae-pay .brand { width:50px; height:34px; border-radius:6px; background:linear-gradient(135deg,#1e293b,#475569); display:flex; align-items:center; justify-content:center; font-size:18px; flex:0 0 auto; }
    .ae-pay .num { font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:1px; } .ae-pay .exp { font-size:12px; color:var(--muted); }
    .ae-next { font-size:13px; color:#33514c; margin-bottom:22px; }
    .ae-next b { color:var(--ink); }
    .ae-optin { border-top:1px dashed var(--line); padding-top:22px; }
    .ae-optin .t { font-weight:700; font-size:14px; margin-bottom:12px; }
    .ae-optin form input[type=email] { width:100%; padding:13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-optin form p { margin:0 0 12px; }
    .ae-optin form .submit input,.ae-optin form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-ico"><div class="c">✓</div></div>
      <h1>%%title%%</h1>
      <p class="lead">%%description%%</p>
      <div class="ae-pay">
        <div class="brand">💳</div>
        <div><div class="num">•••• •••• •••• 5678</div><div class="exp">有効期限 09/29 ・ VISA</div></div>
      </div>
      <p class="ae-next">次回のお支払いから、こちらのカードに請求されます。<br>次回更新日：<b>2026年7月11日</b></p>
      <div class="ae-optin">
        <div class="t">請求・お支払いに関するお知らせを受け取る</div>
        %%content%%
      </div>
    </div>
  </div>
</body>
</html>
