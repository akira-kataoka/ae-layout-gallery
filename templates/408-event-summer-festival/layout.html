<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#e11d48; --navy:#1e3a8a; --ink:#10203a; --muted:#5a6b8a; --line:#d7e0f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef3fb; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(160deg,#1e3a8a,#312e81 60%,#7c2d92); color:#fff; border-radius:20px; padding:34px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(30,58,138,.25); }
    .ae-hero::after { content:"🎆"; position:absolute; top:-6px; right:14px; font-size:54px; opacity:.45; }
    .ae-hero .lan { font-size:24px; letter-spacing:6px; margin-bottom:10px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.92; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:22px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-prog { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-prog .t { font-weight:700; font-size:14px; margin-bottom:12px; }
    .ae-p { display:flex; gap:12px; align-items:center; padding:8px 0; border-top:1px dashed var(--line); }
    .ae-p:first-of-type { border-top:0; } .ae-p .tm { font-weight:800; color:var(--navy); font-variant-numeric:tabular-nums; font-size:13px; min-width:54px; } .ae-p .nm { font-size:14px; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="lan">🏮 ✨ 🎇 ✨ 🏮</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">8.16 (土) 16:00–21:00</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">河川敷 特設会場</div></div>
      <div class="ae-i"><div class="ic">🎆</div><div class="k">花火</div><div class="v">20:00 打上げ</div></div>
    </div>
    <div class="ae-prog">
      <div class="t">当日のプログラム</div>
      <div class="ae-p"><span class="tm">16:00</span><span class="nm">屋台・縁日エリア オープン</span></div>
      <div class="ae-p"><span class="tm">17:30</span><span class="nm">盆踊り・ステージライブ</span></div>
      <div class="ae-p"><span class="tm">20:00</span><span class="nm">打上げ花火（約30分）</span></div>
    </div>
    <div class="ae-card">
      <div class="t">来場予約・最新情報の登録</div>
      <div class="d">有料観覧席の先行案内や交通情報をお届けします</div>
      %%content%%
    </div>
  </div>
</body>
</html>
