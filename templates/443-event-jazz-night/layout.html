<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#d4a13a; --ink:#f4ecdc; --muted:#b8a585; --line:#2e2a3e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#13111c; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:radial-gradient(120% 120% at 50% 0%,#3a2f4a,#1a1626 70%); border:1px solid var(--line); border-radius:20px; padding:36px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(0,0,0,.4); }
    .ae-hero .em { font-size:46px; margin-bottom:6px; }
    .ae-hero .badge { display:inline-block; border:1px solid var(--accent); color:var(--accent); font-weight:700; font-size:11px; letter-spacing:3px; padding:5px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; color:#fff; }
    .ae-hero p { margin:0; color:var(--muted); font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#1c1828; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-line { background:#1c1828; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-line .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#fff; }
    .ae-l { display:flex; gap:12px; align-items:center; padding:9px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-l:first-of-type { border-top:0; } .ae-l .tm { color:var(--accent); font-weight:800; font-variant-numeric:tabular-nums; font-size:13px; min-width:50px; }
    .ae-card { background:#1c1828; border:1px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#13111c; color:#f4ecdc; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#2a1c00; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🎷</div>
      <span class="badge">LIVE JAZZ NIGHT</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">9.20 (土) 19:00 開演</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">ブルーノート・ラウンジ</div></div>
      <div class="ae-i"><div class="ic">🎫</div><div class="k">料金</div><div class="v">¥4,500（1ドリンク付）</div></div>
    </div>
    <div class="ae-line">
      <div class="t">本日のステージ</div>
      <div class="ae-l"><span class="tm">19:00</span><span>1st set — ピアノトリオ</span></div>
      <div class="ae-l"><span class="tm">20:15</span><span>2nd set — ヴォーカル＆カルテット</span></div>
      <div class="ae-l"><span class="tm">21:30</span><span>セッションタイム（飛び入り歓迎）</span></div>
    </div>
    <div class="ae-card">
      <div class="t">ご予約・お席のリクエスト</div>
      <div class="d">カウンター席・テーブル席をご用意。お早めにどうぞ</div>
      %%content%%
    </div>
  </div>
</body>
</html>
