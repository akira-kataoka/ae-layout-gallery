<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#c2410c; --accent2:#15803d; --ink:#241710; --muted:#7c6155; --line:#f0e2d6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf6ee; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(135deg,#ea580c,#c2410c); color:#fff; border-radius:22px; padding:38px 26px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 42px rgba(194,65,12,.26); }
    .ae-hero::after { content:"🍜 🦀 🍑 🍶 🍡 🐟 🍜"; position:absolute; bottom:8px; left:0; right:0; font-size:15px; letter-spacing:5px; opacity:.25; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.22); font-weight:800; font-size:11px; letter-spacing:2px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; box-shadow:0 6px 16px rgba(194,65,12,.06); }
    .ae-i .ic { font-size:21px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-fun { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; box-shadow:0 8px 22px rgba(194,65,12,.05); }
    .ae-fun .t { font-weight:800; font-size:14px; margin-bottom:12px; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:800; font-size:18px; margin-bottom:4px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <span class="badge">UMAIMONO FAIR</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">会期</div><div class="v">11.1(土)〜11.9(日)</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">サンプル百貨店 7F</div></div>
      <div class="ae-i"><div class="ic">🎟️</div><div class="k">入場</div><div class="v">無料</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">注目の出店</div>
      <div class="g">
        <div class="ae-f"><span class="e">🦀</span> 北の海鮮・カニ・いくら</div>
        <div class="ae-f"><span class="e">🍜</span> ご当地ラーメン実演</div>
        <div class="ae-f"><span class="e">🍑</span> 旬のフルーツ・スイーツ</div>
        <div class="ae-f"><span class="e">🍶</span> 地酒・クラフトの試飲</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">ご来場予約・先行ご案内</div>
      <div class="d">事前予約で混雑時も優先入場。お得なクーポンもお届けします</div>
      %%content%%
    </div>
  </div>
</body>
</html>
