<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#1b1430; --muted:#6b6480; --line:#e8e3f4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f8f6fd; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-items { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
    .ae-it { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 6px; text-align:center; box-shadow:0 6px 18px rgba(124,58,237,.05); }
    .ae-it .em { font-size:22px; } .ae-it .nm { font-size:11px; font-weight:700; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=number],.ae-card form input[type=date],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:440px){ .ae-items { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🖨️</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-items">
      <div class="ae-it"><div class="em">💳</div><div class="nm">名刺</div></div>
      <div class="ae-it"><div class="em">📄</div><div class="nm">チラシ</div></div>
      <div class="ae-it"><div class="em">📕</div><div class="nm">冊子</div></div>
      <div class="ae-it"><div class="em">🏷️</div><div class="nm">シール</div></div>
    </div>
    <div class="ae-card">
      <div class="t">無料お見積もり依頼</div>
      %%content%%
    </div>
  </div>
</body>
</html>
