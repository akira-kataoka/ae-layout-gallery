<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#1b1535; --muted:#6a6488; --line:#e7e1f6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f2fd; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:76px; height:76px; border-radius:50%; background:linear-gradient(135deg,#a78bfa,#7c3aed); color:#fff; display:flex; align-items:center; justify-content:center; font-size:38px; margin:0 auto 16px; box-shadow:0 14px 32px rgba(124,58,237,.28); }
    .ae-done h1 { font-size:24px; margin:0 0 6px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-rank { background:linear-gradient(135deg,#7c3aed,#5b21b6); color:#fff; border-radius:16px; padding:22px; text-align:center; margin-bottom:18px; box-shadow:0 14px 30px rgba(124,58,237,.25); }
    .ae-rank .lab { font-size:13px; opacity:.9; } .ae-rank .num { font-size:40px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-rank .sub { font-size:13px; opacity:.95; margin-top:4px; }
    .ae-perks { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:18px; box-shadow:0 8px 22px rgba(124,58,237,.06); }
    .ae-perks .t { font-weight:700; font-size:14px; margin-bottom:10px; }
    .ae-pk { display:flex; gap:11px; padding:8px 0; border-top:1px solid var(--line); font-size:14px; } .ae-pk:first-of-type { border-top:0; } .ae-pk .e { font-size:18px; flex:0 0 auto; }
    .ae-invite { background:#f3eeff; border:1px solid #ddd2f7; border-radius:14px; padding:16px 18px; margin-bottom:18px; text-align:center; }
    .ae-invite .t { font-weight:700; font-size:13px; margin-bottom:6px; } .ae-invite p { margin:0; font-size:13px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-rank">
      <div class="lab">あなたの登録順位</div>
      <div class="num">#1,248</div>
      <div class="sub">ローンチ時に先行ご招待します 🎉</div>
    </div>
    <div class="ae-perks">
      <div class="t">事前登録者の特典</div>
      <div class="ae-pk"><span class="e">🚀</span><span>一般公開より早く使える先行アクセス権</span></div>
      <div class="ae-pk"><span class="e">🎁</span><span>初月無料＋限定ローンチクーポン</span></div>
      <div class="ae-pk"><span class="e">📣</span><span>開発の最新情報をいち早くお届け</span></div>
    </div>
    <div class="ae-invite">
      <div class="t">🤝 友だち紹介で順位アップ</div>
      <p>お友だちが登録すると、あなたの招待順位が繰り上がります。</p>
    </div>
    <div class="ae-card">
      <div class="t">最新情報・ローンチ通知を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
