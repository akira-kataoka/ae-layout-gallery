<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0faf8; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:14px; }
    .ae-head h1 { margin:0 0 6px; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-meter { background:#fff; border:1px solid var(--line); border-radius:16px; padding:26px; box-shadow:0 8px 24px rgba(13,148,136,.1); margin-bottom:14px; text-align:center; }
    .ae-face { font-size:60px; line-height:1; }
    .ae-val { font-size:34px; font-weight:900; color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-lab { color:var(--muted); font-size:14px; margin-bottom:14px; }
    .ae-meter input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-ends { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-meter">
      <div class="ae-face" id="face">🙂</div>
      <div class="ae-val"><span id="val">70</span> 点</div>
      <div class="ae-lab" id="lab">満足</div>
      <input type="range" id="slider" min="0" max="100" value="70" aria-label="満足度">
      <div class="ae-ends"><span>0（不満）</span><span>100（大満足）</span></div>
    </div>
    <div class="ae-card">%%content%%</div>
  </div>

  <script>
  (function () {
    var slider = document.getElementById("slider"), val = document.getElementById("val"), face = document.getElementById("face"), lab = document.getElementById("lab");
    function update() {
      var v = parseInt(slider.value, 10);
      val.textContent = v;
      var f, l;
      if (v >= 80) { f = "🤩"; l = "大満足"; }
      else if (v >= 60) { f = "🙂"; l = "満足"; }
      else if (v >= 40) { f = "😐"; l = "ふつう"; }
      else if (v >= 20) { f = "😕"; l = "やや不満"; }
      else { f = "😡"; l = "不満"; }
      face.textContent = f; lab.textContent = l;
    }
    slider.addEventListener("input", update);
    update();
  })();
  </script>
</body>
</html>
