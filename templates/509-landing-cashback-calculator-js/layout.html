<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#15803d; --ink:#0e2417; --muted:#52715f; --line:#d6ebd9; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef8f0; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(21,128,61,.09); }
    .ae-field { margin-bottom:18px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-act { display:flex; gap:6px; background:#dcf0e0; border-radius:10px; padding:4px; }
    .ae-act button { flex:1; border:0; background:transparent; padding:9px 4px; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; color:var(--muted); }
    .ae-act button.on { background:#fff; color:var(--accent); box-shadow:0 2px 8px rgba(21,128,61,.18); }
    .ae-out { background:linear-gradient(135deg,#16a34a,#15803d); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .lab { font-size:13px; opacity:.9; } .ae-out .big { font-size:40px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-out .big small { font-size:15px; } .ae-out .sub { font-size:13px; opacity:.95; margin-top:6px; }
    .ae-row2 { display:flex; gap:8px; margin-top:14px; } .ae-g { flex:1; background:rgba(255,255,255,.16); border-radius:10px; padding:10px 6px; } .ae-g .k { font-size:11px; opacity:.9; } .ae-g .n { font-weight:800; font-variant-numeric:tabular-nums; }
    .ae-note { font-size:11px; color:var(--muted); margin-top:12px; text-align:center; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>毎月のカード利用額 <span class="v"><span id="vS">8</span> 万円</span></label>
        <input type="range" id="s" min="1" max="50" step="1" value="8"></div>
      <div class="ae-field"><label>基本還元率</label>
        <div class="ae-act" id="base">
          <button type="button" data-r="0.5">0.5%</button>
          <button type="button" data-r="1.0" class="on">1.0%</button>
          <button type="button" data-r="1.5">1.5%</button>
        </div></div>
      <div class="ae-field"><label>よく使うお店での上乗せ還元</label>
        <div class="ae-act" id="bonus">
          <button type="button" data-b="0" class="on">なし</button>
          <button type="button" data-b="1">+1%</button>
          <button type="button" data-b="2">+2%</button>
        </div></div>
      <div class="ae-out">
        <div class="lab">年間にもらえるポイント・還元</div>
        <div class="big">¥<span id="year">0</span></div>
        <div class="sub">実質還元率 <span id="eff">1.0</span>%</div>
        <div class="ae-row2">
          <div class="ae-g"><div class="k">毎月あたり</div><div class="n">¥<span id="month">0</span></div></div>
          <div class="ae-g"><div class="k">5年でこんなに</div><div class="n">¥<span id="five">0</span></div></div>
        </div>
      </div>
      <div class="ae-note">※ 概算です。実際の還元率・上限はカードの規定によります。</div>
    </div>
    <div class="ae-cta">
      <div class="t">お得なカード・キャンペーン情報を受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var s = document.getElementById("s"), vS = document.getElementById("vS");
    var yearEl = document.getElementById("year"), monthEl = document.getElementById("month"), fiveEl = document.getElementById("five"), effEl = document.getElementById("eff");
    var baseBtns = Array.prototype.slice.call(document.querySelectorAll("#base button"));
    var bonusBtns = Array.prototype.slice.call(document.querySelectorAll("#bonus button"));
    var base = 1.0, bonus = 0;
    function calc() {
      var spend = (parseInt(s.value, 10) || 0) * 10000;
      vS.textContent = parseInt(s.value, 10) || 0;
      var rate = (base + bonus) / 100;
      var monthly = spend * rate;
      effEl.textContent = (base + bonus).toFixed(1);
      monthEl.textContent = Math.round(monthly).toLocaleString();
      yearEl.textContent = Math.round(monthly * 12).toLocaleString();
      fiveEl.textContent = Math.round(monthly * 60).toLocaleString();
    }
    s.addEventListener("input", calc);
    baseBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        baseBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); base = parseFloat(b.getAttribute("data-r")); calc();
      });
    });
    bonusBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        bonusBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); bonus = parseFloat(b.getAttribute("data-b")); calc();
      });
    });
    calc();
  })();
  </script>
</body>
</html>
