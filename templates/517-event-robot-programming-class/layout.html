<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#2563eb; --accent2:#f59e0b; --ink:#172033; --muted:#64748b; --line:#e3e9f3; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef3fb; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(135deg,#2563eb,#1e40af); color:#fff; border-radius:22px; padding:36px 26px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(37,99,235,.28); }
    .ae-hero::after { content:"🤖 ⚙️ 💡 🚀 🧩"; position:absolute; right:-6px; bottom:8px; font-size:34px; opacity:.18; letter-spacing:6px; }
    .ae-hero .badge { display:inline-block; background:var(--accent2); color:#3a2400; font-weight:800; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; box-shadow:0 6px 16px rgba(37,99,235,.06); }
    .ae-i .ic { font-size:21px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-steps { background:#fff; border:1px solid var(--line); border-radius:18px; padding:22px; margin-bottom:22px; box-shadow:0 8px 22px rgba(37,99,235,.05); }
    .ae-steps .t { font-weight:800; font-size:15px; margin-bottom:14px; }
    .ae-st { display:flex; gap:13px; align-items:flex-start; padding:9px 0; border-top:1px dashed var(--line); }
    .ae-st:first-of-type { border-top:0; }
    .ae-st .n { flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:var(--accent); color:#fff; font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .ae-st .h { font-weight:700; font-size:14px; } .ae-st .d { color:var(--muted); font-size:13px; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:800; font-size:18px; text-align:center; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; text-align:center; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
    .ae-note { text-align:center; color:var(--muted); font-size:12px; margin-top:14px; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <span class="badge">無料体験会</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">👦</div><div class="k">対象</div><div class="v">小1〜小6</div></div>
      <div class="ae-i"><div class="ic">⏱️</div><div class="k">所要時間</div><div class="v">約60分</div></div>
      <div class="ae-i"><div class="ic">💴</div><div class="k">参加費</div><div class="v">無料</div></div>
    </div>
    <div class="ae-steps">
      <div class="t">当日の流れ</div>
      <div class="ae-st"><div class="n">1</div><div><div class="h">ロボットを組み立てよう</div><div class="d">ブロックでオリジナルのロボットを作ります。</div></div></div>
      <div class="ae-st"><div class="n">2</div><div><div class="h">プログラムで動かそう</div><div class="d">タブレットで命令を組み、思い通りに動かします。</div></div></div>
      <div class="ae-st"><div class="n">3</div><div><div class="h">ミッションに挑戦</div><div class="d">ゴールを目指してトライ＆エラー。考える力が育ちます。</div></div></div>
    </div>
    <div class="ae-card">
      <div class="t">体験会のお申し込み</div>
      <div class="s">少人数制です。保護者の方も見学いただけます。</div>
      %%content%%
      <div class="ae-note">🧑‍🏫 はじめての子も大歓迎。スタッフが丁寧にサポートします</div>
    </div>
  </div>
</body>
</html>
