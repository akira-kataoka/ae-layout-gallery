<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9333ea; --ink:#1c1430; --muted:#6b6480; --line:#ece5f7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f9f7fe; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#a855f7,#9333ea); color:#fff; text-align:center; padding:52px 20px 42px; }
    .ae-hero .em { font-size:50px; }
    .ae-hero h1 { font-size:27px; margin:6px 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:580px; margin:0 auto; padding:34px 20px 48px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center; box-shadow:0 8px 22px rgba(147,51,234,.07); }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-feat { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:24px; }
    .ae-f { display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-f:first-of-type { border-top:0; }
    .ae-f .em { font-size:20px; }
    .ae-trial { background:linear-gradient(135deg,#9333ea,#7c3aed); color:#fff; border-radius:14px; padding:16px; text-align:center; margin-bottom:24px; }
    .ae-trial .big { font-size:20px; font-weight:900; } .ae-trial .sm { font-size:12px; opacity:.92; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <div class="em">🧘</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-i"><div class="ic">🗓️</div><div class="k">スケジュール</div><div class="v">毎朝6:30 / 夜21:00</div></div>
      <div class="ae-i"><div class="ic">💻</div><div class="k">参加方法</div><div class="v">ビデオ通話</div></div>
      <div class="ae-i"><div class="ic">⏱️</div><div class="k">1回</div><div class="v">45分</div></div>
    </div>
    <div class="ae-feat">
      <div class="ae-f"><span class="em">🏠</span><span>自宅から、着替えずにそのまま参加OK</span></div>
      <div class="ae-f"><span class="em">📹</span><span>カメラオフでも参加できるから初心者も安心</span></div>
      <div class="ae-f"><span class="em">🔁</span><span>見逃しても録画アーカイブでいつでも復習</span></div>
    </div>
    <div class="ae-trial">
      <div class="big">初回7日間 無料体験</div>
      <div class="sm">気に入らなければ自動課金なしで終了できます</div>
    </div>
    <div class="ae-card">
      <div class="t">無料体験に申し込む</div>
      %%content%%
    </div>
  </div>
</body>
</html>
