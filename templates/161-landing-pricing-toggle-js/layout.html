<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f6fb; line-height:1.7; }
    .ae-head { text-align:center; padding:48px 20px 8px; }
    .ae-head h1 { font-size:28px; margin:0 0 10px; }
    .ae-toggle { display:inline-flex; background:#fff; border:1px solid var(--line); border-radius:999px; padding:4px; margin-top:6px; }
    .ae-toggle button { border:0; background:transparent; padding:9px 20px; border-radius:999px; font-weight:700; font-size:14px; cursor:pointer; color:var(--muted); }
    .ae-toggle button.active { background:var(--accent); color:#fff; }
    .ae-save { color:#16a34a; font-size:12px; font-weight:700; margin-left:8px; }
    .ae-plans { max-width:1000px; margin:24px auto; padding:0 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:18px; align-items:stretch; }
    .ae-plan { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 24px; display:flex; flex-direction:column; }
    .ae-plan.pop { border:2px solid var(--accent); box-shadow:0 14px 40px rgba(79,70,229,.16); }
    .ae-plan h3 { margin:0 0 6px; }
    .ae-price { font-size:30px; font-weight:800; }
    .ae-price small { font-size:13px; color:var(--muted); font-weight:400; }
    .ae-plan ul { list-style:none; padding:0; margin:16px 0; flex:1; font-size:14px; }
    .ae-plan li { padding:5px 0 5px 22px; position:relative; } .ae-plan li::before { content:"✓"; position:absolute; left:0; color:var(--accent); font-weight:800; }
    .ae-body { max-width:520px; margin:8px auto 56px; padding:0 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:820px){ .ae-plans { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="ae-head">
    <h1>%%title%%</h1>
    <p style="color:var(--muted);margin:0 0 6px;">%%description%%</p>
    <div class="ae-toggle"><button type="button" data-cycle="m" class="active">月額</button><button type="button" data-cycle="y">年額<span class="ae-save">2ヶ月分お得</span></button></div>
  </header>
  <section class="ae-plans">
    <div class="ae-plan"><h3>Starter</h3><div class="ae-price"><span class="amt" data-m="0" data-y="0">¥0</span><small class="per"> /月</small></div><ul><li>基本機能</li><li>1ユーザー</li></ul></div>
    <div class="ae-plan pop"><h3>Business</h3><div class="ae-price"><span class="amt" data-m="9800" data-y="98000">¥9,800</span><small class="per"> /月</small></div><ul><li>全機能</li><li>10ユーザー</li><li>優先サポート</li></ul></div>
    <div class="ae-plan"><h3>Enterprise</h3><div class="ae-price"><span class="amt" data-m="29800" data-y="298000">¥29,800</span><small class="per"> /月</small></div><ul><li>無制限ユーザー</li><li>SSO / SLA</li></ul></div>
  </section>
  <div class="ae-body"><div class="ae-card"><div class="t">このプランで申し込む</div>%%content%%</div></div>

  <script>
  (function () {
    var btns = Array.prototype.slice.call(document.querySelectorAll(".ae-toggle button"));
    function yen(n) { return "¥" + Number(n).toLocaleString("ja-JP"); }
    function apply(cycle) {
      document.querySelectorAll(".ae-price .amt").forEach(function (el) {
        el.textContent = yen(el.getAttribute(cycle === "y" ? "data-y" : "data-m"));
      });
      document.querySelectorAll(".ae-price .per").forEach(function (el) {
        el.textContent = cycle === "y" ? " /年" : " /月";
      });
    }
    btns.forEach(function (b) {
      b.addEventListener("click", function () {
        btns.forEach(function (x) { x.classList.remove("active"); });
        b.classList.add("active");
        apply(b.getAttribute("data-cycle"));
      });
    });
    apply("m");
  })();
  </script>
</body>
</html>
