<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#b91c1c; --ink:#2a1313; --muted:#6e5757; --line:#f0dcdc; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf4f4; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:60px 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:38px 30px; text-align:center; box-shadow:0 16px 40px rgba(185,28,28,.08); }
    .ae-ico { width:78px; height:78px; border-radius:50%; background:#fef2f2; display:flex; align-items:center; justify-content:center; font-size:38px; margin:0 auto 18px; }
    .ae-card h1 { font-size:23px; margin:0 0 10px; }
    .ae-card .lead { color:var(--muted); margin:0 0 24px; font-size:14px; }
    .ae-tips { background:#fffafa; border:1px solid var(--line); border-radius:14px; padding:18px; text-align:left; margin-bottom:24px; }
    .ae-tips .t { font-weight:700; font-size:13px; margin-bottom:8px; }
    .ae-tips li { font-size:13px; color:#5a4040; margin-bottom:4px; }
    .ae-actions { display:flex; gap:10px; margin-bottom:8px; }
    .ae-btn { flex:1; border:0; border-radius:9px; padding:13px; font-weight:800; font-size:14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .ae-btn.ghost { background:#fff; border:1px solid var(--line); color:var(--ink); }
    .ae-optin { border-top:1px dashed var(--line); padding-top:22px; margin-top:22px; }
    .ae-optin .t { font-weight:700; font-size:14px; margin-bottom:6px; }
    .ae-optin .d { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-optin form input[type=email] { width:100%; padding:13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-optin form p { margin:0 0 12px; }
    .ae-optin form .submit input,.ae-optin form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-ico">😣</div>
      <h1>%%title%%</h1>
      <p class="lead">%%description%%</p>
      <div class="ae-tips">
        <div class="t">もう一度お試しいただく前に</div>
        <ul>
          <li>必須項目がすべて入力されているかご確認ください</li>
          <li>通信環境の良い場所で再度お試しください</li>
          <li>入力内容はそのまま、再送信をお願いします</li>
        </ul>
      </div>
      <div class="ae-actions">
        <a class="ae-btn ghost" href="#">前のページに戻る</a>
      </div>
      <div class="ae-optin">
        <div class="t">解決しない場合は、サポートにご連絡を</div>
        <div class="d">メールアドレスをご登録いただければ、担当者よりご連絡します</div>
        %%content%%
      </div>
    </div>
  </div>
</body>
</html>
