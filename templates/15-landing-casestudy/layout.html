<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0891b2; --ink:#0f172a; --muted:#5b6b7b; --line:#e2e8f0; --bg:#f6f9fb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:var(--bg); line-height:1.8; }
    .ae-hero { background:#fff; border-bottom:1px solid var(--line); padding:48px 20px; }
    .ae-hero .in { max-width:860px; margin:0 auto; }
    .ae-tag { color:var(--accent); font-weight:700; font-size:13px; letter-spacing:.1em; }
    .ae-hero h1 { font-size:30px; margin:10px 0; }
    .ae-hero p { color:var(--muted); margin:0; }
    .ae-stats { max-width:860px; margin:-28px auto 0; padding:0 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .ae-stats div { background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px; text-align:center; box-shadow:0 6px 18px rgba(8,145,178,.06); }
    .ae-stats .num { font-size:30px; font-weight:800; color:var(--accent); }
    .ae-stats .lbl { font-size:12px; color:var(--muted); }
    .ae-body { max-width:760px; margin:36px auto; background:#fff; border:1px solid var(--line); border-radius:16px; padding:40px 36px; }
    .ae-body blockquote { border-left:4px solid var(--accent); margin:24px 0; padding:8px 18px; color:#334155; font-style:italic; background:#f0fafd; border-radius:0 10px 10px 0; }
    @media (max-width:760px){ .ae-stats { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="ae-hero"><div class="in"><span class="ae-tag">CASE STUDY / 導入事例</span><h1>%%title%%</h1><p>%%description%%</p></div></header>
  <section class="ae-stats">
    <div><div class="num">40%</div><div class="lbl">業務時間削減</div></div>
    <div><div class="num">2.5x</div><div class="lbl">商談化率の向上</div></div>
    <div><div class="num">3ヶ月</div><div class="lbl">投資回収期間</div></div>
  </section>
  <article class="ae-body">%%content%%</article>
</body>
</html>
