<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#2a1020; --muted:#7a5566; --line:#f5d9e7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff0f7; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#ec4899,#a855f7); color:#fff; text-align:center; padding:54px 20px 44px; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.22); font-weight:700; font-size:12px; letter-spacing:2px; padding:6px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:580px; margin:0 auto; padding:38px 20px 48px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center; box-shadow:0 8px 22px rgba(219,39,119,.07); }
    .ae-i .ic { font-size:22px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:14px; }
    .ae-prog { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:24px; }
    .ae-prog .t { font-weight:700; text-align:center; margin-bottom:12px; }
    .ae-p { display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-p:first-of-type { border-top:0; }
    .ae-p .em { font-size:20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">FAN MEETING</span>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催日</div><div class="v">12.14 (日)</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">市民ホール</div></div>
      <div class="ae-i"><div class="ic">🎟️</div><div class="k">参加</div><div class="v">抽選・無料</div></div>
    </div>
    <div class="ae-prog">
      <div class="t">当日のプログラム</div>
      <div class="ae-p"><span class="em">🎤</span><span>トーク＆Q&Aセッション</span></div>
      <div class="ae-p"><span class="em">🎮</span><span>ファン参加型ミニゲーム</span></div>
      <div class="ae-p"><span class="em">📸</span><span>記念撮影＆サイン会（抽選）</span></div>
    </div>
    <div class="ae-card">
      <div class="t">参加抽選に応募する</div>
      <div class="d">当選者にはメールで詳細をご案内します</div>
      %%content%%
    </div>
  </div>
</body>
</html>
