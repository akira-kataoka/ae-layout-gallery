<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --gold:#d4af37; --ink:#0a0a0a; --muted:#9ca3af; --line:#2a2a2a; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Hiragino Sans","Yu Gothic",Meiryo,serif; color:#f5f5f4; line-height:1.8;
      background:radial-gradient(800px 400px at 50% -5%,rgba(212,175,55,.18),transparent), #0a0a0a; display:flex; align-items:center; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:54px 24px; text-align:center; }
    .ae-line { width:60px; height:1px; background:var(--gold); margin:0 auto 18px; }
    .ae-kicker { letter-spacing:.4em; font-size:12px; color:var(--gold); }
    .ae-wrap h1 { font-size:clamp(28px,6vw,40px); margin:14px 0; font-weight:600; }
    .ae-wrap > p { color:var(--muted); max-width:440px; margin:0 auto 28px; }
    .ae-card { background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:4px; padding:34px 30px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:14px; border:1px solid var(--line); border-radius:2px; background:rgba(0,0,0,.4); color:#fff; font-size:15px; }
    .ae-card form p { margin:0 0 14px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--gold); color:#0a0a0a; border:0; padding:15px; border-radius:2px; font-weight:800; letter-spacing:.05em; cursor:pointer; }
    .ae-foot { margin-top:20px; font-size:11px; color:#6b7280; letter-spacing:.1em; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-line"></div>
    <div class="ae-kicker">INVITATION ONLY</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-card">%%content%%</div>
    <div class="ae-foot">— 完全招待制・人数限定 —</div>
  </div>
</body>
</html>
