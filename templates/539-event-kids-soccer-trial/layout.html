<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#16a34a; --accent2:#facc15; --ink:#10231a; --muted:#5e7066; --line:#dcebdf; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef6f0; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; border-radius:22px; padding:36px 26px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(22,163,74,.26); }
    .ae-hero::after { content:"⚽ 🥅 ⚽ 🏃 ⚽ 🥅 ⚽"; position:absolute; bottom:8px; left:0; right:0; font-size:15px; letter-spacing:5px; opacity:.22; }
    .ae-hero .badge { display:inline-block; background:var(--accent2); color:#3a2e00; font-weight:800; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; box-shadow:0 6px 16px rgba(22,163,74,.06); }
    .ae-i .ic { font-size:21px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-fun { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; box-shadow:0 8px 22px rgba(22,163,74,.05); }
    .ae-fun .t { font-weight:800; font-size:14px; margin-bottom:12px; }
    .ae-f { display:flex; gap:10px; align-items:center; font-size:13px; padding:6px 0; }
    .ae-f .e { font-size:18px; flex:0 0 auto; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:800; font-size:18px; margin-bottom:4px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <span class="badge">無料体験会</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">👟</div><div class="k">対象</div><div class="v">年中〜小6</div></div>
      <div class="ae-i"><div class="ic">⏱️</div><div class="k">時間</div><div class="v">約60分</div></div>
      <div class="ae-i"><div class="ic">💴</div><div class="k">参加費</div><div class="v">無料・手ぶらOK</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">体験会のポイント</div>
      <div class="ae-f"><span class="e">⚽</span> ボールに慣れる楽しいウォームアップ</div>
      <div class="ae-f"><span class="e">🤝</span> 経験ゼロ・初めての子も大歓迎</div>
      <div class="ae-f"><span class="e">😊</span> 「できた！」を引き出すコーチング</div>
      <div class="ae-f"><span class="e">🅿️</span> 見学スペース・駐車場あり</div>
    </div>
    <div class="ae-card">
      <div class="t">無料体験会のお申し込み</div>
      <div class="d">動きやすい服装・運動靴でお越しください。飲み物をお持ちください</div>
      %%content%%
    </div>
  </div>
</body>
</html>
