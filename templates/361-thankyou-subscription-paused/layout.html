<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0891b2; --ink:#0c2228; --muted:#5a747c; --line:#d6eaee; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eefbfd; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:66px; height:66px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 12px; }
    .ae-done h1 { font-size:23px; margin:0 0 4px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-status { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:18px; box-shadow:0 8px 26px rgba(8,145,178,.07); }
    .ae-status .row { display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-top:1px solid var(--line); }
    .ae-status .row:first-child { border-top:0; }
    .ae-status .k { color:var(--muted); } .ae-status b { color:var(--ink); }
    .ae-status .resume b { color:var(--accent); font-size:15px; }
    .ae-keep { background:#f0fdfa; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:22px; }
    .ae-keep .t { font-weight:700; font-size:13px; margin-bottom:8px; }
    .ae-keep li { font-size:13px; color:#33514c; margin-bottom:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">⏸</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-status">
      <div class="row"><span class="k">プラン</span><b>プレミアム会員</b></div>
      <div class="row"><span class="k">休会期間</span><b>2026年6月11日 〜 9月10日</b></div>
      <div class="row resume"><span class="k">自動再開予定</span><b>2026年9月11日</b></div>
    </div>
    <div class="ae-keep">
      <div class="t">休会中も安心です</div>
      <ul>
        <li>保存したデータ・設定はすべて保持されます</li>
        <li>休会中は料金が発生しません</li>
        <li>いつでもマイページから即時再開できます</li>
      </ul>
    </div>
    <div class="ae-card">
      <div class="t">再開時のお知らせ・お得情報を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
