<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#be185d; --ink:#2c1421; --muted:#8a657a; --line:#f3dde8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf3f8; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .badge { display:inline-block; background:#fbdde9; color:var(--accent); font-weight:700; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-occ { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:22px; }
    .ae-o { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 6px; text-align:center; }
    .ae-o .ic { font-size:20px; } .ae-o .k { font-size:11px; font-weight:700; margin-top:2px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(190,24,93,.08); }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form textarea { min-height:80px; resize:vertical; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:420px){ .ae-occ { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">当日配達・メッセージカード無料</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-occ">
      <div class="ae-o"><div class="ic">🎂</div><div class="k">誕生日</div></div>
      <div class="ae-o"><div class="ic">💐</div><div class="k">お祝い</div></div>
      <div class="ae-o"><div class="ic">💖</div><div class="k">記念日</div></div>
      <div class="ae-o"><div class="ic">🕊️</div><div class="k">お供え</div></div>
    </div>
    <div class="ae-card">
      <div class="t">ご注文・配達のご依頼</div>
      <div class="s">用途・ご予算・お届け日をお選びください。プロのフローリストがおつくりします。</div>
      %%content%%
      <div class="ae-note">🌸 季節のおすすめや色味のご相談も承ります</div>
    </div>
  </div>
</body>
</html>
