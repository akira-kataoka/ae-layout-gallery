<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#c026d3; --ink:#1e1b2e; --muted:#6b7280; --bg:#faf7fd; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:var(--bg); line-height:1.8; padding-bottom:72px; }
    .ae-hero { background:linear-gradient(135deg,#4c1d95,#c026d3); color:#fff; padding:72px 20px; text-align:center; }
    .ae-hero h1 { font-size:32px; margin:0 0 14px; line-height:1.4; }
    .ae-hero p { opacity:.92; max-width:640px; margin:0 auto; }
    .ae-content { max-width:760px; margin:0 auto; padding:48px 20px; }
    .ae-content h2 { font-size:24px; border-left:5px solid var(--accent); padding-left:14px; margin:48px 0 16px; }
    .ae-content img { max-width:100%; border-radius:10px; }
    .ae-stickybar { position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid #ead9f5; box-shadow:0 -4px 16px rgba(0,0,0,.06); padding:12px 20px; display:flex; align-items:center; justify-content:center; gap:16px; }
    .ae-stickybar .ae-cta { background:var(--accent); color:#fff; text-decoration:none; padding:12px 28px; border-radius:999px; font-weight:700; }
    .ae-stickybar span { font-weight:700; }
    @media (max-width:560px){ .ae-stickybar span { display:none; } }
  </style>
</head>
<body>
  <header class="ae-hero">
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </header>
  <main class="ae-content">
    %%content%%
  </main>
  <div class="ae-stickybar">
    <span>今すぐお申し込みいただけます</span>
    <a class="ae-cta" href="#">お申し込みはこちら</a>
  </div>
</body>
</html>
