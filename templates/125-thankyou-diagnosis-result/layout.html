<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9333ea; --ink:#1c1430; --muted:#6b7280; --line:#ece5f7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); line-height:1.7;
      background:radial-gradient(700px 360px at 50% -6%,#e9d5ff,transparent), #faf6ff; }
    .ae-wrap { max-width:540px; margin:0 auto; padding:56px 20px; text-align:center; }
    .ae-card { background:#fff; border-radius:22px; box-shadow:0 16px 44px rgba(147,51,234,.18); padding:42px 34px; }
    .ae-type { width:120px; height:120px; margin:0 auto 16px; border-radius:50%; background:linear-gradient(135deg,#c084fc,#9333ea); display:flex; align-items:center; justify-content:center; font-size:56px; box-shadow:0 12px 30px rgba(147,51,234,.35); }
    .ae-kicker { color:var(--accent); font-weight:800; letter-spacing:.1em; font-size:13px; }
    .ae-card h1 { margin:6px 0 12px; font-size:26px; }
    .ae-card > p { color:var(--muted); }
    .ae-traits { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:18px 0; }
    .ae-traits span { background:#f3e8ff; color:var(--accent); padding:5px 12px; border-radius:999px; font-size:12px; font-weight:700; }
    .ae-cta { display:inline-block; margin-top:8px; background:var(--accent); color:#fff; text-decoration:none; padding:13px 28px; border-radius:10px; font-weight:700; }
    .ae-share { margin-top:16px; font-size:13px; color:var(--muted); }
    .ae-share a { color:var(--accent); margin:0 6px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-type">🦋</div>
      <div class="ae-kicker">あなたのタイプは</div>
      %%content%%
      <div class="ae-traits"><span>#好奇心旺盛</span><span>#発想力</span><span>#社交的</span></div>
      <a class="ae-cta" href="%%account-website%%">あなたにおすすめのプランを見る</a>
      <div class="ae-share">結果をシェア：<a href="#">𝕏</a><a href="#">LINE</a></div>
    </div>
  </div>
</body>
</html>
