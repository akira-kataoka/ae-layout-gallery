<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f59e0b; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fffbeb; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:64px 20px; text-align:center; }
    .ae-mail { width:90px; height:90px; margin:0 auto 22px; border-radius:50%; background:#fff7e6; display:flex; align-items:center; justify-content:center; font-size:42px; border:2px solid #fde68a; }
    .ae-card { background:#fff; border-radius:18px; box-shadow:0 10px 30px rgba(245,158,11,.12); padding:40px 34px; }
    .ae-card h1 { margin:0 0 12px; font-size:24px; }
    .ae-card p { color:var(--muted); }
    .ae-hint { margin-top:22px; padding:16px; background:#fffbeb; border:1px dashed #fcd34d; border-radius:12px; font-size:13px; color:#92400e; text-align:left; }
    .ae-hint b { color:#78350f; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-mail">✉️</div>
    <div class="ae-card">
      %%content%%
      <div class="ae-hint"><b>メールが届かない場合：</b> 迷惑メールフォルダをご確認のうえ、数分待っても届かないときは再度お試しください。</div>
    </div>
  </div>
</body>
</html>
