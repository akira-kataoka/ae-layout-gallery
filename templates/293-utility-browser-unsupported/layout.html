<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0c1f2e; --muted:#5a7080; --line:#dbe7ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef5fa; line-height:1.7; }
    .ae-wrap { max-width:540px; margin:0 auto; padding:60px 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:36px 30px; text-align:center; box-shadow:0 16px 40px rgba(3,105,161,.08); }
    .ae-ico { width:74px; height:74px; border-radius:18px; background:#e0f2fe; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 18px; }
    .ae-card h1 { font-size:23px; margin:0 0 10px; }
    .ae-card .lead { color:var(--muted); margin:0 0 24px; font-size:14px; }
    .ae-browsers { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:24px; }
    .ae-b { background:#f8fafc; border:1px solid var(--line); border-radius:12px; padding:14px 6px; }
    .ae-b .em { font-size:26px; } .ae-b .nm { font-size:11px; font-weight:700; margin-top:4px; }
    .ae-optin { border-top:1px dashed var(--line); padding-top:22px; }
    .ae-optin .t { font-weight:700; font-size:14px; margin-bottom:6px; }
    .ae-optin .d { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-optin form input[type=email] { width:100%; padding:13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-optin form p { margin:0 0 12px; }
    .ae-optin form .submit input,.ae-optin form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:420px){ .ae-browsers { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-ico">🧭</div>
      <h1>%%title%%</h1>
      <p class="lead">%%description%%</p>
      <div class="ae-browsers">
        <div class="ae-b"><div class="em">🟢</div><div class="nm">Chrome</div></div>
        <div class="ae-b"><div class="em">🦊</div><div class="nm">Firefox</div></div>
        <div class="ae-b"><div class="em">🧭</div><div class="nm">Safari</div></div>
        <div class="ae-b"><div class="em">🔷</div><div class="nm">Edge</div></div>
      </div>
      <div class="ae-optin">
        <div class="t">最新ブラウザのご案内を受け取る</div>
        <div class="d">推奨環境へのアップデート手順をメールでお送りします</div>
        %%content%%
      </div>
    </div>
  </div>
</body>
</html>
