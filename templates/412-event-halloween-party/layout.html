<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f97316; --purple:#7c3aed; --ink:#f5edff; --muted:#b8a8d8; --line:#3a2a52; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#150a26; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(160deg,#3b1d6e,#1f0f3a); border:1px solid var(--line); border-radius:20px; padding:34px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(124,58,237,.25); }
    .ae-hero::after { content:"🎃 👻 🦇 🕸️ 🍬 🎃 👻 🦇"; position:absolute; bottom:8px; left:0; right:0; font-size:13px; letter-spacing:3px; opacity:.3; }
    .ae-hero .em { font-size:46px; margin-bottom:6px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; color:#fff; }
    .ae-hero p { margin:0; color:var(--muted); font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#231140; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:22px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-fun { background:#231140; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-fun .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#fff; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#231140; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#150a26; color:#f5edff; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🎃</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">10.31 (金) 18:00</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">サンプルホール</div></div>
      <div class="ae-i"><div class="ic">👗</div><div class="k">ドレスコード</div><div class="v">仮装大歓迎</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">当日のお楽しみ</div>
      <div class="g">
        <div class="ae-f"><span class="e">🏆</span> 仮装コンテスト（豪華賞品）</div>
        <div class="ae-f"><span class="e">🍬</span> トリック・オア・トリート</div>
        <div class="ae-f"><span class="e">🎵</span> DJ＆ダンスフロア</div>
        <div class="ae-f"><span class="e">📸</span> フォトブース</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">参加申し込み</div>
      <div class="d">仮装での参加表明やコンテストエントリーもこちらから</div>
      %%content%%
    </div>
  </div>
</body>
</html>
