<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1d4ed8; --done:#16a34a; --ink:#0f1f3a; --muted:#5a6b85; --line:#dde6f2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3f7fc; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:24px; }
    .ae-done .chk { width:66px; height:66px; border-radius:50%; background:var(--done); color:#fff; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 12px; }
    .ae-done h1 { font-size:23px; margin:0 0 4px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-ref { background:#eff6ff; border:1px dashed var(--accent); border-radius:12px; padding:14px; text-align:center; margin-bottom:22px; }
    .ae-ref .k { font-size:12px; color:var(--muted); } .ae-ref .v { font-weight:900; font-size:20px; color:var(--accent); letter-spacing:1px; }
    .ae-steps { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:22px; box-shadow:0 8px 22px rgba(29,78,216,.05); }
    .ae-steps .t { font-weight:700; font-size:14px; margin-bottom:12px; }
    .ae-st { display:flex; gap:12px; padding:8px 0; }
    .ae-st .dot { width:24px; height:24px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
    .ae-st.done .dot { background:var(--done); color:#fff; }
    .ae-st.now .dot { background:var(--accent); color:#fff; }
    .ae-st.todo .dot { background:#e2e8f0; color:#94a3b8; }
    .ae-st .lab { font-size:13px; } .ae-st.todo .lab { color:var(--muted); }
    .ae-st .lab b { display:block; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-ref"><div class="k">受付番号</div><div class="v">AP-20260611-0087</div></div>
    <div class="ae-steps">
      <div class="t">これからの流れ</div>
      <div class="ae-st done"><span class="dot">✓</span><span class="lab"><b>申請受付</b>内容を受け付けました</span></div>
      <div class="ae-st now"><span class="dot">2</span><span class="lab"><b>書類審査（現在ここ）</b>5営業日以内に結果をご連絡します</span></div>
      <div class="ae-st todo"><span class="dot">3</span><span class="lab"><b>面談・最終確認</b>通過された方のみご案内します</span></div>
      <div class="ae-st todo"><span class="dot">4</span><span class="lab"><b>結果通知</b>メールにて合否をお知らせします</span></div>
    </div>
    <div class="ae-card">
      <div class="t">審査状況の通知を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
