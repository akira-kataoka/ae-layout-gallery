<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f97316; --accent2:#ec4899; --ink:#1f2937; --muted:#6b7280; --line:#f1d6c4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff7ed; line-height:1.7; }
    .ae-wrap { max-width:680px; margin:0 auto; padding:48px 20px; text-align:center; }
    .ae-gift { font-size:54px; }
    .ae-wrap h1 { font-size:30px; margin:8px 0; }
    .ae-wrap > p { color:var(--muted); max-width:520px; margin:0 auto 24px; }
    .ae-reward { display:inline-flex; gap:18px; background:linear-gradient(120deg,var(--accent),var(--accent2)); color:#fff; padding:18px 28px; border-radius:16px; margin-bottom:28px; box-shadow:0 12px 30px rgba(249,115,22,.3); }
    .ae-reward .b { text-align:center; }
    .ae-reward .num { font-size:26px; font-weight:800; }
    .ae-reward .lbl { font-size:12px; opacity:.9; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 6px 20px rgba(249,115,22,.08); }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    .ae-steps { display:flex; gap:14px; justify-content:center; margin:26px 0 0; flex-wrap:wrap; }
    .ae-steps div { flex:1; min-width:140px; font-size:13px; color:var(--muted); }
    .ae-steps .n { display:inline-flex; width:30px; height:30px; border-radius:50%; background:#ffedd5; color:var(--accent); font-weight:800; align-items:center; justify-content:center; margin-bottom:6px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-gift">🎁</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-reward"><div class="b"><div class="num">¥3,000</div><div class="lbl">あなたへ</div></div><div class="b"><div class="num">¥3,000</div><div class="lbl">ご友人へ</div></div></div>
    <div class="ae-card">%%content%%</div>
    <div class="ae-steps">
      <div><span class="n">1</span><br>友人を招待</div>
      <div><span class="n">2</span><br>友人が登録</div>
      <div><span class="n">3</span><br>特典をGET</div>
    </div>
  </div>
</body>
</html>
