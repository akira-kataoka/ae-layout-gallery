<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ea580c; --ink:#1c1917; --muted:#78716c; --line:#eee6df; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff7ed; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .ic { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:6px 0; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-cart { background:#fff; border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 8px 26px rgba(234,88,12,.1); }
    .ae-item { display:flex; gap:14px; align-items:center; padding:16px 18px; border-bottom:1px solid var(--line); }
    .ae-item .thumb { width:56px; height:56px; border-radius:10px; background:linear-gradient(135deg,#fed7aa,#ea580c); flex:none; display:flex; align-items:center; justify-content:center; font-size:26px; }
    .ae-item b { display:block; font-size:14px; } .ae-item small { color:var(--muted); }
    .ae-item .price { margin-left:auto; font-weight:800; }
    .ae-foot { padding:18px; }
    .ae-cta { display:block; text-align:center; background:var(--accent); color:#fff; text-decoration:none; padding:15px; border-radius:10px; font-weight:800; font-size:16px; }
    .ae-rem { margin-top:18px; background:#fff; border:1px dashed #fdba74; border-radius:12px; padding:18px; text-align:center; }
    .ae-rem form input[type=email] { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
    .ae-rem form p { margin:0 0 10px; }
    .ae-rem form .submit input,.ae-rem form button { width:100%; background:#1c1917; color:#fff; border:0; padding:12px; border-radius:8px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ic">🛒</div><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-cart">
      <div class="ae-item"><div class="thumb">👟</div><div><b>ランニングシューズ</b><small>サイズ: 27.0cm / ブラック</small></div><span class="price">¥12,800</span></div>
      <div class="ae-item"><div class="thumb">🧦</div><div><b>スポーツソックス 3足組</b><small>フリーサイズ</small></div><span class="price">¥1,500</span></div>
      <div class="ae-foot"><a class="ae-cta" href="#">カートに戻って購入を完了する</a></div>
    </div>
    <div class="ae-rem"><p style="font-weight:700;">あとで購入する？ リマインダーを送ります</p>%%content%%</div>
  </div>
</body>
</html>
