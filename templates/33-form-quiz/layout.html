<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9333ea; --ink:#1e1530; --muted:#6b7280; --line:#ece3f7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(160deg,#faf5ff,#eef2ff); line-height:1.7; min-height:100vh; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:48px 20px; }
    .ae-bar { height:8px; background:#ede9fe; border-radius:999px; overflow:hidden; margin-bottom:20px; }
    .ae-bar i { display:block; height:100%; width:33%; background:linear-gradient(90deg,#a855f7,#9333ea); }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { margin:0 0 6px; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border-radius:18px; box-shadow:0 12px 34px rgba(147,51,234,.12); padding:32px 28px; }
    .ae-card form fieldset { border:0; padding:0; margin:0 0 22px; }
    .ae-card form legend { font-weight:700; margin-bottom:10px; }
    .ae-card form label { display:flex; align-items:center; gap:10px; padding:12px 14px; border:1px solid var(--line); border-radius:12px; margin-bottom:8px; cursor:pointer; font-size:14px; }
    .ae-card form label:hover { border-color:#c4b5fd; background:#faf5ff; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-bar"><i></i></div>
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
