<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1e40af; --ink:#0f1b33; --muted:#5a6781; --line:#dde3ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f2f5fb; line-height:1.7; }
    .ae-wrap { max-width:580px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-steps { display:flex; gap:8px; margin-bottom:20px; }
    .ae-s { flex:1; background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 8px; text-align:center; box-shadow:0 6px 18px rgba(30,64,175,.05); }
    .ae-s .no { width:24px; height:24px; border-radius:50%; background:#dbeafe; color:var(--accent); font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; }
    .ae-s .tx { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=date],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    .ae-foot { color:var(--muted); font-size:12px; text-align:center; margin-top:12px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🛠️</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-steps">
      <div class="ae-s"><div class="no">1</div><div class="tx">申請内容を入力</div></div>
      <div class="ae-s"><div class="no">2</div><div class="tx">保証内容を確認</div></div>
      <div class="ae-s"><div class="no">3</div><div class="tx">修理・交換のご案内</div></div>
    </div>
    <div class="ae-card">
      <div class="t">保証修理・交換のお申し込み</div>
      %%content%%
      <p class="ae-foot">保証書（または購入証明）の番号をお手元にご用意ください。</p>
    </div>
  </div>
</body>
</html>
