<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#1a142b; --muted:#6b6480; --line:#e7e2f2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f8f6fd; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(124,58,237,.09); }
    .ae-row { margin-bottom:20px; }
    .ae-row .lbl { display:flex; justify-content:space-between; font-weight:700; font-size:14px; margin-bottom:8px; }
    .ae-row .lbl .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-row input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-toggle { display:flex; gap:6px; background:#f3effc; border-radius:10px; padding:4px; margin-bottom:20px; }
    .ae-toggle button { flex:1; border:0; background:transparent; padding:9px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; color:var(--muted); }
    .ae-toggle button.on { background:#fff; color:var(--accent); box-shadow:0 2px 8px rgba(124,58,237,.16); }
    .ae-out { background:linear-gradient(135deg,#7c3aed,#4f46e5); color:#fff; border-radius:14px; padding:22px; text-align:center; }
    .ae-out .big { font-size:38px; font-weight:900; font-variant-numeric:tabular-nums; }
    .ae-out .per { font-size:14px; opacity:.9; }
    .ae-out .save { margin-top:6px; font-size:13px; background:rgba(255,255,255,.18); display:inline-block; padding:2px 12px; border-radius:999px; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-toggle" id="cycle">
        <button type="button" class="on" data-cycle="month">月額払い</button>
        <button type="button" data-cycle="year">年額払い（2ヶ月分お得）</button>
      </div>
      <div class="ae-row"><div class="lbl"><span>利用ユーザー数</span><span class="v"><span id="vUsers">10</span> 名</span></div>
        <input type="range" id="users" min="1" max="200" value="10"></div>
      <div class="ae-row"><div class="lbl"><span>月間処理件数</span><span class="v"><span id="vReq">5,000</span> 件</span></div>
        <input type="range" id="req" min="1000" max="100000" step="1000" value="5000"></div>
      <div class="ae-out">
        <div class="big">¥<span id="price">0</span></div>
        <div class="per" id="perLabel">/ 月（税抜）</div>
        <div class="save" id="save"></div>
      </div>
    </div>
    <div class="ae-cta">
      <div class="t">この見積もりで無料トライアルを申し込む</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var users = document.getElementById("users"), req = document.getElementById("req");
    var vUsers = document.getElementById("vUsers"), vReq = document.getElementById("vReq");
    var priceEl = document.getElementById("price"), perLabel = document.getElementById("perLabel"), saveEl = document.getElementById("save");
    var cycleBtns = Array.prototype.slice.call(document.querySelectorAll("#cycle button"));
    var cycle = "month";
    function calc() {
      var u = parseInt(users.value, 10), r = parseInt(req.value, 10);
      vUsers.textContent = u; vReq.textContent = r.toLocaleString("ja-JP");
      var monthly = 980 + u * 300 + Math.ceil(r / 1000) * 50;
      if (cycle === "year") {
        var yearly = monthly * 10; // 12ヶ月分を10ヶ月価格に
        priceEl.textContent = yearly.toLocaleString("ja-JP");
        perLabel.textContent = "/ 年（税抜）";
        saveEl.textContent = "年額で ¥" + (monthly * 2).toLocaleString("ja-JP") + " お得";
      } else {
        priceEl.textContent = monthly.toLocaleString("ja-JP");
        perLabel.textContent = "/ 月（税抜）";
        saveEl.textContent = "";
      }
    }
    [users, req].forEach(function (el) { el.addEventListener("input", calc); });
    cycleBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        cycleBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on");
        cycle = b.getAttribute("data-cycle");
        calc();
      });
    });
    calc();
  })();
  </script>
</body>
</html>
