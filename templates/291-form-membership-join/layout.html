<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#1b1430; --muted:#6b6480; --line:#e8e3f4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f8f6fd; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-plans { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .ae-plan { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 10px; text-align:center; box-shadow:0 6px 18px rgba(124,58,237,.05); }
    .ae-plan.pop { border-color:var(--accent); position:relative; }
    .ae-plan.pop::before { content:"おすすめ"; position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; font-size:10px; font-weight:700; padding:2px 10px; border-radius:999px; }
    .ae-plan .nm { font-weight:800; font-size:13px; } .ae-plan .pr { color:var(--accent); font-weight:900; font-size:15px; margin-top:4px; } .ae-plan .per { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:440px){ .ae-plans { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-plans">
      <div class="ae-plan"><div class="nm">無料会員</div><div class="pr">¥0</div><div class="per">/ 月</div></div>
      <div class="ae-plan pop"><div class="nm">スタンダード</div><div class="pr">¥980</div><div class="per">/ 月</div></div>
      <div class="ae-plan"><div class="nm">プレミアム</div><div class="pr">¥1,980</div><div class="per">/ 月</div></div>
    </div>
    <div class="ae-card">
      <div class="t">会員情報の登録</div>
      %%content%%
    </div>
  </div>
</body>
</html>
