<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#fff; --muted:#ffe1f0; --line:rgba(255,255,255,.28); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#2a1320; background:#fdeef6; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(120deg,#f472b6,#a855f7 35%,#22d3ee 70%,#fbbf24); color:#fff; border-radius:20px; padding:36px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 44px rgba(168,85,247,.3); }
    .ae-hero::after { content:"● ● ● ● ● ● ● ● ● ● ●"; position:absolute; bottom:10px; left:0; right:0; font-size:14px; letter-spacing:6px; opacity:.5; }
    .ae-hero .em { font-size:46px; margin-bottom:2px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; text-shadow:0 2px 14px rgba(0,0,0,.2); }
    .ae-hero p { margin:0; opacity:.97; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid #f6dced; border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:22px; } .ae-i .k { font-size:11px; color:#8a657a; } .ae-i .v { font-weight:800; font-size:13px; color:#2a1320; }
    .ae-fun { background:#fff; border:1px solid #f6dced; border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-fun .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#2a1320; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; color:#2a1320; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#2a1320; }
    .ae-card .d { color:#8a657a; font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid #f0dce8; border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🌈</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">10.19 (日) 9:00 スタート</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">海浜パーク</div></div>
      <div class="ae-i"><div class="ic">🏃</div><div class="k">距離</div><div class="v">約5km（タイム計測なし）</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">カラーランのたのしみ</div>
      <div class="g">
        <div class="ae-f"><span class="e">🎨</span> 5色のカラーステーション</div>
        <div class="ae-f"><span class="e">🎉</span> ゴール後のカラーパーティー</div>
        <div class="ae-f"><span class="e">🎽</span> 参加Tシャツ＆カラーパウダー付</div>
        <div class="ae-f"><span class="e">👨‍👩‍👧</span> 親子・歩いて参加もOK</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">エントリー受付</div>
      <div class="d">記録より思い出！真っ白な服でご参加ください</div>
      %%content%%
    </div>
  </div>
</body>
</html>
