<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#15803d; --ink:#13241a; --muted:#5d7064; --line:#d9eadf; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef5ef; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(135deg,#16a34a,#15803d); color:#fff; border-radius:22px; padding:38px 26px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 42px rgba(21,128,61,.26); }
    .ae-hero::after { content:"⛺ 🌲 🔥 ⭐ 🌲 ⛺"; position:absolute; bottom:8px; left:0; right:0; font-size:15px; letter-spacing:6px; opacity:.22; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.22); font-weight:800; font-size:11px; letter-spacing:2px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:26px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-pts { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:22px 0; }
    .ae-pt { background:#fff; border:1px solid var(--line); border-radius:13px; padding:15px 8px; text-align:center; box-shadow:0 6px 16px rgba(21,128,61,.06); }
    .ae-pt .ic { font-size:23px; } .ae-pt .k { font-size:12px; font-weight:700; margin-top:4px; } .ae-pt .d { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(21,128,61,.08); }
    .ae-card .t { font-weight:800; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:440px){ .ae-pts { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <span class="badge">手ぶらでOK・温泉付き</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-pts">
      <div class="ae-pt"><div class="ic">⛺</div><div class="k">冷暖房完備</div><div class="d">全天候OK</div></div>
      <div class="ae-pt"><div class="ic">🍖</div><div class="k">BBQ食材付</div><div class="d">準備・片付け不要</div></div>
      <div class="ae-pt"><div class="ic">♨️</div><div class="k">貸切温泉</div><div class="d">星空を眺めて</div></div>
    </div>
    <div class="ae-card">
      <div class="t">ご予約・空き状況のお問い合わせ</div>
      <div class="s">ご宿泊日・人数・プランをお選びください。ペット同伴プランもございます。</div>
      %%content%%
      <div class="ae-note">🌌 チェックイン15:00／アウト10:00。雨天でも快適にお過ごしいただけます</div>
    </div>
  </div>
</body>
</html>
