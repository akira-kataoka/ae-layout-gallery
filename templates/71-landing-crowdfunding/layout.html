<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#16a34a; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f4faf6; line-height:1.7; }
    .ae-grid { max-width:980px; margin:0 auto; padding:40px 20px; display:grid; grid-template-columns:1.3fr .7fr; gap:30px; align-items:start; }
    .ae-cover { height:240px; border-radius:16px; background:linear-gradient(135deg,#bbf7d0,#16a34a); display:flex; align-items:center; justify-content:center; font-size:64px; }
    .ae-main h1 { font-size:26px; margin:18px 0 8px; }
    .ae-main p { color:var(--muted); }
    .ae-side { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; position:sticky; top:20px; box-shadow:0 8px 24px rgba(22,163,74,.1); }
    .ae-amt { font-size:30px; font-weight:800; color:var(--accent); }
    .ae-amt small { font-size:13px; color:var(--muted); font-weight:400; }
    .ae-bar { height:10px; background:#dcfce7; border-radius:999px; overflow:hidden; margin:12px 0 6px; }
    .ae-bar i { display:block; height:100%; width:72%; background:var(--accent); }
    .ae-figs { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:16px; }
    .ae-tier { border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px; font-size:13px; }
    .ae-tier b { color:var(--accent); }
    .ae-side form input[type=text],.ae-side form input[type=email] { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
    .ae-side form p { margin:0 0 12px; }
    .ae-side form .submit input,.ae-side form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:820px){ .ae-grid { grid-template-columns:1fr; } .ae-side { position:static; } }
  </style>
</head>
<body>
  <div class="ae-grid">
    <article class="ae-main">
      <div class="ae-cover">🚀</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </article>
    <aside class="ae-side">
      <div class="ae-amt">¥7,200,000 <small>集まりました</small></div>
      <div class="ae-bar"><i></i></div>
      <div class="ae-figs"><span>目標 ¥10,000,000</span><span>残り 18日</span></div>
      <div class="ae-tier">🎁 <b>¥3,000</b> — 限定ステッカー＆お礼メール</div>
      <div class="ae-tier">🎁 <b>¥10,000</b> — 製品先行1個＋クレジット記載</div>
      %%content%%
    </aside>
  </div>
</body>
</html>
