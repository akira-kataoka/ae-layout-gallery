<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1d4ed8; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef2f9; line-height:1.7; }
    .ae-head { text-align:center; padding:48px 20px 8px; }
    .ae-head h1 { font-size:26px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-book { max-width:520px; margin:20px auto; padding:0 20px; }
    .ae-page { aspect-ratio:3/4; border-radius:14px; box-shadow:0 16px 40px rgba(15,23,42,.18); display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-size:18px; font-weight:700; text-align:center; padding:24px; }
    .ae-page.active { display:flex; animation:flip .3s ease; }
    @keyframes flip { from { opacity:0; transform:rotateY(12deg); } to { opacity:1; transform:none; } }
    .ae-page .big { font-size:72px; }
    .ae-p1 { background:linear-gradient(160deg,#3b82f6,#1d4ed8); } .ae-p2 { background:linear-gradient(160deg,#10b981,#0f766e); }
    .ae-p3 { background:linear-gradient(160deg,#f59e0b,#b45309); } .ae-p4 { background:linear-gradient(160deg,#ec4899,#9d174d); }
    .ae-nav { display:flex; align-items:center; justify-content:center; gap:16px; margin-top:14px; }
    .ae-nav button { width:42px; height:42px; border-radius:50%; border:1px solid var(--line); background:#fff; cursor:pointer; font-size:18px; }
    .ae-nav button:disabled { opacity:.4; cursor:not-allowed; }
    .ae-nav .pg { font-weight:700; color:var(--muted); }
    .ae-body { max-width:480px; margin:18px auto 56px; padding:0 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <header class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></header>
  <section class="ae-book">
    <div class="ae-pages" id="pages">
      <div class="ae-page ae-p1 active"><div class="big">📘</div>表紙：2026 コレクション</div>
      <div class="ae-page ae-p2"><div class="big">🪑</div>P2：リビング特集</div>
      <div class="ae-page ae-p3"><div class="big">🛏️</div>P3：ベッドルーム</div>
      <div class="ae-page ae-p4"><div class="big">🍽️</div>P4：ダイニング</div>
    </div>
    <div class="ae-nav"><button type="button" id="prev" aria-label="前のページ" disabled>‹</button><span class="pg" id="pg">1 / 4</span><button type="button" id="next" aria-label="次のページ">›</button></div>
  </section>
  <div class="ae-body"><div class="ae-card"><div class="t">PDF版カタログを受け取る</div>%%content%%</div></div>

  <script>
  (function () {
    var pages = Array.prototype.slice.call(document.querySelectorAll(".ae-page"));
    var prev = document.getElementById("prev"), next = document.getElementById("next"), pg = document.getElementById("pg");
    var i = 0;
    function show(n) {
      i = Math.max(0, Math.min(pages.length - 1, n));
      pages.forEach(function (p, idx) { p.classList.toggle("active", idx === i); });
      pg.textContent = (i + 1) + " / " + pages.length;
      prev.disabled = i === 0;
      next.disabled = i === pages.length - 1;
    }
    prev.addEventListener("click", function () { show(i - 1); });
    next.addEventListener("click", function () { show(i + 1); });
    show(0);
  })();
  </script>
</body>
</html>
