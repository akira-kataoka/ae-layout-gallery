<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ef4444; --ink:#1a1110; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#fff; line-height:1.7;
      background:radial-gradient(900px 500px at 50% -10%,#7f1d1d,transparent), linear-gradient(160deg,#1a1110,#2b1414); }
    .ae-wrap { max-width:680px; margin:0 auto; padding:56px 20px; text-align:center; }
    .ae-flag { display:inline-block; background:var(--accent); color:#fff; font-weight:800; letter-spacing:.1em; padding:7px 18px; border-radius:999px; font-size:13px; box-shadow:0 8px 24px rgba(239,68,68,.4); }
    .ae-wrap h1 { font-size:clamp(28px,6vw,44px); margin:16px 0 6px; }
    .ae-wrap h1 b { color:#fca5a5; }
    .ae-sub { color:#fecaca; margin:0 0 26px; }
    .ae-timer { display:flex; gap:12px; justify-content:center; margin-bottom:30px; }
    .ae-timer .u { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:14px 8px; min-width:74px; }
    .ae-timer .n { font-size:34px; font-weight:800; line-height:1; }
    .ae-timer .l { font-size:11px; color:#fecaca; margin-top:6px; }
    .ae-card { background:#fff; color:var(--ink); border-radius:16px; padding:28px 26px; box-shadow:0 18px 50px rgba(0,0,0,.4); }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:13px 14px; border:1px solid #e5e7eb; border-radius:10px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <span class="ae-flag">期間限定セール</span>
    <h1>%%title%%</h1>
    <p class="ae-sub">%%description%%</p>
    <div class="ae-timer">
      <div class="u"><div class="n">02</div><div class="l">日</div></div>
      <div class="u"><div class="n">11</div><div class="l">時間</div></div>
      <div class="u"><div class="n">45</div><div class="l">分</div></div>
      <div class="u"><div class="n">30</div><div class="l">秒</div></div>
    </div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
