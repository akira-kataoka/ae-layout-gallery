<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ca8a04; --ink:#2a230c; --muted:#6e6344; --line:#f0e7c9; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fffbeb; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .em { font-size:50px; }
    .ae-done h1 { font-size:23px; margin:6px 0 4px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-item { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; display:flex; gap:14px; align-items:center; margin-bottom:16px; box-shadow:0 8px 26px rgba(202,138,4,.08); }
    .ae-item .ph { width:64px; height:64px; border-radius:12px; background:linear-gradient(135deg,#fde68a,#fbbf24); display:flex; align-items:center; justify-content:center; font-size:30px; flex:0 0 auto; }
    .ae-item .nm { font-weight:800; } .ae-item .meta { font-size:12px; color:var(--muted); }
    .ae-balance { display:flex; justify-content:space-around; background:#fffdf5; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:20px; }
    .ae-balance .lab { font-size:12px; color:var(--muted); } .ae-balance .num { font-weight:800; font-size:18px; font-variant-numeric:tabular-nums; }
    .ae-deliver { background:#fffaf0; border:1px solid var(--line); border-radius:12px; padding:14px 16px; font-size:13px; color:#5a4a30; margin-bottom:22px; text-align:center; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="em">🎁</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-item">
      <div class="ph">☕</div>
      <div><div class="nm">人気カフェ ドリンク引換券</div><div class="meta">交換ポイント: 500 pt</div></div>
    </div>
    <div class="ae-balance">
      <div><div class="lab">交換後の残高</div><div class="num">1,640 pt</div></div>
      <div><div class="lab">有効期限</div><div class="num">2027/06/30</div></div>
    </div>
    <div class="ae-deliver">📧 引換コードを登録メールに送信しました。アプリのクーポン一覧からもご利用いただけます。</div>
    <div class="ae-card">
      <div class="t">ポイントが貯まるお得情報を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
