<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#1b1430; --muted:#6b6480; --line:#e8e3f4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f8f6fd; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:66px; height:66px; border-radius:50%; background:#7c3aed; color:#fff; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 12px; }
    .ae-done h1 { font-size:23px; margin:0 0 4px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-item { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px; display:flex; gap:14px; align-items:center; margin-bottom:16px; box-shadow:0 8px 26px rgba(124,58,237,.07); }
    .ae-item .ph { width:70px; height:70px; border-radius:12px; background:linear-gradient(135deg,#c4b5fd,#7c3aed); display:flex; align-items:center; justify-content:center; font-size:34px; flex:0 0 auto; }
    .ae-item .nm { font-weight:800; } .ae-item .meta { font-size:12px; color:var(--muted); } .ae-item .pr { color:var(--accent); font-weight:900; margin-top:2px; }
    .ae-release { background:linear-gradient(135deg,#7c3aed,#5b21b6); color:#fff; border-radius:14px; padding:18px; text-align:center; margin-bottom:18px; }
    .ae-release .k { font-size:12px; opacity:.9; } .ae-release .v { font-size:22px; font-weight:900; } .ae-release .note { font-size:12px; opacity:.92; margin-top:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-item">
      <div class="ph">🎮</div>
      <div><div class="nm">次世代ゲーム機 Pro Edition</div><div class="meta">予約番号: PO-20260611-0210</div><div class="pr">¥59,800</div></div>
    </div>
    <div class="ae-release">
      <div class="k">発売予定日</div>
      <div class="v">2026年9月20日</div>
      <div class="note">発送準備が整い次第、メールでお知らせします</div>
    </div>
    <div class="ae-card">
      <div class="t">入荷・発送の最新情報を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
