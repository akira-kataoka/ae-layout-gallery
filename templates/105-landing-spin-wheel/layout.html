<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#e11d48; --ink:#1a0f16; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#fff; line-height:1.7;
      background:radial-gradient(800px 460px at 50% -8%,#be123c,transparent), linear-gradient(160deg,#4c0519,#1a0f16); }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; text-align:center; }
    .ae-wrap h1 { font-size:clamp(26px,6vw,38px); margin:6px 0; }
    .ae-sub { color:#fecdd3; margin:0 0 20px; }
    .ae-wheel { width:220px; height:220px; margin:0 auto 22px; border-radius:50%; border:8px solid #fff; position:relative;
      background:conic-gradient(#f43f5e 0 60deg,#fb923c 60deg 120deg,#facc15 120deg 180deg,#34d399 180deg 240deg,#38bdf8 240deg 300deg,#a78bfa 300deg 360deg);
      box-shadow:0 20px 50px rgba(0,0,0,.45); }
    .ae-wheel::after { content:"🎯"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:34px; background:#fff; width:54px; height:54px; border-radius:50%; margin:auto; }
    .ae-pin { font-size:24px; margin-top:-14px; }
    .ae-card { background:#fff; color:var(--ink); border-radius:18px; padding:28px 26px; box-shadow:0 18px 50px rgba(0,0,0,.4); }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:13px 14px; border:1px solid #e5e7eb; border-radius:10px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <h1>%%title%%</h1>
    <p class="ae-sub">%%description%%</p>
    <div class="ae-wheel"></div>
    <div class="ae-pin">▲</div>
    <div class="ae-card"><div class="t">メール登録でルーレットを回す 🎁</div>%%content%%</div>
  </div>
</body>
</html>
