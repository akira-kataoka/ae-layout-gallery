<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4338ca; --ink:#16182e; --muted:#5e648a; --line:#e2e3f4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f2f2fb; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(67,56,202,.09); }
    .ae-field { margin-bottom:18px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-out { background:linear-gradient(135deg,#6366f1,#4338ca); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .lab { font-size:13px; opacity:.9; } .ae-out .big { font-size:40px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-out .big small { font-size:15px; } .ae-out .sub { font-size:13px; opacity:.95; margin-top:6px; }
    .ae-row2 { display:flex; gap:8px; margin-top:14px; }
    .ae-g { flex:1; background:rgba(255,255,255,.15); border-radius:10px; padding:10px 6px; }
    .ae-g .k { font-size:11px; opacity:.9; } .ae-g .n { font-weight:800; font-variant-numeric:tabular-nums; }
    .ae-warn { background:rgba(0,0,0,.18); border-radius:10px; padding:10px; font-size:12px; margin-top:12px; }
    .ae-note { font-size:11px; color:var(--muted); margin-top:12px; text-align:center; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>毎月の固定費 <span class="v"><span id="vF">50</span> 万円</span></label>
        <input type="range" id="f" min="5" max="500" step="5" value="50"></div>
      <div class="ae-field"><label>商品の販売単価 <span class="v">¥<span id="vP">3000</span></span></label>
        <input type="range" id="p" min="100" max="30000" step="100" value="3000"></div>
      <div class="ae-field"><label>1個あたりの変動費（原価） <span class="v">¥<span id="vV">1200</span></span></label>
        <input type="range" id="v" min="0" max="20000" step="100" value="1200"></div>
      <div class="ae-out">
        <div class="lab">損益分岐点（毎月これだけ売れば黒字）</div>
        <div class="big"><span id="units">0</span><small> 個/月</small></div>
        <div class="sub">1日あたり 約 <span id="perday">0</span> 個ペース</div>
        <div class="ae-row2">
          <div class="ae-g"><div class="k">必要な売上高</div><div class="n">¥<span id="rev">0</span></div></div>
          <div class="ae-g"><div class="k">1個あたり利益</div><div class="n">¥<span id="margin">0</span></div></div>
        </div>
        <div class="ae-warn" id="warn" hidden>⚠️ 単価が変動費を下回っています。売るほど赤字になる設定です。</div>
      </div>
      <div class="ae-note">※ 概算です。実際は税・人件費の扱い等で異なります。</div>
    </div>
    <div class="ae-cta">
      <div class="t">事業計画・資金繰りのお役立ち情報を受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var f = document.getElementById("f"), p = document.getElementById("p"), v = document.getElementById("v");
    var vF = document.getElementById("vF"), vP = document.getElementById("vP"), vV = document.getElementById("vV");
    var unitsEl = document.getElementById("units"), perdayEl = document.getElementById("perday");
    var revEl = document.getElementById("rev"), marginEl = document.getElementById("margin"), warn = document.getElementById("warn");
    function calc() {
      var fixed = (parseInt(f.value, 10) || 0) * 10000;
      var price = parseInt(p.value, 10) || 0;
      var varc = parseInt(v.value, 10) || 0;
      vF.textContent = parseInt(f.value, 10) || 0;
      vP.textContent = price.toLocaleString();
      vV.textContent = varc.toLocaleString();
      var margin = price - varc;
      marginEl.textContent = margin.toLocaleString();
      if (margin <= 0) {
        warn.hidden = false;
        unitsEl.textContent = "—"; perdayEl.textContent = "—"; revEl.textContent = "—";
        return;
      }
      warn.hidden = true;
      var units = Math.ceil(fixed / margin);
      unitsEl.textContent = units.toLocaleString();
      perdayEl.textContent = Math.ceil(units / 30).toLocaleString();
      revEl.textContent = (units * price).toLocaleString();
    }
    [f, p, v].forEach(function (el) { el.addEventListener("input", calc); });
    calc();
  })();
  </script>
</body>
</html>
