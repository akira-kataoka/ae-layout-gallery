<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0891b2; --ink:#0c2228; --muted:#5a747c; --line:#d6eaee; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eefbfd; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(8,145,178,.09); }
    .ae-field { margin-bottom:18px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-act { display:flex; gap:6px; background:#dcf2f6; border-radius:10px; padding:4px; }
    .ae-act button { flex:1; border:0; background:transparent; padding:9px 4px; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; color:var(--muted); }
    .ae-act button.on { background:#fff; color:var(--accent); box-shadow:0 2px 8px rgba(8,145,178,.18); }
    .ae-out { background:linear-gradient(135deg,#0891b2,#0e7490); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .lab { font-size:13px; opacity:.9; } .ae-out .big { font-size:42px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-out .big small { font-size:16px; } .ae-out .cups { font-size:13px; opacity:.95; margin-top:4px; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>体重 <span class="v"><span id="vW">60</span> kg</span></label>
        <input type="range" id="w" min="35" max="120" step="1" value="60"></div>
      <div class="ae-field"><label>活動量</label>
        <div class="ae-act" id="act">
          <button type="button" data-f="1" class="on">ふつう</button>
          <button type="button" data-f="1.15">よく動く</button>
          <button type="button" data-f="1.3">運動する</button>
        </div></div>
      <div class="ae-out">
        <div class="lab">1日の水分摂取の目安</div>
        <div class="big"><span id="liters">0</span><small> L</small></div>
        <div class="cups">コップ（200ml）約 <span id="cups">0</span> 杯ぶん</div>
      </div>
    </div>
    <div class="ae-cta">
      <div class="t">水分補給に役立つ情報を受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var w = document.getElementById("w"), vW = document.getElementById("vW");
    var actBtns = Array.prototype.slice.call(document.querySelectorAll("#act button"));
    var litersEl = document.getElementById("liters"), cupsEl = document.getElementById("cups");
    var factor = 1;
    function calc() {
      var kg = parseInt(w.value, 10) || 0;
      vW.textContent = kg;
      var ml = kg * 35 * factor;        // 体重1kgあたり約35ml
      litersEl.textContent = (Math.round(ml / 100) / 10).toFixed(1);
      cupsEl.textContent = Math.round(ml / 200);
    }
    w.addEventListener("input", calc);
    actBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        actBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); factor = parseFloat(b.getAttribute("data-f")); calc();
      });
    });
    calc();
  })();
  </script>
</body>
</html>
