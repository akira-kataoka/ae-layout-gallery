<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#e11d48; --ink:#1c1014; --muted:#78716c; --line:#f0dde2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff5f7; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:16px; }
    .ae-head .ic { font-size:42px; }
    .ae-head h1 { margin:6px 0; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-steps { display:flex; justify-content:space-between; margin:16px 0; font-size:12px; color:var(--muted); }
    .ae-steps div { flex:1; text-align:center; }
    .ae-steps .n { display:inline-flex; width:28px; height:28px; border-radius:50%; background:#fecdd3; color:var(--accent); font-weight:800; align-items:center; justify-content:center; margin-bottom:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(225,29,72,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=file],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ic">🧾</div><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-steps"><div><span class="n">1</span><br>商品購入</div><div><span class="n">2</span><br>レシート撮影</div><div><span class="n">3</span><br>応募完了</div></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
