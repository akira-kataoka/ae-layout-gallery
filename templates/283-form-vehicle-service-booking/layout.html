<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1e40af; --ink:#0f1b33; --muted:#5a6781; --line:#dde3ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f2f5fb; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-menus { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
    .ae-srv { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; box-shadow:0 6px 18px rgba(30,64,175,.05); }
    .ae-srv .nm { font-weight:800; font-size:14px; } .ae-srv .de { font-size:12px; color:var(--muted); } .ae-srv .pr { color:var(--accent); font-weight:900; margin-top:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form input[type=number],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-menus { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🚗</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-menus">
      <div class="ae-srv"><div class="nm">車検</div><div class="de">法定点検＋整備</div><div class="pr">¥39,800〜</div></div>
      <div class="ae-srv"><div class="nm">オイル交換</div><div class="de">約30分で完了</div><div class="pr">¥4,400〜</div></div>
      <div class="ae-srv"><div class="nm">タイヤ交換</div><div class="de">脱着・バランス調整</div><div class="pr">¥6,600〜</div></div>
      <div class="ae-srv"><div class="nm">12ヶ月点検</div><div class="de">定期メンテナンス</div><div class="pr">¥13,200〜</div></div>
    </div>
    <div class="ae-card">
      <div class="t">点検・整備のご予約</div>
      %%content%%
    </div>
  </div>
</body>
</html>
