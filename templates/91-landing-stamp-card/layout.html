<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ea580c; --ink:#1c1610; --muted:#78716c; --line:#f0e4d8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff7ed; line-height:1.7; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:16px; }
    .ae-head h1 { margin:0 0 6px; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-stamp { background:linear-gradient(135deg,#fb923c,#ea580c); border-radius:18px; padding:24px; box-shadow:0 12px 32px rgba(234,88,12,.28); margin-bottom:20px; }
    .ae-stamp .ttl { color:#fff; font-weight:800; margin-bottom:14px; display:flex; justify-content:space-between; }
    .ae-dots { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
    .ae-dots span { aspect-ratio:1; border-radius:50%; background:rgba(255,255,255,.25); display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; border:2px dashed rgba(255,255,255,.5); }
    .ae-dots span.on { background:#fff; color:var(--accent); border-style:solid; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:26px 24px; text-align:center; box-shadow:0 8px 24px rgba(234,88,12,.08); }
    .ae-card .t { font-weight:700; margin-bottom:6px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-stamp">
      <div class="ttl"><span>スタンプカード</span><span>6 / 10</span></div>
      <div class="ae-dots"><span class="on">★</span><span class="on">★</span><span class="on">★</span><span class="on">★</span><span class="on">★</span><span class="on">★</span><span>7</span><span>8</span><span>9</span><span>🎁</span></div>
    </div>
    <div class="ae-card"><div class="t">デジタルスタンプカードを発行</div><div class="s">登録すると来店ごとにスタンプが貯まります。</div>%%content%%</div>
  </div>
</body>
</html>
