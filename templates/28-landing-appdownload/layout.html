<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#06b6d4; --ink:#0b1324; --muted:#64748b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fdff; line-height:1.7; }
    .ae-grid { max-width:1000px; margin:0 auto; padding:56px 20px; display:grid; grid-template-columns:1fr 1fr; gap:36px; align-items:center; }
    .ae-copy h1 { font-size:34px; margin:0 0 14px; line-height:1.35; }
    .ae-copy > p { color:var(--muted); font-size:16px; margin:0 0 22px; }
    .ae-badges { display:flex; gap:12px; flex-wrap:wrap; }
    .ae-badge { display:inline-flex; align-items:center; gap:8px; background:#0b1324; color:#fff; text-decoration:none; padding:11px 18px; border-radius:12px; }
    .ae-badge .ic { font-size:22px; }
    .ae-badge .t { line-height:1.2; }
    .ae-badge .t small { display:block; font-size:10px; opacity:.8; }
    .ae-badge .t b { font-size:15px; }
    .ae-stars { margin-top:16px; color:#f59e0b; font-size:14px; }
    .ae-stars span { color:var(--muted); }
    .ae-phone { justify-self:center; width:240px; height:480px; background:linear-gradient(160deg,#0b1324,#1e293b); border-radius:36px; border:8px solid #0b1324; box-shadow:0 30px 60px rgba(6,182,212,.25); position:relative; overflow:hidden; }
    .ae-phone::before { content:""; position:absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:22px; background:#0b1324; border-radius:0 0 14px 14px; z-index:2; }
    .ae-phone .scr { position:absolute; inset:10px; border-radius:26px; background:radial-gradient(circle at 50% 30%,rgba(6,182,212,.5),transparent 60%), #0f1b2e; display:flex; align-items:center; justify-content:center; color:#fff; font-size:48px; }
    .ae-extra { max-width:1000px; margin:0 auto 56px; padding:0 20px; text-align:center; color:var(--muted); }
    @media (max-width:760px){ .ae-grid { grid-template-columns:1fr; text-align:center; } .ae-badges { justify-content:center; } }
  </style>
</head>
<body>
  <div class="ae-grid">
    <div class="ae-copy">
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      <div class="ae-badges">
        <a class="ae-badge" href="#"><span class="ic"></span><span class="t"><small>Download on the</small><b>App Store</b></span></a>
        <a class="ae-badge" href="#"><span class="ic">▶</span><span class="t"><small>GET IT ON</small><b>Google Play</b></span></a>
      </div>
      <div class="ae-stars">★★★★★ <span>4.8 / 50,000+ レビュー</span></div>
    </div>
    <div class="ae-phone"><div class="scr">📱</div></div>
  </div>
  <section class="ae-extra">%%content%%</section>
</body>
</html>
