<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ca8a04; --ink:#1f2330; --muted:#6b7280; --line:#e6e3d6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f6f4ec; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(135deg,#f59e0b,#ca8a04); color:#fff; border-radius:20px; padding:36px 26px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(202,138,4,.26); }
    .ae-hero::after { content:"🏭 ⚙️ 🔧 🏭 ⚙️ 🔧"; position:absolute; bottom:8px; left:0; right:0; font-size:14px; letter-spacing:6px; opacity:.22; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.22); font-weight:800; font-size:11px; letter-spacing:2px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; box-shadow:0 6px 16px rgba(202,138,4,.06); }
    .ae-i .ic { font-size:21px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-fun { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; box-shadow:0 8px 22px rgba(202,138,4,.05); }
    .ae-fun .t { font-weight:800; font-size:14px; margin-bottom:12px; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:800; font-size:18px; margin-bottom:4px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <span class="badge">OPEN FACTORY</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">11.8 (土) 各回90分</div></div>
      <div class="ae-i"><div class="ic">🏭</div><div class="k">集合</div><div class="v">サンプル工場 正門</div></div>
      <div class="ae-i"><div class="ic">🎫</div><div class="k">参加費</div><div class="v">無料（要予約）</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">見学のみどころ</div>
      <div class="g">
        <div class="ae-f"><span class="e">👷</span> 製造ラインを間近で見学</div>
        <div class="ae-f"><span class="e">🧪</span> ものづくり体験コーナー</div>
        <div class="ae-f"><span class="e">🎁</span> できたて製品のお土産付き</div>
        <div class="ae-f"><span class="e">👨‍👩‍👧</span> お子さま・ご家族も歓迎</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">見学ツアーのお申し込み</div>
      <div class="d">各回定員制です。安全のため動きやすい服装でお越しください</div>
      %%content%%
    </div>
  </div>
</body>
</html>
