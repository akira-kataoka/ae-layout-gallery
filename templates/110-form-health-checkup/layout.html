<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0891b2; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fafc; line-height:1.7; }
    .ae-grid { max-width:900px; margin:0 auto; padding:48px 20px; display:grid; grid-template-columns:1fr 1.1fr; gap:30px; align-items:start; }
    .ae-intro h1 { font-size:25px; margin:0 0 10px; }
    .ae-intro > p { color:var(--muted); }
    .ae-courses { margin-top:16px; }
    .ae-courses div { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:8px; font-size:14px; display:flex; justify-content:space-between; }
    .ae-courses b { color:var(--accent); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 8px 26px rgba(8,145,178,.1); }
    .ae-card h2 { margin-top:0; font-size:18px; }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form .opt { display:inline-flex; gap:6px; align-items:center; margin:2px 12px 2px 0; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
    @media (max-width:720px){ .ae-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-grid">
    <div class="ae-intro">
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      <div class="ae-courses">
        <div><span>基本コース</span><b>¥11,000</b></div>
        <div><span>充実コース（オプション付）</span><b>¥27,500</b></div>
        <div><span>人間ドック</span><b>¥49,500</b></div>
      </div>
    </div>
    <div class="ae-card"><h2>受診予約</h2>%%content%%</div>
  </div>
</body>
</html>
