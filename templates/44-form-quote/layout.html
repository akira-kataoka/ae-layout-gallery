<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#b45309; --ink:#1c1917; --muted:#78716c; --line:#e7e2dc; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#faf7f2; line-height:1.7; }
    .ae-wrap { max-width:680px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head h1 { margin:0 0 6px; font-size:26px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-flow { display:flex; gap:8px; justify-content:center; margin:18px 0 26px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
    .ae-flow span { background:#fff; border:1px solid var(--line); border-radius:999px; padding:6px 14px; }
    .ae-flow span b { color:var(--accent); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:32px 30px; box-shadow:0 8px 26px rgba(180,83,9,.08); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form .row { display:flex; gap:14px; }
    .ae-card form .row > p { flex:1; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
    @media (max-width:520px){ .ae-card form .row { flex-direction:column; gap:0; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-flow"><span><b>1.</b> フォーム送信</span><span><b>2.</b> 担当より概算ご連絡</span><span><b>3.</b> 正式お見積</span></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
