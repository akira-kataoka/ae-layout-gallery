<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2622; --muted:#5a766e; --line:#d4ebe6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eefaf7; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg,#2dd4bf,#0d9488); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 16px; box-shadow:0 14px 32px rgba(13,148,136,.28); }
    .ae-done h1 { font-size:24px; margin:0 0 6px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-receipt { background:#fff; border:1px solid var(--line); border-radius:16px; padding:8px 22px; margin-bottom:18px; box-shadow:0 8px 22px rgba(13,148,136,.06); }
    .ae-r { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px dashed var(--line); font-size:14px; }
    .ae-r:last-child { border-bottom:0; }
    .ae-r .k { color:var(--muted); } .ae-r .v { font-weight:700; }
    .ae-r.total .v { color:var(--accent); font-size:18px; font-weight:900; }
    .ae-bar { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:18px; }
    .ae-bar .top { display:flex; justify-content:space-between; font-size:12px; font-weight:700; margin-bottom:8px; }
    .ae-track { height:10px; border-radius:999px; background:#e3f1ee; overflow:hidden; }
    .ae-track span { display:block; height:100%; width:30%; background:linear-gradient(90deg,#2dd4bf,#0d9488); border-radius:999px; }
    .ae-bar .cap { font-size:12px; color:var(--muted); margin-top:8px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-receipt">
      <div class="ae-r"><span class="k">受付番号</span><span class="v">DP-20260712-0085</span></div>
      <div class="ae-r"><span class="k">お支払い日</span><span class="v">2026年7月12日</span></div>
      <div class="ae-r"><span class="k">お支払い方法</span><span class="v">クレジットカード</span></div>
      <div class="ae-r total"><span class="k">お預かりした内金</span><span class="v">¥30,000</span></div>
    </div>
    <div class="ae-bar">
      <div class="top"><span>お支払い状況</span><span>内金 入金済み</span></div>
      <div class="ae-track"><span></span></div>
      <div class="cap">残金 ¥70,000 は当日または指定日までにお支払いください。</div>
    </div>
    <div class="ae-card">
      <div class="t">ご予約に関するご案内を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
