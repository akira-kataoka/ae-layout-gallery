<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2421; --muted:#5a746f; --line:#d7ece0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fbf8; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:58px 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:36px 30px; text-align:center; box-shadow:0 16px 40px rgba(13,148,136,.1); }
    .ae-ico { width:74px; height:74px; border-radius:18px; background:#ccfbf1; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 18px; }
    .ae-card h1 { font-size:23px; margin:0 0 10px; }
    .ae-card .lead { color:var(--muted); margin:0 0 22px; font-size:14px; }
    .ae-file { display:flex; align-items:center; gap:12px; background:#f0fdfa; border:1px solid var(--line); border-radius:12px; padding:14px 16px; text-align:left; margin-bottom:16px; }
    .ae-file .ic { width:42px; height:42px; border-radius:9px; background:#fff; display:flex; align-items:center; justify-content:center; font-size:22px; flex:0 0 auto; }
    .ae-file .nm { font-weight:700; font-size:14px; } .ae-file .meta { font-size:12px; color:var(--muted); }
    .ae-dl { display:block; background:var(--accent); color:#fff; border-radius:10px; padding:14px; font-weight:800; font-size:15px; text-decoration:none; margin-bottom:14px; }
    .ae-expire { font-size:12px; color:var(--muted); margin-bottom:22px; }
    .ae-optin { border-top:1px dashed var(--line); padding-top:22px; }
    .ae-optin .t { font-weight:700; font-size:14px; margin-bottom:6px; }
    .ae-optin .d { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-optin form input[type=email] { width:100%; padding:13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-optin form p { margin:0 0 12px; }
    .ae-optin form .submit input,.ae-optin form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-ico">📦</div>
      <h1>%%title%%</h1>
      <p class="lead">%%description%%</p>
      <div class="ae-file">
        <div class="ic">🗄️</div>
        <div><div class="nm">my-data-export-20260611.zip</div><div class="meta">12.4 MB ・ CSV / JSON 形式</div></div>
      </div>
      <a class="ae-dl" href="#">⬇ ダウンロードする</a>
      <div class="ae-expire">このリンクはセキュリティのため 7 日間で無効になります。</div>
      <div class="ae-optin">
        <div class="t">次回のエクスポート完了通知を受け取る</div>
        <div class="d">大きなデータは準備に時間がかかります。完了をメールでお知らせします。</div>
        %%content%%
      </div>
    </div>
  </div>
</body>
</html>
