<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c2d12; --ink:#2a1810; --muted:#6e5848; --line:#e7d8c8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#1c1410; line-height:1.7; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:64px 20px; }
    .ae-card { background:#fbf6ef; border:1px solid var(--line); border-radius:20px; padding:38px 30px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.4); }
    .ae-ico { font-size:44px; margin-bottom:12px; }
    .ae-card h1 { font-size:23px; margin:0 0 10px; }
    .ae-card .lead { color:var(--muted); margin:0 0 24px; font-size:14px; }
    .ae-gate .q { font-weight:800; font-size:16px; margin-bottom:16px; }
    .ae-btns { display:flex; gap:12px; }
    .ae-btns button { flex:1; border:0; border-radius:10px; padding:15px; font-weight:800; font-size:15px; cursor:pointer; font-family:inherit; }
    .ae-btns .yes { background:#7c2d12; color:#fff; } .ae-btns .no { background:#fff; border:1px solid var(--line); color:var(--ink); }
    .ae-pass { display:none; }
    .ae-pass.show { display:block; }
    .ae-gate.hide { display:none; }
    .ae-deny { display:none; color:#b91c1c; font-size:14px; font-weight:700; margin-top:16px; }
    .ae-deny.show { display:block; }
    .ae-pass .t { font-weight:700; margin-bottom:6px; }
    .ae-pass .d { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-pass form input[type=email] { width:100%; padding:13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-pass form p { margin:0 0 12px; }
    .ae-pass form .submit input,.ae-pass form button { width:100%; background:#7c2d12; color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    .ae-note { color:var(--muted); font-size:11px; margin-top:18px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-ico">🍶</div>
      <h1>%%title%%</h1>
      <p class="lead">%%description%%</p>
      <div class="ae-gate" id="gate">
        <div class="q">あなたは20歳以上ですか？</div>
        <div class="ae-btns">
          <button type="button" class="yes" id="yes">はい（20歳以上）</button>
          <button type="button" class="no" id="no">いいえ</button>
        </div>
        <div class="ae-deny" id="deny">申し訳ございません。20歳未満の方はご利用いただけません。</div>
      </div>
      <div class="ae-pass" id="pass">
        <div class="t">ようこそ。会員限定の特典情報をお届けします</div>
        <div class="d">新商品や限定セールのご案内を受け取れます</div>
        %%content%%
      </div>
      <p class="ae-note">お酒は20歳になってから。飲酒は適量を心がけ、妊娠中・授乳期の飲酒はお控えください。</p>
    </div>
  </div>

  <script>
  (function () {
    var gate = document.getElementById("gate"), pass = document.getElementById("pass"), deny = document.getElementById("deny");
    document.getElementById("yes").addEventListener("click", function () {
      gate.classList.add("hide");
      pass.classList.add("show");
    });
    document.getElementById("no").addEventListener("click", function () {
      deny.classList.add("show");
    });
  })();
  </script>
</body>
</html>
