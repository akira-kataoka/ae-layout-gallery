<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0ea5e9; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(160deg,#e0f2fe,#f8fafc 60%); line-height:1.7; min-height:100vh; display:flex; align-items:center; }
    .ae-wrap { max-width:460px; margin:0 auto; padding:32px 20px; width:100%; }
    .ae-card { background:#fff; border-radius:18px; box-shadow:0 12px 40px rgba(14,165,233,.15); padding:36px 30px; text-align:center; }
    .ae-icon { font-size:40px; }
    .ae-card h1 { font-size:22px; margin:10px 0 6px; }
    .ae-card > p { color:var(--muted); font-size:14px; margin:0 0 22px; }
    .ae-card form input[type=text],
    .ae-card form input[type=email] { width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:10px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,
    .ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
    .ae-fine { color:var(--muted); font-size:11px; margin-top:14px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-icon">✉️</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      %%content%%
      <p class="ae-fine">配信はいつでも解除できます。%%account-name%%</p>
    </div>
  </div>
</body>
</html>
