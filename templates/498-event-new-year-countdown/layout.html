<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#d4a13a; --red:#b91c1c; --ink:#f5ecd8; --muted:#c9b48c; --line:#3a2e1c; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#120d06; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:radial-gradient(120% 120% at 50% 0%,#3a2410,#1c1207 70%); border:1px solid var(--line); border-radius:20px; padding:36px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 44px rgba(0,0,0,.5); }
    .ae-hero::after { content:"✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦"; position:absolute; top:12px; left:0; right:0; font-size:13px; letter-spacing:5px; color:rgba(212,161,58,.4); }
    .ae-hero .em { font-size:48px; margin-bottom:4px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; color:#fff; text-shadow:0 2px 16px rgba(212,161,58,.4); }
    .ae-hero p { margin:0; color:var(--muted); font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#1f160b; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-fun { background:#1f160b; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-fun .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#fff; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#1f160b; border:1px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#120d06; color:#f5ecd8; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#2a1c00; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🎍</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">12.31 (水) 22:00〜</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">シティタワー 展望ラウンジ</div></div>
      <div class="ae-i"><div class="ic">🎆</div><div class="k">カウントダウン</div><div class="v">0:00 花火＆乾杯</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">年越しのおもてなし</div>
      <div class="g">
        <div class="ae-f"><span class="e">🥂</span> シャンパンで年明け乾杯</div>
        <div class="ae-f"><span class="e">🍜</span> 年越しそば＆ビュッフェ</div>
        <div class="ae-f"><span class="e">🎧</span> DJ＆ライブパフォーマンス</div>
        <div class="ae-f"><span class="e">🎁</span> 初日の出ツアー・福引抽選</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">チケット予約・先行案内の登録</div>
      <div class="d">数量限定のプレミアム席は早期完売が予想されます</div>
      %%content%%
    </div>
  </div>
</body>
</html>
