<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1a73e8; --accent2:#7b2ff7; --ink:#16202b; --muted:#5b6b7b; --line:#e6eaf2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f4f6fb; line-height:1.8; }
    .ae-hero { background:linear-gradient(120deg,var(--accent),var(--accent2)); color:#fff; padding:72px 20px 80px; text-align:center; position:relative; overflow:hidden; }
    .ae-hero::after { content:""; position:absolute; inset:0; background:radial-gradient(600px 280px at 80% -10%,rgba(255,255,255,.22),transparent); pointer-events:none; }
    .ae-hero h1 { font-size:33px; margin:0 0 12px; line-height:1.35; position:relative; }
    .ae-hero p { font-size:16px; opacity:.94; margin:0; position:relative; }
    .ae-grid { max-width:1040px; margin:-48px auto 0; padding:0 20px 64px; display:grid; grid-template-columns:1.2fr .8fr; gap:28px; align-items:start; position:relative; }
    .ae-main, .ae-side { background:#fff; border:1px solid var(--line); border-radius:16px; box-shadow:0 12px 36px rgba(22,32,43,.12); padding:34px 30px; }
    .ae-side { position:sticky; top:20px; border-top:4px solid var(--accent); }
    .ae-main h2 { margin-top:0; }
    .ae-side .t { margin:0 0 6px; font-weight:800; font-size:16px; }
    .ae-side .d { color:var(--muted); font-size:14px; margin:0 0 16px; }
    a { color:var(--accent); }
    .ae-main form input[type=text],.ae-main form input[type=email],.ae-main form input[type=tel],.ae-main form select,.ae-main form textarea,
    .ae-side form input[type=text],.ae-side form input[type=email],.ae-side form input[type=tel],.ae-side form select,.ae-side form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px; font-size:15px; font-family:inherit; }
    .ae-main form p,.ae-side form p { margin:0 0 12px; }
    .ae-main form .submit input,.ae-main form button,
    .ae-side form .submit input,.ae-side form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
    .ae-footer { text-align:center; color:var(--muted); font-size:12px; padding:24px; }
    @media (max-width:820px){ .ae-grid { grid-template-columns:1fr; margin-top:-30px; } .ae-side { position:static; } }
  </style>
</head>
<body>
  <header class="ae-hero">
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </header>
  <div class="ae-grid">
    <main class="ae-main">
      %%content%%
    </main>
    <aside class="ae-side">
      <p class="t">お問い合わせ・資料請求</p>
      <p class="d">ご質問やご相談はお気軽に。担当より折り返しご連絡します。</p>
      <p><a href="%%account-website%%">公式サイトを見る →</a></p>
    </aside>
  </div>
  <p class="ae-footer">&copy; %%account-name%%</p>
</body>
</html>
