<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1a73e8; --accent2:#7b2ff7; --ink:#16202b; --muted:#5b6b7b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff; line-height:1.7; }
    .ae-hero { background:linear-gradient(120deg,var(--accent),var(--accent2)); color:#fff; padding:64px 20px; text-align:center; }
    .ae-hero h1 { font-size:32px; margin:0 0 12px; }
    .ae-hero p { font-size:16px; opacity:.92; margin:0; }
    .ae-grid { max-width:1040px; margin:-40px auto 0; padding:0 20px 64px; display:grid; grid-template-columns:1.2fr .8fr; gap:28px; align-items:start; }
    .ae-main, .ae-side { background:#fff; border-radius:14px; box-shadow:0 8px 30px rgba(22,32,43,.10); padding:32px 28px; }
    .ae-side { position:sticky; top:20px; border-top:4px solid var(--accent); }
    .ae-main h2 { margin-top:0; }
    a { color:var(--accent); }
    .ae-footer { text-align:center; color:var(--muted); font-size:12px; padding:24px; }
    @media (max-width:820px){ .ae-grid { grid-template-columns:1fr; margin-top:-24px; } .ae-side { position:static; } }
  </style>
</head>
<body>
  <header class="ae-hero">
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </header>
  <div class="ae-grid">
    <main class="ae-main">
      %%content%%
    </main>
    <aside class="ae-side">
      <!-- フォームや申込ボタンを配置する想定のサイドカラム。LP本文側に %%content%% があるため、
           フォーム用途では下記 form テンプレートを併用するか、本文内にフォームを埋め込んでください。 -->
      <p style="margin-top:0;font-weight:700;">お問い合わせ・資料請求</p>
      <p style="color:var(--muted);font-size:14px;">右のフォームまたは下記よりお気軽にどうぞ。</p>
    </aside>
  </div>
  <p class="ae-footer">&copy; %%account-name%%</p>
</body>
</html>
