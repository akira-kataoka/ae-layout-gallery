<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ea580c; --ink:#2a1709; --muted:#6e5b48; --line:#f0e3d3; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff8f1; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#f97316,#ea580c); color:#fff; text-align:center; padding:52px 20px 42px; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.22); font-weight:700; font-size:12px; letter-spacing:2px; padding:6px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:640px; margin:0 auto; padding:38px 20px 48px; }
    .ae-cause { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; text-align:center; font-size:13px; color:#5a4636; margin-bottom:24px; box-shadow:0 8px 22px rgba(234,88,12,.06); }
    .ae-cause b { color:var(--accent); }
    .ae-cats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .ae-cat { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 10px; text-align:center; }
    .ae-cat .km { font-size:22px; font-weight:900; color:var(--accent); } .ae-cat .nm { font-weight:700; font-size:13px; } .ae-cat .fee { font-size:12px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-cats { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">CHARITY RUN</span>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-cause">参加費の一部は <b>子ども支援基金</b> へ寄付されます。走ることが、誰かの支えになります。</div>
    <div class="ae-cats">
      <div class="ae-cat"><div class="km">3km</div><div class="nm">ファンラン</div><div class="fee">¥2,000</div></div>
      <div class="ae-cat"><div class="km">10km</div><div class="nm">チャレンジ</div><div class="fee">¥3,500</div></div>
      <div class="ae-cat"><div class="km">21km</div><div class="nm">ハーフ</div><div class="fee">¥5,000</div></div>
    </div>
    <div class="ae-card">
      <div class="t">エントリーする</div>
      %%content%%
    </div>
  </div>
</body>
</html>
