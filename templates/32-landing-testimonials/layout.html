<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f6f7fb; line-height:1.7; }
    .ae-head { text-align:center; padding:54px 20px 8px; }
    .ae-head h1 { font-size:28px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-wall { max-width:1040px; margin:0 auto; padding:28px 20px; columns:3 300px; column-gap:18px; }
    .ae-q { break-inside:avoid; background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px 18px; margin:0 0 18px; box-shadow:0 4px 14px rgba(15,23,42,.05); }
    .ae-q .stars { color:#f59e0b; font-size:13px; }
    .ae-q p { margin:8px 0 14px; font-size:14px; color:#334155; }
    .ae-q .who { display:flex; align-items:center; gap:10px; }
    .ae-q .av { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#a5b4fc,#4f46e5); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }
    .ae-q .nm { font-size:13px; font-weight:700; }
    .ae-q .ro { font-size:12px; color:var(--muted); }
    .ae-body { max-width:680px; margin:8px auto 56px; padding:0 20px; text-align:center; }
    @media (max-width:680px){ .ae-wall { columns:1; } }
  </style>
</head>
<body>
  <header class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></header>
  <section class="ae-wall">
    <div class="ae-q"><div class="stars">★★★★★</div><p>「導入して3ヶ月、業務時間が目に見えて減りました。もう手放せません。」</p><div class="who"><div class="av">A</div><div><div class="nm">青木 様</div><div class="ro">製造業 / 情報システム</div></div></div></div>
    <div class="ae-q"><div class="stars">★★★★★</div><p>「サポートが手厚く、初心者の私でもすぐに使いこなせました。」</p><div class="who"><div class="av">S</div><div><div class="nm">佐藤 様</div><div class="ro">小売 / マーケティング</div></div></div></div>
    <div class="ae-q"><div class="stars">★★★★☆</div><p>「他社と比較しても圧倒的にコスパが良いです。」</p><div class="who"><div class="av">T</div><div><div class="nm">田中 様</div><div class="ro">IT / 経営企画</div></div></div></div>
    <div class="ae-q"><div class="stars">★★★★★</div><p>「現場の定着が早く、チーム全体の生産性が上がりました。」</p><div class="who"><div class="av">K</div><div><div class="nm">川口 様</div><div class="ro">建設 / 管理部</div></div></div></div>
  </section>
  <section class="ae-body">%%content%%</section>
</body>
</html>
