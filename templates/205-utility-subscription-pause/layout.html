<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0faf8; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:14px; }
    .ae-head .ic { font-size:42px; }
    .ae-head h1 { margin:6px 0; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-note { background:#ecfdf5; border:1px solid #99f6e4; border-radius:12px; padding:14px; font-size:13px; color:#0f766e; margin-bottom:16px; }
    .ae-keep { display:block; text-align:center; margin-bottom:16px; }
    .ae-keep a { color:var(--accent); text-decoration:none; font-weight:700; font-size:14px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(13,148,136,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=email],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--muted); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ic">⏸️</div><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-note">解約ではなく「一時停止」なら、データや設定はそのまま。いつでも再開できます。</div>
    <div class="ae-keep"><a href="#">← やっぱり継続する</a></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
