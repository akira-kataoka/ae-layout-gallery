<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    :root { --accent:#4f46e5; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f4f5fb; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:16px; }
    .ae-head h1 { margin:0 0 6px; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-progress { background:#eef2ff; height:8px; border-radius:999px; overflow:hidden; margin-bottom:6px; }
    .ae-progress i { display:block; height:100%; width:33%; background:linear-gradient(90deg,#818cf8,#4f46e5); transition:width .3s; }
    .ae-steplabel { text-align:right; font-size:12px; color:var(--muted); margin-bottom:14px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 26px rgba(79,70,229,.1); }
    .ae-step { display:none; }
    .ae-step.active { display:block; }
    .ae-step h2 { margin-top:0; font-size:18px; }
    .ae-opts label { display:flex; gap:10px; align-items:center; padding:12px 14px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; cursor:pointer; font-size:14px; }
    .ae-opts label:hover { border-color:#a5b4fc; background:#f5f7ff; }
    .ae-card input[type=text],.ae-card input[type=email],.ae-card select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; cursor:pointer; }
    .ae-nav { display:flex; gap:10px; margin-top:18px; }
    .ae-nav button { flex:1; padding:13px; border-radius:9px; font-weight:700; cursor:pointer; border:1px solid var(--line); background:#fff; color:var(--ink); }
    .ae-nav button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .ae-nav button[hidden] { display:none; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-progress"><i id="bar"></i></div>
    <div class="ae-steplabel" id="lbl">STEP 1 / 3</div>
    <div class="ae-card">
      <div class="ae-step active" data-step="1">
        <h2>ご利用目的は？</h2>
        <div class="ae-opts">
          <label><input type="radio" name="goal" checked> 業務効率化</label>
          <label><input type="radio" name="goal"> 売上拡大</label>
          <label><input type="radio" name="goal"> コスト削減</label>
        </div>
      </div>
      <div class="ae-step" data-step="2">
        <h2>ご利用規模は？</h2>
        <div class="ae-opts">
          <label><input type="radio" name="size" checked> 〜10名</label>
          <label><input type="radio" name="size"> 11〜50名</label>
          <label><input type="radio" name="size"> 51名以上</label>
        </div>
      </div>
      <div class="ae-step" data-step="3">
        <h2>ご連絡先を入力</h2>
        %%content%%
      </div>
      <div class="ae-nav">
        <button type="button" id="back" hidden>戻る</button>
        <button type="button" id="next" class="primary">次へ</button>
      </div>
    </div>
  </div>

  <script>
  jQuery(function ($) {
    var step = 1, total = 3;
    function render() {
      $(".ae-step").removeClass("active");
      $('.ae-step[data-step="' + step + '"]').addClass("active");
      $("#bar").css("width", Math.round((step / total) * 100) + "%");
      $("#lbl").text("STEP " + step + " / " + total);
      $("#back").prop("hidden", step === 1);
      $("#next").prop("hidden", step === total);
    }
    $("#next").on("click", function () { if (step < total) { step++; render(); } });
    $("#back").on("click", function () { if (step > 1) { step--; render(); } });
    render();
  });
  </script>
</body>
</html>
