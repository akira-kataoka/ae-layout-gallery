<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2622; --muted:#5a766e; --line:#d4ebe6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eefaf7; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg,#2dd4bf,#0d9488); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 16px; box-shadow:0 14px 32px rgba(13,148,136,.28); }
    .ae-done h1 { font-size:24px; margin:0 0 6px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-change { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:18px; box-shadow:0 8px 22px rgba(13,148,136,.06); }
    .ae-row { display:flex; align-items:center; gap:12px; }
    .ae-old { flex:1; text-align:center; opacity:.6; }
    .ae-old .k,.ae-new .k { font-size:11px; color:var(--muted); }
    .ae-old .v { font-weight:700; font-size:14px; text-decoration:line-through; }
    .ae-arrow { color:var(--accent); font-size:22px; flex:0 0 auto; }
    .ae-new { flex:1; text-align:center; }
    .ae-new .v { font-weight:800; font-size:16px; color:var(--accent); }
    .ae-meta { margin-top:14px; padding-top:12px; border-top:1px solid var(--line); font-size:13px; color:var(--muted); display:flex; gap:10px; align-items:center; }
    .ae-cal { display:flex; gap:10px; margin-bottom:18px; }
    .ae-cal a { flex:1; text-align:center; background:#fff; border:1px solid var(--line); border-radius:11px; padding:12px; font-size:13px; font-weight:700; color:var(--accent); text-decoration:none; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-change">
      <div class="ae-row">
        <div class="ae-old"><div class="k">変更前</div><div class="v">7/15(火) 14:00</div></div>
        <div class="ae-arrow">→</div>
        <div class="ae-new"><div class="k">変更後</div><div class="v">7/22(火) 16:00</div></div>
      </div>
      <div class="ae-meta"><span>📍</span><span>サンプル店 渋谷店 ／ 担当：田中</span></div>
    </div>
    <div class="ae-cal">
      <a href="#">📅 カレンダーに追加</a>
      <a href="#">🔁 再度変更する</a>
    </div>
    <div class="ae-card">
      <div class="t">リマインドや関連情報を受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
