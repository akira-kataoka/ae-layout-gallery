<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#64748b; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f5f9; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:64px 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:36px 32px; text-align:center; box-shadow:0 6px 20px rgba(15,23,42,.05); }
    .ae-card h1 { margin:0 0 10px; font-size:22px; }
    .ae-card > p { color:var(--muted); }
    .ae-card form { text-align:left; margin-top:18px; }
    .ae-card form label { display:flex; align-items:center; gap:8px; padding:8px 0; font-size:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select,.ae-card form textarea { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:700; cursor:pointer; }
    .ae-keep { display:inline-block; margin-top:14px; font-size:13px; color:#2563eb; text-decoration:none; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      %%content%%
      <a class="ae-keep" href="#">いいえ、配信を継続する</a>
    </div>
  </div>
</body>
</html>
