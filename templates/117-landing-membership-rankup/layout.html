<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#a16207; --gold:#eab308; --ink:#1c1810; --muted:#78716c; --line:#efe6d2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fffdf5; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; text-align:center; }
    .ae-emoji { font-size:50px; }
    .ae-wrap h1 { font-size:25px; margin:8px 0; }
    .ae-wrap > p { color:var(--muted); margin:0 0 20px; }
    .ae-rank { display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:8px; }
    .ae-rank .b { padding:10px 18px; border-radius:12px; font-weight:800; }
    .ae-rank .cur { background:#f1f5f9; color:#64748b; } .ae-rank .next { background:linear-gradient(135deg,var(--gold),var(--accent)); color:#fff; }
    .ae-rank .arrow { font-size:22px; color:var(--gold); }
    .ae-bar { height:10px; background:#fef3c7; border-radius:999px; overflow:hidden; margin:10px 0 4px; }
    .ae-bar i { display:block; height:100%; width:80%; background:linear-gradient(90deg,var(--gold),var(--accent)); }
    .ae-prog-note { font-size:13px; color:var(--muted); margin-bottom:18px; }
    .ae-perks { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; text-align:left; margin-bottom:18px; font-size:14px; }
    .ae-perks li { margin:4px 0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-emoji">👑</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-rank"><span class="b cur">シルバー</span><span class="arrow">→</span><span class="b next">ゴールド</span></div>
    <div class="ae-bar"><i></i></div>
    <div class="ae-prog-note">あと <b>1,000pt</b> でゴールド会員にランクアップ！</div>
    <ul class="ae-perks"><li>✨ ポイント還元率 3% → 5%</li><li>🎁 誕生日特典グレードアップ</li><li>🚚 送料いつでも無料</li></ul>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
