<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ca8a04; --ink:#26210f; --muted:#6e6650; --line:#ece5d0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fbf8ef; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-ico { width:64px; height:64px; border-radius:16px; background:#fef9c3; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 14px; }
    .ae-head h1 { font-size:24px; margin:0 0 6px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 10px 28px rgba(202,138,4,.07); }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form textarea { min-height:120px; resize:vertical; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="ae-ico">💡</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-card">
      %%content%%
      <p class="ae-note">いただいたご意見は今後のサービス改善に活用させていただきます。</p>
    </div>
  </div>
</body>
</html>
