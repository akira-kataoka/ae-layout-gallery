<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2421; --muted:#5a746f; --line:#d7ece0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fbf8; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:66px; height:66px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 12px; }
    .ae-done h1 { font-size:23px; margin:0 0 4px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-amt { background:linear-gradient(135deg,#0d9488,#0f766e); color:#fff; border-radius:16px; padding:22px; text-align:center; margin-bottom:18px; }
    .ae-amt .lab { font-size:13px; opacity:.9; } .ae-amt .v { font-size:38px; font-weight:900; font-variant-numeric:tabular-nums; }
    .ae-detail { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-bottom:18px; box-shadow:0 8px 22px rgba(13,148,136,.06); }
    .ae-detail div { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-top:1px solid var(--line); }
    .ae-detail div:first-child { border-top:0; }
    .ae-detail .k { color:var(--muted); } .ae-detail b { color:var(--ink); }
    .ae-note { font-size:12px; color:var(--muted); text-align:center; margin-bottom:24px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-amt">
      <div class="lab">返金金額</div>
      <div class="v">¥8,400</div>
    </div>
    <div class="ae-detail">
      <div><span class="k">受付番号</span><b>RF-20260611-0073</b></div>
      <div><span class="k">返金方法</span><b>クレジットカード ****1234</b></div>
      <div><span class="k">反映予定</span><b>5〜10営業日以内</b></div>
    </div>
    <p class="ae-note">カード明細への反映タイミングはカード会社により異なります。</p>
    <div class="ae-card">
      <div class="t">またのご利用に使えるクーポンを受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
