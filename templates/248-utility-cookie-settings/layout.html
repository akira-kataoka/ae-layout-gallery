<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#334155; --ink:#1e293b; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f5f9; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:56px 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:30px 28px; box-shadow:0 14px 36px rgba(15,23,42,.07); }
    .ae-ico { width:54px; height:54px; border-radius:14px; background:#f1f5f9; display:flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:14px; }
    .ae-card h1 { font-size:22px; margin:0 0 8px; }
    .ae-card .lead { color:var(--muted); margin:0 0 22px; font-size:14px; }
    .ae-opt { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; padding:16px 0; border-top:1px solid var(--line); }
    .ae-opt .nm { font-weight:700; font-size:14px; } .ae-opt .de { font-size:12px; color:var(--muted); }
    .ae-sw { position:relative; flex:0 0 auto; width:46px; height:26px; }
    .ae-sw input { position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer; }
    .ae-sw .track { position:absolute; inset:0; background:#cbd5e1; border-radius:999px; transition:background .2s; }
    .ae-sw .track::after { content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .ae-sw input:checked + .track { background:#16a34a; }
    .ae-sw input:checked + .track::after { transform:translateX(20px); }
    .ae-sw input:disabled + .track { background:#94a3b8; }
    .ae-actions { display:flex; gap:10px; margin-top:22px; }
    .ae-btn { flex:1; border:0; border-radius:9px; padding:13px; font-weight:800; font-size:14px; cursor:pointer; }
    .ae-btn.ghost { background:#fff; border:1px solid var(--line); color:var(--ink); }
    .ae-btn.solid { background:var(--accent); color:#fff; }
    .ae-card form { margin-top:18px; padding-top:18px; border-top:1px dashed var(--line); }
    .ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-ico">🍪</div>
      <h1>%%title%%</h1>
      <p class="lead">%%description%%</p>

      <div class="ae-opt">
        <div><div class="nm">必須Cookie</div><div class="de">サイトの基本機能に必要です。無効にできません。</div></div>
        <label class="ae-sw"><input type="checkbox" checked disabled><span class="track"></span></label>
      </div>
      <div class="ae-opt">
        <div><div class="nm">分析Cookie</div><div class="de">利用状況を計測し、サイト改善に役立てます。</div></div>
        <label class="ae-sw"><input type="checkbox" class="ae-pref" checked><span class="track"></span></label>
      </div>
      <div class="ae-opt">
        <div><div class="nm">広告Cookie</div><div class="de">あなたの関心に合った広告の配信に使用します。</div></div>
        <label class="ae-sw"><input type="checkbox" class="ae-pref"><span class="track"></span></label>
      </div>

      <div class="ae-actions">
        <button type="button" class="ae-btn ghost" id="rejectAll">必須のみ許可</button>
        <button type="button" class="ae-btn solid" id="acceptAll">すべて許可</button>
      </div>

      <div class="ae-optin">
        <p style="font-size:13px;color:#64748b;margin:0 0 10px;">設定変更やプライバシーに関するお知らせを受け取る場合はご登録ください。</p>
        %%content%%
      </div>
    </div>
  </div>

  <script>
  (function () {
    var prefs = Array.prototype.slice.call(document.querySelectorAll(".ae-pref"));
    document.getElementById("acceptAll").addEventListener("click", function () {
      prefs.forEach(function (p) { p.checked = true; });
    });
    document.getElementById("rejectAll").addEventListener("click", function () {
      prefs.forEach(function (p) { p.checked = false; });
    });
  })();
  </script>
</body>
</html>
