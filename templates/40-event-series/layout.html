<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0284c7; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0f7fc; line-height:1.7; }
    .ae-head { background:linear-gradient(120deg,#0c4a6e,#0284c7); color:#fff; padding:48px 20px; text-align:center; }
    .ae-head .k { font-size:13px; letter-spacing:.15em; opacity:.85; }
    .ae-head h1 { font-size:28px; margin:8px 0 6px; }
    .ae-head p { margin:0; opacity:.9; }
    .ae-grid { max-width:980px; margin:28px auto; padding:0 20px 56px; display:grid; grid-template-columns:1.3fr .7fr; gap:28px; align-items:start; }
    .ae-list { display:flex; flex-direction:column; gap:14px; }
    .ae-ses { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px 20px; display:flex; gap:16px; align-items:center; box-shadow:0 4px 14px rgba(2,132,199,.06); }
    .ae-ses .date { flex:none; text-align:center; background:#e0f2fe; color:var(--accent); border-radius:10px; padding:10px 12px; font-weight:800; line-height:1.1; }
    .ae-ses .date small { display:block; font-size:11px; font-weight:600; }
    .ae-ses h3 { margin:0 0 4px; font-size:15px; }
    .ae-ses p { margin:0; color:var(--muted); font-size:13px; }
    .ae-apply { background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(2,132,199,.10); padding:26px 24px; position:sticky; top:20px; border-top:4px solid var(--accent); }
    .ae-apply h2 { margin-top:0; font-size:17px; }
    .ae-apply form input[type=text],.ae-apply form input[type=email],.ae-apply form select { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
    .ae-apply form p { margin:0 0 13px; }
    .ae-apply form .submit input,.ae-apply form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:8px; font-weight:700; cursor:pointer; }
    @media (max-width:820px){ .ae-grid { grid-template-columns:1fr; } .ae-apply { position:static; } }
  </style>
</head>
<body>
  <header class="ae-head"><div class="k">WEBINAR SERIES</div><h1>%%title%%</h1><p>%%description%%</p></header>
  <div class="ae-grid">
    <div class="ae-list">
      <div class="ae-ses"><div class="date">7/10<small>木</small></div><div><h3>第1回：基礎から学ぶ導入のステップ</h3><p>14:00-15:00 / オンライン</p></div></div>
      <div class="ae-ses"><div class="date">7/17<small>木</small></div><div><h3>第2回：成果を出す運用のコツ</h3><p>14:00-15:00 / オンライン</p></div></div>
      <div class="ae-ses"><div class="date">7/24<small>木</small></div><div><h3>第3回：事例で学ぶ応用テクニック</h3><p>14:00-15:00 / オンライン</p></div></div>
    </div>
    <aside class="ae-apply"><h2>シリーズ参加登録</h2>%%content%%</aside>
  </div>
</body>
</html>
