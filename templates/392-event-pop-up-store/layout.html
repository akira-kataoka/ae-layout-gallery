<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#2a1020; --muted:#6e5560; --line:#f3dce6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff0f7; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#f472b6,#db2777); color:#fff; text-align:center; padding:52px 20px 42px; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.22); font-weight:700; font-size:12px; letter-spacing:2px; padding:6px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:34px 20px 48px; }
    .ae-period { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; text-align:center; margin-bottom:22px; box-shadow:0 8px 22px rgba(219,39,119,.07); }
    .ae-period .lab { font-size:12px; color:var(--muted); } .ae-period .dt { font-weight:900; font-size:18px; color:var(--accent); } .ae-period .loc { font-size:13px; color:var(--muted); margin-top:4px; }
    .ae-perks { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
    .ae-p { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 8px; text-align:center; }
    .ae-p .em { font-size:24px; } .ae-p .nm { font-size:11px; font-weight:700; margin-top:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:440px){ .ae-perks { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">POP-UP STORE</span>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-period">
      <div class="lab">開催期間</div>
      <div class="dt">10.10（金）– 10.26（日）</div>
      <div class="loc">📍 みなとパルコ 1F イベントスペース</div>
    </div>
    <div class="ae-perks">
      <div class="ae-p"><div class="em">🎁</div><div class="nm">来店特典プレゼント</div></div>
      <div class="ae-p"><div class="em">✨</div><div class="nm">限定アイテム先行販売</div></div>
      <div class="ae-p"><div class="em">📸</div><div class="nm">フォトスポット設置</div></div>
    </div>
    <div class="ae-card">
      <div class="t">来店予約・最新情報の受け取り</div>
      <div class="d">事前登録で混雑時も優先入店・特典をご用意</div>
      %%content%%
    </div>
  </div>
</body>
</html>
