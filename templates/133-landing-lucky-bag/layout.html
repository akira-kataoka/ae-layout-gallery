<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#dc2626; --gold:#f59e0b; --ink:#1a0f0c; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#fff5f3; line-height:1.7;
      background:radial-gradient(800px 460px at 50% -8%,#991b1b,transparent), linear-gradient(160deg,#450a0a,#1a0f0c); }
    .ae-wrap { max-width:560px; margin:0 auto; padding:50px 20px; text-align:center; }
    .ae-bag { font-size:58px; }
    .ae-wrap h1 { font-size:clamp(28px,6vw,42px); margin:6px 0; color:#fff; }
    .ae-wrap h1 b { color:var(--gold); }
    .ae-sub { color:#fecaca; margin:0 0 18px; }
    .ae-tiers { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
    .ae-tier { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14); border-radius:12px; padding:14px 8px; }
    .ae-tier .p { font-size:18px; font-weight:900; color:var(--gold); } .ae-tier .v { font-size:11px; color:#fecaca; }
    .ae-lottery { display:inline-block; background:rgba(245,158,11,.18); border:1px solid rgba(245,158,11,.5); color:#fcd34d; padding:6px 16px; border-radius:999px; font-size:13px; font-weight:700; margin-bottom:18px; }
    .ae-card { background:#fff; color:var(--ink); border-radius:18px; padding:28px 26px; box-shadow:0 18px 50px rgba(0,0,0,.4); }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:13px 14px; border:1px solid #f1d5d5; border-radius:10px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; }
    @media (max-width:480px){ .ae-tiers { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-bag">🛍️</div>
    <h1>%%title%%</h1>
    <p class="ae-sub">%%description%%</p>
    <div class="ae-tiers">
      <div class="ae-tier"><div class="p">¥5,000</div><div class="v">総額¥12,000相当</div></div>
      <div class="ae-tier"><div class="p">¥10,000</div><div class="v">総額¥25,000相当</div></div>
      <div class="ae-tier"><div class="p">¥30,000</div><div class="v">総額¥80,000相当</div></div>
    </div>
    <div class="ae-lottery">🎲 抽選販売・応募多数の場合は抽選</div>
    <div class="ae-card"><div class="t">購入予約にエントリー</div>%%content%%</div>
  </div>
</body>
</html>
