<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef4fb; line-height:1.7; display:flex; align-items:center; }
    .ae-wrap { max-width:440px; margin:0 auto; padding:32px 20px; width:100%; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:34px 30px; box-shadow:0 12px 36px rgba(3,105,161,.12); }
    .ae-ic { width:60px; height:60px; margin:0 auto 14px; border-radius:14px; background:#e0f2fe; color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:28px; }
    .ae-card h1 { text-align:center; font-size:22px; margin:0 0 6px; }
    .ae-card > p { text-align:center; color:var(--muted); font-size:14px; margin:0 0 20px; }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=date] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
    .ae-note { text-align:center; font-size:12px; color:var(--muted); margin-top:12px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-ic">🔎</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      %%content%%
      <div class="ae-note">本人確認のため、登録情報の入力をお願いします。</div>
    </div>
  </div>
</body>
</html>
