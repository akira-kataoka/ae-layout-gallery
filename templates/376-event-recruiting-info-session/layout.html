<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1d4ed8; --ink:#0f1b33; --muted:#5a6781; --line:#dde3ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eff3fb; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#1e3a8a,#2563eb); color:#fff; text-align:center; padding:52px 20px 42px; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.2); font-weight:700; font-size:12px; letter-spacing:2px; padding:6px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:34px 20px 48px; }
    .ae-dates { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
    .ae-d { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; box-shadow:0 8px 22px rgba(29,78,216,.06); }
    .ae-d .day { font-weight:800; font-size:15px; } .ae-d .mode { font-size:12px; color:var(--muted); } .ae-d .seat { font-size:11px; font-weight:700; color:#16a34a; margin-top:4px; }
    .ae-learn { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:24px; }
    .ae-learn .t { font-weight:700; text-align:center; margin-bottom:12px; }
    .ae-l { display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-l:first-of-type { border-top:0; } .ae-l .em { font-size:20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-dates { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">RECRUITING</span>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-dates">
      <div class="ae-d"><div class="day">9.06 (土) 14:00</div><div class="mode">オンライン開催</div><div class="seat">○ 受付中</div></div>
      <div class="ae-d"><div class="day">9.13 (土) 14:00</div><div class="mode">本社オフィス</div><div class="seat">△ 残りわずか</div></div>
    </div>
    <div class="ae-learn">
      <div class="t">説明会でわかること</div>
      <div class="ae-l"><span class="em">🏢</span><span>事業内容と、これから目指す未来</span></div>
      <div class="ae-l"><span class="em">👥</span><span>働く環境・チームの雰囲気</span></div>
      <div class="ae-l"><span class="em">📈</span><span>キャリアパスと選考の流れ</span></div>
      <div class="ae-l"><span class="em">💬</span><span>社員への質問タイム</span></div>
    </div>
    <div class="ae-card">
      <div class="t">説明会に参加する</div>
      <div class="d">私服・カメラオフでの参加もOKです</div>
      %%content%%
    </div>
  </div>
</body>
</html>
