<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#475569; --ink:#1e293b; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3f5f8; line-height:1.8; }
    .ae-wrap { max-width:580px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .emo { font-size:38px; }
    .ae-head h1 { font-size:23px; margin:6px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-trust { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
    .ae-t { background:#fff; border:1px solid var(--line); border-radius:999px; padding:8px 16px; font-size:12px; font-weight:700; color:var(--accent); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    .ae-foot { color:var(--muted); font-size:12px; text-align:center; margin-top:12px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🕊️</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-trust">
      <span class="ae-t">✓ 事前相談無料</span>
      <span class="ae-t">✓ 24時間受付</span>
      <span class="ae-t">✓ 明朗会計</span>
    </div>
    <div class="ae-card">
      <div class="t">資料請求・無料相談のお申し込み</div>
      %%content%%
      <p class="ae-foot">ご相談内容は守秘義務のもと、無理な勧誘は一切いたしません。</p>
    </div>
  </div>
</body>
</html>
