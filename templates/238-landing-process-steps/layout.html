<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#2563eb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --soft:#eff6ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f7fa; line-height:1.7; }
    .ae-wrap { max-width:760px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:30px; }
    .ae-head .badge { display:inline-block; background:var(--soft); color:var(--accent); font-weight:700; font-size:13px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:26px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-steps { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:32px; }
    .ae-step { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px 16px; text-align:center; position:relative; box-shadow:0 8px 22px rgba(15,23,42,.05); }
    .ae-step .no { width:38px; height:38px; border-radius:50%; background:var(--accent); color:#fff; font-weight:900; display:flex; align-items:center; justify-content:center; margin:0 auto 10px; }
    .ae-step .emo { font-size:30px; margin-bottom:6px; }
    .ae-step h3 { font-size:15px; margin:0 0 6px; }
    .ae-step p { font-size:12px; color:var(--muted); margin:0; }
    .ae-step::after { content:"→"; position:absolute; right:-11px; top:50%; transform:translateY(-50%); color:#cbd5e1; font-weight:900; z-index:1; }
    .ae-step:last-child::after { display:none; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; text-align:center; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:680px){ .ae-steps { grid-template-columns:1fr 1fr; } .ae-step::after { display:none; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">HOW IT WORKS</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-steps">
      <div class="ae-step"><div class="no">1</div><div class="emo">📝</div><h3>お申し込み</h3><p>フォームに必要事項を入力するだけ。最短1分で完了します。</p></div>
      <div class="ae-step"><div class="no">2</div><div class="emo">📞</div><h3>ヒアリング</h3><p>専任担当がご要望を伺い、最適なプランをご提案します。</p></div>
      <div class="ae-step"><div class="no">3</div><div class="emo">⚙️</div><h3>初期設定</h3><p>導入から初期設定まで、すべて私たちがサポートします。</p></div>
      <div class="ae-step"><div class="no">4</div><div class="emo">🚀</div><h3>運用スタート</h3><p>あとは使うだけ。運用後も継続してフォローします。</p></div>
    </div>
    <div class="ae-card">
      <div class="t">まずは無料で相談する</div>
      %%content%%
    </div>
  </div>
</body>
</html>
