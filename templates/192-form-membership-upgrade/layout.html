<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#a16207; --gold:#eab308; --ink:#1c1810; --muted:#78716c; --line:#efe6d2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fffdf5; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:14px; }
    .ae-head .ic { font-size:42px; }
    .ae-head h1 { margin:6px 0; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-rank { display:flex; align-items:center; justify-content:center; gap:14px; margin:14px 0; }
    .ae-rank .b { padding:10px 18px; border-radius:12px; font-weight:800; }
    .ae-rank .cur { background:#f1f5f9; color:#64748b; } .ae-rank .next { background:linear-gradient(135deg,var(--gold),var(--accent)); color:#fff; }
    .ae-rank .arrow { font-size:22px; color:var(--gold); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(161,98,7,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ic">👑</div><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-rank"><span class="b cur">シルバー会員</span><span class="arrow">→</span><span class="b next">ゴールド会員</span></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
