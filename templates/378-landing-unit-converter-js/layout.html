<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0891b2; --ink:#0c2228; --muted:#5a747c; --line:#d6eaee; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eefbfd; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-tabs { display:flex; gap:6px; background:#dcf2f6; border-radius:10px; padding:4px; margin-bottom:18px; }
    .ae-tabs button { flex:1; border:0; background:transparent; padding:10px; border-radius:8px; font-weight:700; font-size:14px; cursor:pointer; color:var(--muted); }
    .ae-tabs button.on { background:#fff; color:var(--accent); box-shadow:0 2px 8px rgba(8,145,178,.18); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:24px; box-shadow:0 12px 32px rgba(8,145,178,.09); }
    .ae-panel { display:none; }
    .ae-panel.on { display:block; }
    .ae-conv { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:end; }
    .ae-conv .lab { font-size:11px; color:var(--muted); font-weight:700; margin-bottom:5px; display:block; }
    .ae-conv input,.ae-conv select { width:100%; padding:12px; border:1px solid var(--line); border-radius:9px; font-size:15px; }
    .ae-conv .eq { font-size:22px; font-weight:900; color:var(--accent); padding-bottom:8px; }
    .ae-result { text-align:center; margin-top:16px; font-size:14px; color:var(--muted); }
    .ae-result b { color:var(--accent); font-size:24px; font-variant-numeric:tabular-nums; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-tabs" id="tabs">
      <button type="button" class="on" data-mode="length">長さ</button>
      <button type="button" data-mode="weight">重さ</button>
      <button type="button" data-mode="temp">温度</button>
    </div>
    <div class="ae-card">
      <div class="ae-panel on" data-panel="length">
        <div class="ae-conv">
          <div><span class="lab">値</span><input type="number" class="v" value="10"></div>
          <span class="eq">→</span>
          <div><span class="lab">単位</span>
            <select class="from"><option value="0.01" selected>cm</option><option value="1">m</option><option value="0.0254">インチ</option><option value="0.3048">フィート</option></select></div>
        </div>
        <div class="ae-result">= <b class="out">0</b> <span class="tou">m</span></div>
        <div style="margin-top:8px"><span class="lab">変換先</span><select class="to"><option value="1" selected>m</option><option value="0.01">cm</option><option value="0.0254">インチ</option><option value="0.3048">フィート</option></select></div>
      </div>
      <div class="ae-panel" data-panel="weight">
        <div class="ae-conv">
          <div><span class="lab">値</span><input type="number" class="v" value="5"></div>
          <span class="eq">→</span>
          <div><span class="lab">単位</span>
            <select class="from"><option value="1" selected>kg</option><option value="0.001">g</option><option value="0.453592">ポンド</option><option value="0.0283495">オンス</option></select></div>
        </div>
        <div class="ae-result">= <b class="out">0</b> <span class="tou">ポンド</span></div>
        <div style="margin-top:8px"><span class="lab">変換先</span><select class="to"><option value="0.453592" selected>ポンド</option><option value="1">kg</option><option value="0.001">g</option><option value="0.0283495">オンス</option></select></div>
      </div>
      <div class="ae-panel" data-panel="temp">
        <div class="ae-conv">
          <div><span class="lab">値</span><input type="number" class="vt" value="25"></div>
          <span class="eq">→</span>
          <div><span class="lab">単位</span>
            <select class="fromt"><option value="C" selected>摂氏 ℃</option><option value="F">華氏 ℉</option><option value="K">ケルビン K</option></select></div>
        </div>
        <div class="ae-result">= <b class="outt">0</b> <span class="tout2">℉</span></div>
        <div style="margin-top:8px"><span class="lab">変換先</span><select class="tot"><option value="F" selected>華氏 ℉</option><option value="C">摂氏 ℃</option><option value="K">ケルビン K</option></select></div>
      </div>
    </div>
    <div class="ae-cta">
      <div class="t">便利ツール集を無料で受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var tabs = Array.prototype.slice.call(document.querySelectorAll("#tabs button"));
    var panels = Array.prototype.slice.call(document.querySelectorAll(".ae-panel"));
    tabs.forEach(function (t) {
      t.addEventListener("click", function () {
        tabs.forEach(function (x) { x.classList.remove("on"); });
        t.classList.add("on");
        var mode = t.getAttribute("data-mode");
        panels.forEach(function (p) { p.classList.toggle("on", p.getAttribute("data-panel") === mode); });
      });
    });
    function bindFactor(panel) {
      var v = panel.querySelector(".v"), from = panel.querySelector(".from"), to = panel.querySelector(".to");
      var out = panel.querySelector(".out"), tou = panel.querySelector(".tou");
      function calc() {
        var base = (parseFloat(v.value) || 0) * parseFloat(from.value);
        var r = base / parseFloat(to.value);
        out.textContent = (Math.round(r * 1000) / 1000).toLocaleString("ja-JP");
        tou.textContent = to.options[to.selectedIndex].textContent;
      }
      [v, from, to].forEach(function (el) { el.addEventListener("input", calc); el.addEventListener("change", calc); });
      calc();
    }
    var tp = document.querySelector('[data-panel="temp"]');
    var vt = tp.querySelector(".vt"), fromt = tp.querySelector(".fromt"), tot = tp.querySelector(".tot");
    var outt = tp.querySelector(".outt"), tout2 = tp.querySelector(".tout2");
    function toC(val, u) { return u === "C" ? val : u === "F" ? (val - 32) * 5 / 9 : val - 273.15; }
    function fromC(c, u) { return u === "C" ? c : u === "F" ? c * 9 / 5 + 32 : c + 273.15; }
    function calcTemp() {
      var c = toC(parseFloat(vt.value) || 0, fromt.value);
      var r = fromC(c, tot.value);
      outt.textContent = (Math.round(r * 10) / 10).toLocaleString("ja-JP");
      tout2.textContent = tot.options[tot.selectedIndex].textContent.replace(/.*\s/, "");
    }
    [vt, fromt, tot].forEach(function (el) { el.addEventListener("input", calcTemp); el.addEventListener("change", calcTemp); });
    bindFactor(document.querySelector('[data-panel="length"]'));
    bindFactor(document.querySelector('[data-panel="weight"]'));
    calcTemp();
  })();
  </script>
</body>
</html>
