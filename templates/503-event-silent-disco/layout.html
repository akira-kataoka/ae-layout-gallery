<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#22d3ee; --pink:#f472b6; --ink:#eafcff; --muted:#8fb6c8; --line:#1b2b3e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#070e1a; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(125deg,#0e7490,#6d28d9 55%,#be185d); color:#fff; border-radius:20px; padding:34px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 44px rgba(109,40,217,.32); }
    .ae-hero::after { content:"🎧 ♪ 🎧 ♪ 🎧 ♪ 🎧 ♪ 🎧 ♪ 🎧"; position:absolute; bottom:10px; left:0; right:0; font-size:14px; letter-spacing:3px; opacity:.45; }
    .ae-hero .em { font-size:46px; margin-bottom:2px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; text-shadow:0 2px 14px rgba(0,0,0,.25); }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#0d1726; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-fun { background:#0d1726; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-fun .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#fff; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#0d1726; border:1px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#070e1a; color:#eafcff; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:linear-gradient(90deg,#22d3ee,#f472b6); color:#07121f; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🎧</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">10.17 (金) 20:00–24:00</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">ルーフトップテラス</div></div>
      <div class="ae-i"><div class="ic">🎧</div><div class="k">チャンネル</div><div class="v">3ch 切替自由</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">サイレントディスコのたのしみ</div>
      <div class="g">
        <div class="ae-f"><span class="e">🎧</span> 光るワイヤレスヘッドホン貸出</div>
        <div class="ae-f"><span class="e">🎚️</span> 3人のDJをチャンネルで選択</div>
        <div class="ae-f"><span class="e">🌃</span> 夜景を望むルーフトップ</div>
        <div class="ae-f"><span class="e">🍹</span> ドリンクバー＆フォトブース</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">チケット予約・先行案内の登録</div>
      <div class="d">ヘッドホンの数に限りがあります。前売り完売にご注意ください</div>
      %%content%%
    </div>
  </div>
</body>
</html>
