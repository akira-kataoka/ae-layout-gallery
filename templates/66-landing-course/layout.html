<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#0f172a; --muted:#64748b; --line:#ece5f7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#faf8ff; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#4c1d95,#7c3aed); color:#fff; padding:48px 20px; text-align:center; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.92; }
    .ae-meta { display:flex; gap:18px; justify-content:center; margin-top:16px; font-size:13px; }
    .ae-meta span::before { content:"●"; font-size:8px; vertical-align:middle; margin-right:6px; color:#c4b5fd; }
    .ae-grid { max-width:980px; margin:28px auto; padding:0 20px 56px; display:grid; grid-template-columns:1.3fr .7fr; gap:30px; align-items:start; }
    .ae-curr h2 { margin-top:0; }
    .ae-curr ol { padding-left:20px; }
    .ae-curr li { padding:6px 0; border-bottom:1px dashed var(--line); }
    .ae-enroll { background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(124,58,237,.12); padding:26px 24px; position:sticky; top:20px; }
    .ae-enroll .price { font-size:30px; font-weight:800; } .ae-enroll .price small { font-size:13px; color:var(--muted); font-weight:400; }
    .ae-enroll form input[type=text],.ae-enroll form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-enroll form p { margin:0 0 12px; }
    .ae-enroll form .submit input,.ae-enroll form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:820px){ .ae-grid { grid-template-columns:1fr; } .ae-enroll { position:static; } }
  </style>
</head>
<body>
  <header class="ae-hero"><h1>%%title%%</h1><p>%%description%%</p><div class="ae-meta"><span>全8回</span><span>動画 約4時間</span><span>修了証あり</span></div></header>
  <div class="ae-grid">
    <article class="ae-curr">
      <h2>カリキュラム</h2>
      <ol><li>第1回 オリエンテーション</li><li>第2回 基礎理論</li><li>第3回 ケーススタディ</li><li>第4回 実践ワーク</li><li>… 第8回 修了課題</li></ol>
    </article>
    <aside class="ae-enroll"><div class="price">¥0<small>/ 無料</small></div><p style="color:var(--muted);font-size:13px;">いつでも・どこでも受講可能</p>%%content%%</aside>
  </div>
</body>
</html>
