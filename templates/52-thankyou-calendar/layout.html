<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#2563eb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef2ff; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:64px 20px; text-align:center; }
    .ae-card { background:#fff; border-radius:18px; box-shadow:0 12px 34px rgba(37,99,235,.12); padding:42px 34px; }
    .ae-check { width:78px; height:78px; margin:0 auto 18px; border-radius:50%; background:#2563eb; display:flex; align-items:center; justify-content:center; }
    .ae-check svg { width:38px; height:38px; }
    .ae-card h1 { margin:0 0 10px; font-size:24px; }
    .ae-card > p { color:var(--muted); }
    .ae-when { margin:18px 0; padding:16px; background:#f8fafc; border:1px solid var(--line); border-radius:12px; font-weight:700; }
    .ae-when small { display:block; color:var(--muted); font-weight:400; font-size:12px; }
    .ae-cal { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:8px; }
    .ae-cal a { text-decoration:none; border:1px solid var(--line); border-radius:10px; padding:11px 16px; color:var(--ink); font-size:13px; font-weight:700; background:#fff; }
    .ae-cal a:hover { border-color:var(--accent); color:var(--accent); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      %%content%%
      <div class="ae-when">2026年7月10日（木）14:00 - 15:00<small>オンライン（後日URLをお送りします）</small></div>
      <div class="ae-cal"><a href="#">📅 Google カレンダー</a><a href="#">📅 Outlook</a><a href="#">📅 iCal (.ics)</a></div>
    </div>
  </div>
</body>
</html>
