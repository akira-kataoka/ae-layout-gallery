<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#16a34a; --gold:#f59e0b; --ink:#0f1f16; --muted:#5b6b62; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(160deg,#dcfce7,#f0fdf4 60%); line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:64px 20px; text-align:center; }
    .ae-conf { font-size:30px; letter-spacing:4px; }
    .ae-card { background:#fff; border-radius:20px; box-shadow:0 16px 44px rgba(22,163,74,.18); padding:42px 34px; margin-top:10px; }
    .ae-medal { font-size:60px; }
    .ae-badge { display:inline-block; background:linear-gradient(120deg,var(--gold),#fb923c); color:#3b2406; font-weight:800; padding:6px 18px; border-radius:999px; font-size:14px; letter-spacing:.05em; }
    .ae-card h1 { margin:14px 0 8px; font-size:26px; color:var(--accent); }
    .ae-card > p { color:var(--muted); }
    .ae-prize { margin:18px 0; padding:18px; background:#f0fdf4; border:1px dashed #86efac; border-radius:12px; font-weight:700; }
    .ae-next { margin-top:18px; font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-conf">🎉 ✨ 🎉 ✨ 🎉</div>
    <div class="ae-card">
      <div class="ae-medal">🏆</div>
      <span class="ae-badge">当選</span>
      %%content%%
      <div class="ae-prize">🎁 プレミアムギフトセット（¥10,000相当）</div>
      <div class="ae-next">賞品の発送先確認メールをお送りしました。ご確認ください。</div>
    </div>
  </div>
</body>
</html>
