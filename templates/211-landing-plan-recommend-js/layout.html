<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f4f5fb; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:14px; }
    .ae-head h1 { margin:0 0 6px; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:26px; box-shadow:0 8px 24px rgba(79,70,229,.1); }
    .ae-needs label { display:flex; gap:10px; align-items:center; padding:12px 14px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; cursor:pointer; font-size:14px; }
    .ae-needs label:hover { border-color:#a5b4fc; background:#f5f7ff; }
    .ae-reco { margin-top:14px; text-align:center; background:linear-gradient(135deg,#4f46e5,#7c3aed); color:#fff; border-radius:14px; padding:20px; }
    .ae-reco .lbl { font-size:13px; opacity:.9; } .ae-reco .plan { font-size:30px; font-weight:900; } .ae-reco .desc { font-size:13px; opacity:.95; margin-top:2px; }
    .ae-card2 { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; margin-top:16px; text-align:center; }
    .ae-card2 .t { font-weight:700; margin-bottom:10px; }
    .ae-card2 form input[type=email],.ae-card2 form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card2 form p { margin:0 0 12px; }
    .ae-card2 form .submit input,.ae-card2 form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-needs" id="needs">
        <label><input type="checkbox" data-w="0"> 個人で使いたい</label>
        <label><input type="checkbox" data-w="1"> チームで共有したい</label>
        <label><input type="checkbox" data-w="1"> 外部サービスと連携したい</label>
        <label><input type="checkbox" data-w="2"> 高度な分析・権限管理が必要</label>
        <label><input type="checkbox" data-w="2"> 専任サポート・SLAが必要</label>
      </div>
      <div class="ae-reco"><div class="lbl">あなたへのおすすめ</div><div class="plan" id="plan">Starter</div><div class="desc" id="desc">まずは無料で始めましょう</div></div>
    </div>
    <div class="ae-card2"><div class="t">このプランで申し込む</div>%%content%%</div>
  </div>

  <script>
  (function () {
    var planEl = document.getElementById("plan"), descEl = document.getElementById("desc");
    function recommend() {
      var score = 0;
      Array.prototype.forEach.call(document.querySelectorAll("#needs input:checked"), function (b) {
        score += parseInt(b.getAttribute("data-w"), 10) || 0;
      });
      var plan, desc;
      if (score >= 3) { plan = "Enterprise"; desc = "高度な要件にも対応する最上位プラン"; }
      else if (score >= 1) { plan = "Business"; desc = "チーム利用・連携に最適"; }
      else { plan = "Starter"; desc = "まずは無料で始めましょう"; }
      planEl.textContent = plan;
      descEl.textContent = desc;
    }
    document.getElementById("needs").addEventListener("change", recommend);
    recommend();
  })();
  </script>
</body>
</html>
