<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1d4ed8; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3f6fc; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:14px; }
    .ae-head .ic { font-size:40px; }
    .ae-head h1 { margin:6px 0; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-steps { display:flex; justify-content:space-between; margin:14px 0 4px; counter-reset:s; }
    .ae-steps .s { flex:1; text-align:center; font-size:12px; color:var(--muted); position:relative; }
    .ae-steps .s::before { counter-increment:s; content:counter(s); display:flex; align-items:center; justify-content:center; width:28px; height:28px; margin:0 auto 4px; border-radius:50%; background:#fff; border:2px solid var(--line); font-weight:700; }
    .ae-steps .s.on { color:var(--accent); } .ae-steps .s.on::before { background:var(--accent); border-color:var(--accent); color:#fff; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(29,78,216,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form .opt { display:inline-flex; gap:6px; align-items:center; margin:2px 12px 2px 0; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ic">🗓️</div><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-steps"><div class="s on">日程調整</div><div class="s">面接</div><div class="s">結果連絡</div></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
