<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#2563eb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f5f9; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-steps { display:flex; justify-content:space-between; margin-bottom:8px; counter-reset:step; }
    .ae-steps .s { flex:1; text-align:center; position:relative; color:var(--muted); font-size:12px; }
    .ae-steps .s::before { counter-increment:step; content:counter(step); display:flex; align-items:center; justify-content:center; width:30px; height:30px; margin:0 auto 6px; border-radius:50%; background:#fff; border:2px solid var(--line); font-weight:700; }
    .ae-steps .s.active { color:var(--accent); font-weight:700; }
    .ae-steps .s.active::before { background:var(--accent); border-color:var(--accent); color:#fff; }
    .ae-steps .s:not(:last-child)::after { content:""; position:absolute; top:15px; left:60%; right:-40%; height:2px; background:var(--line); }
    .ae-head { text-align:center; margin:18px 0; }
    .ae-head h1 { margin:0 0 4px; font-size:22px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-card { background:#fff; border-radius:16px; box-shadow:0 8px 28px rgba(15,23,42,.07); padding:32px 30px; }
    .ae-card form input[type=text],
    .ae-card form input[type=email],
    .ae-card form input[type=tel],
    .ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 15px; }
    .ae-card form .submit input,
    .ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-steps"><div class="s active">入力</div><div class="s">確認</div><div class="s">完了</div></div>
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
