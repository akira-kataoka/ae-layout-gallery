<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9333ea; --ink:#1c1430; --muted:#6b6480; --line:#ece5f7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#faf8fe; line-height:1.7; }
    .ae-wrap { max-width:680px; margin:0 auto; padding:48px 20px; }
    .ae-done { text-align:center; margin-bottom:28px; }
    .ae-done .chk { width:64px; height:64px; border-radius:50%; background:#16a34a; color:#fff; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 12px; }
    .ae-done h1 { font-size:23px; margin:0 0 4px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-sub { font-weight:800; font-size:16px; margin:0 0 14px; text-align:center; }
    .ae-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px; }
    .ae-item { background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:0 8px 22px rgba(147,51,234,.06); }
    .ae-item .ph { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:42px; background:linear-gradient(135deg,#f5f0ff,#ede4ff); }
    .ae-item .bd { padding:12px; }
    .ae-item .nm { font-weight:700; font-size:13px; line-height:1.4; }
    .ae-item .pr { color:var(--accent); font-weight:900; margin-top:4px; font-size:15px; }
    .ae-item .star { color:#f59e0b; font-size:11px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:560px){ .ae-grid { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <p class="ae-sub">この商品を買った人は、こちらも見ています</p>
    <div class="ae-grid">
      <div class="ae-item"><div class="ph">🎧</div><div class="bd"><div class="nm">ノイズキャンセルイヤホン</div><div class="star">★★★★★</div><div class="pr">¥12,800</div></div></div>
      <div class="ae-item"><div class="ph">⌚</div><div class="bd"><div class="nm">スマートウォッチ Lite</div><div class="star">★★★★☆</div><div class="pr">¥19,800</div></div></div>
      <div class="ae-item"><div class="ph">🔋</div><div class="bd"><div class="nm">大容量モバイルバッテリー</div><div class="star">★★★★★</div><div class="pr">¥4,980</div></div></div>
      <div class="ae-item"><div class="ph">🎒</div><div class="bd"><div class="nm">撥水デイリーバックパック</div><div class="star">★★★★☆</div><div class="pr">¥8,600</div></div></div>
      <div class="ae-item"><div class="ph">☕</div><div class="bd"><div class="nm">保温タンブラー 480ml</div><div class="star">★★★★★</div><div class="pr">¥3,200</div></div></div>
      <div class="ae-item"><div class="ph">💡</div><div class="bd"><div class="nm">調光デスクライト</div><div class="star">★★★★☆</div><div class="pr">¥6,400</div></div></div>
    </div>
    <div class="ae-card">
      <div class="t">セール情報・おすすめを受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
