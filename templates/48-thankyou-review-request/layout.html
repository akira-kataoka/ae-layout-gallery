<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#f59e0b; --ink:#1f2937; --muted:#6b7280; --line:#fde9c8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fffaf0; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:64px 20px; text-align:center; }
    .ae-card { background:#fff; border-radius:18px; box-shadow:0 12px 34px rgba(245,158,11,.14); padding:42px 34px; }
    .ae-emoji { font-size:46px; }
    .ae-card h1 { margin:8px 0; font-size:24px; }
    .ae-card > p { color:var(--muted); }
    .ae-stars { font-size:40px; letter-spacing:8px; color:#fbbf24; cursor:pointer; margin:18px 0 8px; }
    .ae-stars span:hover { transform:scale(1.1); display:inline-block; }
    .ae-platforms { display:flex; gap:12px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
    .ae-platforms a { text-decoration:none; border:1px solid var(--line); border-radius:10px; padding:10px 16px; color:var(--ink); font-size:13px; font-weight:700; background:#fffdf7; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-emoji">🙏</div>
      %%content%%
      <div class="ae-stars"><span>★</span><span>★</span><span>★</span><span>★</span><span>★</span></div>
      <div class="ae-platforms"><a href="#">Google でレビュー</a><a href="#">アンケートに回答</a></div>
    </div>
  </div>
</body>
</html>
