<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#1b1430; --muted:#6b6480; --line:#e8e3f4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f8f6fd; line-height:1.7; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-courses { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .ae-course { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; box-shadow:0 6px 18px rgba(124,58,237,.05); }
    .ae-course .nm { font-weight:800; font-size:14px; }
    .ae-course .meta { color:var(--muted); font-size:12px; margin-top:4px; }
    .ae-course .pr { color:var(--accent); font-weight:900; margin-top:6px; font-variant-numeric:tabular-nums; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:520px){ .ae-courses { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-courses">
      <div class="ae-course"><div class="nm">入門コース（全6回）</div><div class="meta">毎週土曜 10:00〜 / オンライン可</div><div class="pr">¥28,000</div></div>
      <div class="ae-course"><div class="nm">実践コース（全12回）</div><div class="meta">毎週水・金 19:00〜 / 教室</div><div class="pr">¥58,000</div></div>
    </div>
    <div class="ae-card">
      <div class="t">受講申し込み</div>
      %%content%%
    </div>
  </div>
</body>
</html>
