<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0ea5e9; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0f9ff; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:64px 20px; text-align:center; }
    .ae-card { background:#fff; border-radius:18px; box-shadow:0 12px 34px rgba(14,165,233,.14); padding:42px 34px; }
    .ae-pos { font-size:14px; color:var(--muted); }
    .ae-num { font-size:60px; font-weight:800; color:var(--accent); line-height:1; margin:6px 0; }
    .ae-bar { height:10px; background:#e0f2fe; border-radius:999px; overflow:hidden; margin:18px 0 6px; }
    .ae-bar i { display:block; height:100%; width:78%; background:var(--accent); }
    .ae-meta { font-size:12px; color:var(--muted); }
    .ae-boost { margin-top:24px; padding:18px; background:#f0f9ff; border:1px dashed #7dd3fc; border-radius:12px; }
    .ae-boost b { color:var(--accent); }
    .ae-share { display:flex; gap:8px; justify-content:center; margin-top:12px; }
    .ae-share a { text-decoration:none; color:#fff; background:var(--accent); padding:9px 16px; border-radius:8px; font-size:13px; font-weight:700; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      %%content%%
      <div class="ae-pos">現在の順位</div>
      <div class="ae-num">#248</div>
      <div class="ae-bar"><i></i></div>
      <div class="ae-meta">あと少しで先行アクセス枠です</div>
      <div class="ae-boost">友達を招待すると<b>順位がアップ</b>します 🚀<div class="ae-share"><a href="#">𝕏 でシェア</a><a href="#">LINE で送る</a></div></div>
    </div>
  </div>
</body>
</html>
