<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1a9e6c; --ink:#16202b; --muted:#5b6b7b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3f8f5; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:72px 20px; text-align:center; }
    .ae-check { width:84px; height:84px; margin:0 auto 24px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(26,158,108,.35); }
    .ae-check svg { width:42px; height:42px; }
    .ae-card { background:#fff; border-radius:16px; box-shadow:0 8px 28px rgba(22,32,43,.08); padding:40px 32px; }
    .ae-card h1 { margin-top:0; font-size:26px; }
    .ae-card p { color:var(--muted); }
    .ae-btn { display:inline-block; margin-top:8px; background:var(--accent); color:#fff; text-decoration:none; padding:13px 28px; border-radius:8px; font-weight:600; }
    .ae-links { margin-top:24px; font-size:14px; }
    .ae-links a { color:var(--accent); margin:0 10px; }
    @media (max-width:560px){ .ae-card { padding:28px 20px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="ae-card">
      %%content%%
    </div>
    <div class="ae-links">
      <a href="%%account-website%%">サイトトップへ</a>
    </div>
  </div>
</body>
</html>
