<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1a9e6c; --accent2:#34d399; --ink:#16202b; --muted:#5b6b7b; --line:#e0ece6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(170deg,#e7f6ef,#f3f8f5 55%); line-height:1.8; min-height:100vh; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:72px 20px; text-align:center; }
    .ae-check { width:92px; height:92px; margin:0 auto 24px; border-radius:50%; background:linear-gradient(135deg,var(--accent2),var(--accent)); display:flex; align-items:center; justify-content:center; box-shadow:0 12px 30px rgba(26,158,108,.38); position:relative; }
    .ae-check::after { content:""; position:absolute; inset:-8px; border-radius:50%; border:2px solid rgba(26,158,108,.25); }
    .ae-check svg { width:46px; height:46px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; box-shadow:0 12px 36px rgba(22,32,43,.10); padding:42px 34px; }
    .ae-card h1 { margin-top:0; font-size:26px; }
    .ae-card p { color:var(--muted); }
    .ae-card a { color:var(--accent); }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],
    .ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px; font-size:15px; font-family:inherit; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
    .ae-btn { display:inline-block; margin-top:8px; background:var(--accent); color:#fff; text-decoration:none; padding:13px 28px; border-radius:9px; font-weight:700; }
    .ae-links { margin-top:24px; font-size:14px; }
    .ae-links a { color:var(--accent); margin:0 10px; }
    @media (max-width:560px){ .ae-card { padding:30px 22px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <div class="ae-card">
      %%content%%
    </div>
    <div class="ae-links">
      <a href="%%account-website%%">サイトトップへ</a>
    </div>
  </div>
</body>
</html>
