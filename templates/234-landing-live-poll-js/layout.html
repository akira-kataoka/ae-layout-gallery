<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#15172b; --muted:#6b6e85; --line:#e4e3f1; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f5fb; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-poll { background:#fff; border:1px solid var(--line); border-radius:18px; padding:24px; box-shadow:0 10px 30px rgba(79,70,229,.08); }
    .ae-q { font-weight:800; font-size:17px; margin-bottom:16px; }
    .ae-opt { width:100%; text-align:left; border:1px solid var(--line); background:#fff; border-radius:11px; padding:0; margin-bottom:11px; cursor:pointer; overflow:hidden; position:relative; font-family:inherit; }
    .ae-opt .bar { position:absolute; inset:0; width:0; background:#eef2ff; transition:width .6s cubic-bezier(.2,.7,.2,1); z-index:0; }
    .ae-opt.sel .bar { background:#e0e7ff; }
    .ae-opt .row { position:relative; z-index:1; display:flex; justify-content:space-between; align-items:center; padding:13px 16px; font-size:14px; }
    .ae-opt .lbl { font-weight:700; } .ae-opt .pct { font-variant-numeric:tabular-nums; color:var(--accent); font-weight:800; opacity:0; transition:opacity .3s; }
    .ae-poll.voted .pct { opacity:1; }
    .ae-poll.voted .ae-opt { cursor:default; }
    .ae-total { text-align:center; color:var(--muted); font-size:12px; margin-top:6px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-poll" id="poll">
      <div class="ae-q">次に取り上げてほしいテーマは？</div>
      <button type="button" class="ae-opt" data-base="42"><span class="bar"></span><span class="row"><span class="lbl">生成AIの業務活用</span><span class="pct">0%</span></span></button>
      <button type="button" class="ae-opt" data-base="28"><span class="bar"></span><span class="row"><span class="lbl">データ分析の基礎</span><span class="pct">0%</span></span></button>
      <button type="button" class="ae-opt" data-base="19"><span class="bar"></span><span class="row"><span class="lbl">マーケ自動化の事例</span><span class="pct">0%</span></span></button>
      <button type="button" class="ae-opt" data-base="11"><span class="bar"></span><span class="row"><span class="lbl">セキュリティ入門</span><span class="pct">0%</span></span></button>
      <div class="ae-total" id="total">投票するとみんなの結果が見られます</div>
    </div>
    <div class="ae-card">
      <div class="t">結果レポートとセミナー情報を受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var poll = document.getElementById("poll"), total = document.getElementById("total");
    var opts = Array.prototype.slice.call(poll.querySelectorAll(".ae-opt"));
    var voted = false;
    function render(selected) {
      var counts = opts.map(function (o) {
        var c = parseInt(o.getAttribute("data-base"), 10) || 0;
        return o === selected ? c + 1 : c;
      });
      var sum = counts.reduce(function (a, b) { return a + b; }, 0);
      opts.forEach(function (o, i) {
        var p = Math.round((counts[i] / sum) * 100);
        o.querySelector(".bar").style.width = p + "%";
        o.querySelector(".pct").textContent = p + "%";
      });
      total.textContent = "合計 " + sum.toLocaleString("ja-JP") + " 票";
    }
    opts.forEach(function (o) {
      o.addEventListener("click", function () {
        if (voted) return;
        voted = true;
        poll.classList.add("voted");
        opts.forEach(function (x) { x.classList.remove("sel"); });
        o.classList.add("sel");
        render(o);
      });
    });
  })();
  </script>
</body>
</html>
