<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#1a0f16; --muted:#9ca3af; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#fce7f3; line-height:1.7;
      background:radial-gradient(900px 480px at 50% -10%,#831843,transparent), #18020e; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:54px 20px; text-align:center; }
    .ae-lock { font-size:40px; }
    .ae-kicker { letter-spacing:.25em; font-size:12px; color:#f9a8d4; margin-top:6px; }
    .ae-wrap h1 { font-size:clamp(28px,6vw,42px); margin:12px 0 6px; color:#fff; }
    .ae-wrap h1 b { color:#f472b6; }
    .ae-sub { color:#f9a8d4; margin:0 0 18px; }
    .ae-timer { display:inline-flex; gap:10px; margin-bottom:26px; }
    .ae-timer .u { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:12px; padding:12px; min-width:64px; }
    .ae-timer .n { font-size:28px; font-weight:800; color:#fff; } .ae-timer .l { font-size:11px; color:#f9a8d4; }
    .ae-card { background:#fff; color:var(--ink); border-radius:16px; padding:30px 28px; box-shadow:0 18px 50px rgba(0,0,0,.45); }
    .ae-card .note { font-weight:700; margin-bottom:14px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:13px 14px; border:1px solid #e5e7eb; border-radius:10px; font-size:15px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-lock">🔐</div>
    <div class="ae-kicker">MEMBERS ONLY</div>
    <h1>%%title%%</h1>
    <p class="ae-sub">%%description%%</p>
    <div class="ae-timer"><div class="u"><div class="n">05</div><div class="l">時間</div></div><div class="u"><div class="n">42</div><div class="l">分</div></div><div class="u"><div class="n">18</div><div class="l">秒</div></div></div>
    <div class="ae-card"><div class="note">会員登録で先行アクセス</div>%%content%%</div>
  </div>
</body>
</html>
