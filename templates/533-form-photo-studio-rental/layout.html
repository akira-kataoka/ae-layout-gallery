<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0f172a; --gold:#b08d57; --ink:#1b2030; --muted:#6b7280; --line:#e6e8ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3f4f8; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-hero { background:#0f172a; color:#fff; border-radius:20px; padding:36px 26px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(15,23,42,.3); }
    .ae-hero .badge { display:inline-block; border:1px solid var(--gold); color:#d8b985; font-weight:700; font-size:11px; letter-spacing:3px; padding:5px 16px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:26px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.85; font-size:14px; }
    .ae-pts { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:22px 0; }
    .ae-pt { background:#fff; border:1px solid var(--line); border-radius:13px; padding:15px 8px; text-align:center; box-shadow:0 6px 16px rgba(15,23,42,.05); }
    .ae-pt .ic { font-size:23px; } .ae-pt .k { font-size:12px; font-weight:700; margin-top:4px; } .ae-pt .d { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(15,23,42,.08); }
    .ae-card .t { font-weight:800; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:440px){ .ae-pts { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <span class="badge">STUDIO RENTAL</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-pts">
      <div class="ae-pt"><div class="ic">💡</div><div class="k">撮影機材完備</div><div class="d">照明・背景紙</div></div>
      <div class="ae-pt"><div class="ic">🚇</div><div class="k">駅近アクセス</div><div class="d">徒歩5分</div></div>
      <div class="ae-pt"><div class="ic">🕐</div><div class="k">1時間〜OK</div><div class="d">深夜も対応</div></div>
    </div>
    <div class="ae-card">
      <div class="t">スタジオ予約・空き確認</div>
      <div class="s">ご利用日・時間帯・用途をお選びください。機材レンタルやカメラマン手配もご相談ください。</div>
      %%content%%
      <div class="ae-note">📸 物販撮影・ポートレート・動画配信など幅広い用途に対応しています</div>
    </div>
  </div>
</body>
</html>
