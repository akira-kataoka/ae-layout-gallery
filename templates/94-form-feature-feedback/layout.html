<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f6fb; line-height:1.7; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:16px; }
    .ae-head .ic { font-size:38px; }
    .ae-head h1 { margin:6px 0; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-types { display:flex; gap:8px; justify-content:center; margin:14px 0 0; flex-wrap:wrap; font-size:12px; }
    .ae-types span { background:#eef2ff; color:var(--accent); padding:5px 12px; border-radius:999px; font-weight:700; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; margin-top:18px; box-shadow:0 8px 26px rgba(79,70,229,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form textarea { min-height:120px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ic">💡</div><h1>%%title%%</h1><p>%%description%%</p><div class="ae-types"><span>機能リクエスト</span><span>不具合報告</span><span>改善提案</span></div></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
