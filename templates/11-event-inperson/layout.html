<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f1f1d; --muted:#5b6b6a; --line:#dde7e5; --dark:#0b3b36; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3f7f6; line-height:1.7; }
    .ae-hero { background:var(--dark); color:#fff; padding:52px 20px; text-align:center; }
    .ae-badge { display:inline-block; background:var(--accent); padding:6px 14px; border-radius:999px; font-size:13px; font-weight:700; }
    .ae-hero h1 { font-size:28px; margin:14px 0 0; }
    .ae-info { max-width:1000px; margin:-28px auto 0; padding:0 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .ae-info div { background:#fff; border-radius:12px; box-shadow:0 6px 20px rgba(11,59,54,.08); padding:18px; text-align:center; }
    .ae-info .lbl { color:var(--muted); font-size:12px; }
    .ae-info .val { font-weight:700; margin-top:4px; }
    .ae-grid { max-width:1000px; margin:36px auto; padding:0 20px 64px; display:grid; grid-template-columns:1.3fr .7fr; gap:32px; align-items:start; }
    .ae-detail h2 { margin-top:0; }
    .ae-map { background:#e2ece9; border:1px dashed #9cc3bd; border-radius:12px; height:180px; display:flex; align-items:center; justify-content:center; color:var(--muted); margin:20px 0; }
    .ae-apply { background:#fff; border-radius:14px; box-shadow:0 8px 24px rgba(11,59,54,.10); padding:26px 24px; position:sticky; top:20px; border-top:4px solid var(--accent); }
    .ae-apply h3 { margin-top:0; color:var(--accent); }
    .ae-apply form input[type=text],
    .ae-apply form input[type=email],
    .ae-apply form input[type=tel],
    .ae-apply form select { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
    .ae-apply form p { margin:0 0 13px; }
    .ae-apply form .submit input,
    .ae-apply form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:8px; font-weight:700; cursor:pointer; }
    @media (max-width:820px){ .ae-info { grid-template-columns:1fr; } .ae-grid { grid-template-columns:1fr; } .ae-apply { position:static; } }
  </style>
</head>
<body>
  <header class="ae-hero">
    <span class="ae-badge">会場開催イベント</span>
    <h1>%%title%%</h1>
  </header>
  <div class="ae-info">
    <div><div class="lbl">日時</div><div class="val">本文に記載</div></div>
    <div><div class="lbl">会場</div><div class="val">本文に記載</div></div>
    <div><div class="lbl">参加費</div><div class="val">無料</div></div>
  </div>
  <div class="ae-grid">
    <article class="ae-detail">
      %%content%%
      <div class="ae-map">📍 会場地図エリア（差し替え）</div>
    </article>
    <aside class="ae-apply">
      <h3>参加申し込み</h3>
      <p style="color:var(--muted);font-size:14px;margin-top:0;">下記フォームよりご登録ください。</p>
    </aside>
  </div>
</body>
</html>
