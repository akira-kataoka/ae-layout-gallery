<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#6366f1; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); line-height:1.7;
      background:linear-gradient(160deg,#e0e7ff,#f8fafc 55%); }
    .ae-wrap { max-width:440px; margin:0 auto; padding:48px 20px; text-align:center; }
    .ae-ava { width:96px; height:96px; border-radius:50%; margin:0 auto 12px; background:linear-gradient(135deg,#818cf8,#6366f1); display:flex; align-items:center; justify-content:center; font-size:42px; color:#fff; box-shadow:0 12px 30px rgba(99,102,241,.35); }
    .ae-wrap h1 { font-size:22px; margin:4px 0 2px; }
    .ae-role { color:var(--muted); font-size:14px; margin:0 0 18px; }
    .ae-links { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
    .ae-links a { display:block; background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; text-decoration:none; color:var(--ink); font-weight:700; box-shadow:0 4px 12px rgba(15,23,42,.05); }
    .ae-links a:hover { border-color:var(--accent); color:var(--accent); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:22px; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 10px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-ava">😀</div>
    <h1>%%title%%</h1>
    <p class="ae-role">%%description%%</p>
    <div class="ae-links">
      <a href="#">🌐 公式サイト</a>
      <a href="#">💼 LinkedIn</a>
      <a href="#">𝕏 / Twitter</a>
      <a href="#">📅 打ち合わせを予約</a>
    </div>
    <div class="ae-card"><div class="t">最新情報を受け取る</div>%%content%%</div>
  </div>
</body>
</html>
