<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#2a1320; --muted:#8a657a; --line:#f3dde8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf2f8; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .badge { display:inline-block; background:#fbdde9; color:var(--accent); font-weight:700; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-genre { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:22px; }
    .ae-g { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 6px; text-align:center; }
    .ae-g .ic { font-size:20px; } .ae-g .k { font-size:11px; font-weight:700; margin-top:2px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(219,39,119,.08); }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:420px){ .ae-genre { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">体験レッスン 無料</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-genre">
      <div class="ae-g"><div class="ic">🕺</div><div class="k">HIPHOP</div></div>
      <div class="ae-g"><div class="ic">🩰</div><div class="k">バレエ</div></div>
      <div class="ae-g"><div class="ic">💃</div><div class="k">JAZZ</div></div>
      <div class="ae-g"><div class="ic">🎶</div><div class="k">K-POP</div></div>
    </div>
    <div class="ae-card">
      <div class="t">無料体験レッスンのお申し込み</div>
      <div class="s">ご希望のジャンル・クラス・体験希望日をお選びください。講師よりご連絡します。</div>
      %%content%%
      <div class="ae-note">💃 キッズから大人・初心者まで。動きやすい服装でお越しください</div>
    </div>
  </div>
</body>
</html>
