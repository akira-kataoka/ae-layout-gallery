<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --gold:#f59e0b; --ink:#1a0f16; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:#fce7f3; line-height:1.7;
      background:radial-gradient(800px 460px at 50% -8%,#9d174d,transparent), linear-gradient(160deg,#500724,#1a0f16); }
    .ae-wrap { max-width:560px; margin:0 auto; padding:50px 20px; text-align:center; }
    .ae-conf { font-size:28px; letter-spacing:4px; }
    .ae-wrap h1 { font-size:clamp(26px,6vw,38px); margin:8px 0; color:#fff; }
    .ae-sub { color:#f9a8d4; margin:0 0 14px; }
    .ae-prize { display:inline-block; border:2px dashed var(--gold); color:var(--gold); padding:8px 20px; border-radius:14px; font-weight:800; margin-bottom:22px; }
    .ae-card { background:#fff; color:var(--ink); border-radius:18px; padding:28px 26px; box-shadow:0 18px 50px rgba(0,0,0,.4); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=file],.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid #f1d5e1; border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; }
    .ae-deadline { margin-top:16px; font-size:13px; color:#fca5a5; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-conf">📷 ✨ 📷 ✨ 📷</div>
    <h1>%%title%%</h1>
    <p class="ae-sub">%%description%%</p>
    <div class="ae-prize">🏆 グランプリ 旅行券10万円分</div>
    <div class="ae-card">%%content%%</div>
    <div class="ae-deadline">応募締切：2026年8月31日</div>
  </div>
</body>
</html>
