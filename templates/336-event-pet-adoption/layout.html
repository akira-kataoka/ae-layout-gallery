<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ca8a04; --ink:#2a230c; --muted:#6e6344; --line:#f0e7c9; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fffbeb; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#fbbf24,#ca8a04); color:#3a2f08; text-align:center; padding:50px 20px 40px; }
    .ae-hero .em { font-size:50px; }
    .ae-hero h1 { font-size:27px; margin:6px 0 8px; }
    .ae-hero p { margin:0; opacity:.9; font-size:14px; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:34px 20px 48px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center; box-shadow:0 8px 22px rgba(202,138,4,.07); }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-pets { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .ae-pet { background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden; text-align:center; box-shadow:0 8px 22px rgba(202,138,4,.06); }
    .ae-pet .ph { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:42px; background:linear-gradient(135deg,#fef3c7,#fde68a); }
    .ae-pet .bd { padding:10px; } .ae-pet .nm { font-weight:800; font-size:13px; } .ae-pet .de { font-size:11px; color:var(--muted); }
    .ae-note { background:#fffaf0; border:1px solid var(--line); border-radius:12px; padding:14px 16px; font-size:12px; color:#5a4a30; margin-bottom:24px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <div class="em">🐾</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催日</div><div class="v">10.26 (日) 11:00</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">わんにゃん広場</div></div>
      <div class="ae-i"><div class="ic">🎀</div><div class="k">参加</div><div class="v">入場無料</div></div>
    </div>
    <div class="ae-pets">
      <div class="ae-pet"><div class="ph">🐕</div><div class="bd"><div class="nm">モカ（♀・2歳）</div><div class="de">人懐っこい中型犬</div></div></div>
      <div class="ae-pet"><div class="ph">🐈</div><div class="bd"><div class="nm">そら（♂・1歳）</div><div class="de">甘えん坊なキジトラ</div></div></div>
      <div class="ae-pet"><div class="ph">🐈‍⬛</div><div class="bd"><div class="nm">くろ（♀・3歳）</div><div class="de">おっとり黒猫</div></div></div>
    </div>
    <div class="ae-note">譲渡には簡単な面談とお約束(終生飼育・適切な飼養環境)へのご同意をお願いしています。当日は見学だけでも歓迎です。</div>
    <div class="ae-card">
      <div class="t">来場予約・里親希望のご登録</div>
      <div class="d">事前登録でスムーズにご案内できます</div>
      %%content%%
    </div>
  </div>
</body>
</html>
