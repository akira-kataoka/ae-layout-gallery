<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#6366f1; --accent2:#ec4899; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#0a0a1a; line-height:1.7; }
    .ae-hero { background:radial-gradient(800px 400px at 50% -10%,rgba(99,102,241,.5),transparent), #0a0a1a; color:#fff; padding:64px 20px 56px; text-align:center; }
    .ae-new { display:inline-block; background:linear-gradient(90deg,var(--accent),var(--accent2)); padding:6px 16px; border-radius:999px; font-size:12px; font-weight:800; letter-spacing:.1em; }
    .ae-hero h1 { font-size:clamp(30px,6vw,46px); margin:18px 0 10px; background:linear-gradient(90deg,#fff,#c7d2fe); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .ae-hero p { color:#a5b4fc; max-width:560px; margin:0 auto 26px; }
    .ae-cta { display:inline-block; background:#fff; color:#0a0a1a; text-decoration:none; padding:14px 32px; border-radius:12px; font-weight:800; }
    .ae-mock { max-width:760px; margin:36px auto 0; height:200px; border-radius:18px 18px 0 0; background:linear-gradient(160deg,#1e1b4b,#312e81); border:1px solid #312e81; border-bottom:0; box-shadow:0 -10px 60px rgba(99,102,241,.4); }
    .ae-body { background:#fff; }
    .ae-body .in { max-width:760px; margin:0 auto; padding:48px 24px 64px; }
    .ae-body h2 { text-align:center; }
    .ae-body form input[type=text],.ae-body form input[type=email],.ae-body form input[type=tel],.ae-body form select,.ae-body form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px; font-size:15px; font-family:inherit; }
    .ae-body form p { margin:0 0 12px; }
    .ae-body form .submit input,.ae-body form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
    @media (max-width:520px){ .ae-mock { height:130px; } }
  </style>
</head>
<body>
  <header class="ae-hero">
    <span class="ae-new">NEW LAUNCH</span>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <a class="ae-cta" href="#detail">先行アクセスに申し込む</a>
    <div class="ae-mock"></div>
  </header>
  <section class="ae-body" id="detail"><div class="in">%%content%%</div></section>
</body>
</html>
