<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0faf8; line-height:1.7; }
    .ae-head { text-align:center; padding:48px 20px 8px; }
    .ae-head h1 { font-size:27px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-map { max-width:760px; margin:20px auto 0; padding:0 20px; }
    .ae-map .box { height:220px; background:#dcfce7; border:1px dashed #86efac; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#0f766e; font-weight:700; }
    .ae-info { max-width:760px; margin:16px auto; padding:0 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .ae-info div { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; text-align:center; }
    .ae-info .ic { font-size:24px; } .ae-info .lbl { font-size:12px; color:var(--muted); } .ae-info .val { font-weight:700; margin-top:2px; font-size:14px; }
    .ae-card { max-width:520px; margin:20px auto 56px; padding:0 20px; }
    .ae-card .inner { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; text-align:center; box-shadow:0 8px 24px rgba(13,148,136,.08); }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:560px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></header>
  <div class="ae-map"><div class="box">🗺️ アクセスマップ（差し替え）</div></div>
  <section class="ae-info">
    <div><div class="ic">🚃</div><div class="lbl">電車</div><div class="val">サンプル駅 徒歩5分</div></div>
    <div><div class="ic">🚗</div><div class="lbl">お車</div><div class="val">専用駐車場20台</div></div>
    <div><div class="ic">🕒</div><div class="lbl">営業時間</div><div class="val">10:00 - 20:00</div></div>
  </section>
  <div class="ae-card"><div class="inner"><div class="t">ご来店予約・クーポン受け取り</div>%%content%%</div></div>
</body>
</html>
