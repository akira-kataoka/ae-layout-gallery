<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eff6ff; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:52px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-phone-ic { width:64px; height:64px; margin:0 auto 12px; border-radius:50%; background:#dbeafe; color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:30px; }
    .ae-head h1 { margin:0 0 6px; font-size:23px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 8px 26px rgba(3,105,161,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
    .ae-trust { text-align:center; margin-top:16px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="ae-phone-ic">📞</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-card">%%content%%</div>
    <div class="ae-trust">通話料無料・しつこい勧誘は一切いたしません</div>
  </div>
</body>
</html>
