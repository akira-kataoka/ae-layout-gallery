<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2622; --muted:#5a766e; --line:#d4ebe6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eefaf7; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg,#2dd4bf,#0d9488); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 16px; box-shadow:0 14px 32px rgba(13,148,136,.28); }
    .ae-done h1 { font-size:24px; margin:0 0 6px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-class { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:18px; box-shadow:0 8px 22px rgba(13,148,136,.06); }
    .ae-class .row { display:flex; gap:12px; align-items:center; padding:10px 0; border-top:1px solid var(--line); }
    .ae-class .row:first-child { border-top:0; }
    .ae-class .ic { width:40px; height:40px; border-radius:11px; background:#e0f2ef; display:flex; align-items:center; justify-content:center; font-size:20px; flex:0 0 auto; }
    .ae-class .k { font-size:12px; color:var(--muted); } .ae-class .v { font-weight:700; font-size:14px; }
    .ae-bring { background:#e0f2ef; border:1px solid #bfe3dc; border-radius:14px; padding:16px 18px; margin-bottom:18px; }
    .ae-bring .t { font-weight:700; font-size:13px; margin-bottom:8px; }
    .ae-b { display:flex; gap:10px; padding:4px 0; font-size:13px; color:#0f766e; } .ae-b .e { flex:0 0 auto; }
    .ae-cal { display:flex; gap:10px; margin-bottom:18px; }
    .ae-cal a { flex:1; text-align:center; background:#fff; border:1px solid var(--line); border-radius:11px; padding:12px; font-size:13px; font-weight:700; color:var(--accent); text-decoration:none; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-class">
      <div class="row"><div class="ic">📚</div><div><div class="k">クラス</div><div class="v">初級ヨガ（60分）</div></div></div>
      <div class="row"><div class="ic">📅</div><div><div class="k">日時</div><div class="v">毎週水曜 19:00〜（次回 7/15）</div></div></div>
      <div class="row"><div class="ic">👩‍🏫</div><div><div class="k">担当インストラクター</div><div class="v">佐藤 先生</div></div></div>
      <div class="row"><div class="ic">📍</div><div><div class="k">スタジオ</div><div class="v">サンプル スタジオA</div></div></div>
    </div>
    <div class="ae-bring">
      <div class="t">当日のご準備</div>
      <div class="ae-b"><span class="e">🧘</span><span>動きやすい服装・タオル・お飲み物</span></div>
      <div class="ae-b"><span class="e">⏰</span><span>開始10分前までにお越しください</span></div>
    </div>
    <div class="ae-cal">
      <a href="#">📅 カレンダーに追加</a>
      <a href="#">🔁 予約を変更</a>
    </div>
    <div class="ae-card">
      <div class="t">レッスン情報・キャンペーンを受け取る</div>
      %%content%%
    </div>
  </div>
</body>
</html>
