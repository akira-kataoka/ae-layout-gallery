<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4338ca; --ink:#1a1c33; --muted:#666a85; --line:#e3e3f2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f1fb; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:52px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head .ic { width:62px; height:62px; border-radius:18px; background:linear-gradient(135deg,#6366f1,#4338ca); color:#fff; font-size:28px; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; box-shadow:0 12px 28px rgba(67,56,202,.3); }
    .ae-head h1 { font-size:23px; margin:0 0 6px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-alert { display:flex; gap:11px; align-items:flex-start; background:#fff7ed; border:1px solid #fed7aa; border-radius:14px; padding:14px 16px; margin:20px 0 18px; font-size:13px; color:#9a3412; }
    .ae-alert .e { font-size:18px; flex:0 0 auto; }
    .ae-why { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:18px; box-shadow:0 8px 22px rgba(67,56,202,.05); }
    .ae-why .t { font-weight:700; font-size:13px; margin-bottom:10px; }
    .ae-w { display:flex; gap:11px; padding:7px 0; font-size:14px; align-items:flex-start; } .ae-w .e { font-size:18px; flex:0 0 auto; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="ic">💳</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-alert"><span class="e">⚠️</span><span>お支払い方法が未登録です。ご登録がないと、次回の更新・お届けが停止する場合があります。</span></div>
    <div class="ae-why">
      <div class="t">ご登録のメリット</div>
      <div class="ae-w"><span class="e">🔄</span><span>更新やお届けが止まらず、サービスを継続してご利用いただけます</span></div>
      <div class="ae-w"><span class="e">⚡</span><span>毎回の支払い手続きが不要になります</span></div>
      <div class="ae-w"><span class="e">🔒</span><span>カード情報は暗号化して安全に取り扱います</span></div>
    </div>
    <div class="ae-card">
      <div class="t">ご登録の案内・リマインドを受け取る</div>
      <div class="s">登録手順のご案内と、未登録の場合のリマインドをお送りします。</div>
      %%content%%
      <div class="ae-note">🔐 セキュアな決済ページでお手続きいただけます</div>
    </div>
  </div>
</body>
</html>
