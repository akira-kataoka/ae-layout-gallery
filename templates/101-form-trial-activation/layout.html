<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4338ca; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:linear-gradient(160deg,#eef2ff,#f8fafc 55%); line-height:1.7; display:flex; align-items:center; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:32px 20px; width:100%; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:36px 32px; box-shadow:0 14px 40px rgba(67,56,202,.14); }
    .ae-key { width:60px; height:60px; margin:0 auto 14px; border-radius:14px; background:#eef2ff; color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:28px; }
    .ae-card h1 { text-align:center; font-size:21px; margin:0 0 6px; }
    .ae-card > p { text-align:center; color:var(--muted); font-size:14px; margin:0 0 20px; }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text] { width:100%; padding:13px; border:1px dashed #a5b4fc; border-radius:10px; font-size:16px; text-align:center; letter-spacing:.12em; font-weight:700; text-transform:uppercase; background:#f5f7ff; }
    .ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-key">🔑</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      %%content%%
    </div>
  </div>
</body>
</html>
