<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ea580c; --ink:#2a1810; --muted:#7c6a5f; --line:#f1e3d8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf6f0; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(234,88,12,.09); }
    .ae-field { margin-bottom:18px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
    .ae-grid button { border:1px solid var(--line); background:#fff; border-radius:10px; padding:10px 4px; font-weight:700; font-size:12px; cursor:pointer; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:3px; transition:border-color .15s, background .15s, color .15s; }
    .ae-grid button .e { font-size:18px; }
    .ae-grid button.on { border-color:var(--accent); background:#fff5ef; color:var(--accent); }
    .ae-out { background:linear-gradient(135deg,#f97316,#ea580c); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .lab { font-size:13px; opacity:.9; } .ae-out .big { font-size:44px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-out .big small { font-size:16px; } .ae-out .sub { font-size:13px; opacity:.95; margin-top:6px; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>運動の種類</label></div>
      <div class="ae-grid" id="act">
        <button type="button" data-m="3.5" class="on"><span class="e">🚶</span>ウォーキング</button>
        <button type="button" data-m="7.0"><span class="e">🏃</span>ジョギング</button>
        <button type="button" data-m="6.0"><span class="e">🚴</span>サイクリング</button>
        <button type="button" data-m="8.0"><span class="e">🏊</span>水泳</button>
        <button type="button" data-m="5.0"><span class="e">🏋️</span>筋トレ</button>
        <button type="button" data-m="2.5"><span class="e">🧘</span>ヨガ</button>
      </div>
      <div class="ae-field" style="margin-top:18px;"><label>体重 <span class="v"><span id="vW">60</span> kg</span></label>
        <input type="range" id="w" min="35" max="120" step="1" value="60"></div>
      <div class="ae-field"><label>運動時間 <span class="v"><span id="vT">30</span> 分</span></label>
        <input type="range" id="t" min="5" max="180" step="5" value="30"></div>
      <div class="ae-out">
        <div class="lab">消費カロリーの目安</div>
        <div class="big"><span id="kcal">0</span><small> kcal</small></div>
        <div class="sub">ごはん約 <span id="rice">0</span> 杯ぶん</div>
      </div>
    </div>
    <div class="ae-cta">
      <div class="t">運動習慣・ダイエットのヒントを受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var w = document.getElementById("w"), t = document.getElementById("t");
    var vW = document.getElementById("vW"), vT = document.getElementById("vT");
    var kcalEl = document.getElementById("kcal"), riceEl = document.getElementById("rice");
    var actBtns = Array.prototype.slice.call(document.querySelectorAll("#act button"));
    var met = 3.5;
    function calc() {
      var kg = parseInt(w.value, 10) || 0, min = parseInt(t.value, 10) || 0;
      vW.textContent = kg; vT.textContent = min;
      var kcal = met * kg * (min / 60) * 1.05;
      kcalEl.textContent = Math.round(kcal).toLocaleString();
      riceEl.textContent = (Math.round(kcal / 234 * 10) / 10).toFixed(1);   // ごはん茶碗1杯≒234kcal
    }
    w.addEventListener("input", calc); t.addEventListener("input", calc);
    actBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        actBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); met = parseFloat(b.getAttribute("data-m")); calc();
      });
    });
    calc();
  })();
  </script>
</body>
</html>
