<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#ea580c; --ink:#1c1610; --muted:#78716c; --line:#eee2d3; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff8f3; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:16px; }
    .ae-head h1 { margin:0 0 6px; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-items { background:#fff; border:1px solid var(--line); border-radius:16px; padding:10px 18px; box-shadow:0 8px 24px rgba(234,88,12,.08); margin-bottom:14px; }
    .ae-item { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--line); }
    .ae-item:last-child { border-bottom:0; }
    .ae-item .nm { flex:1; } .ae-item .nm small { display:block; color:var(--muted); }
    .ae-step { display:flex; align-items:center; gap:8px; }
    .ae-step button { width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:#fff; font-size:18px; cursor:pointer; }
    .ae-step .qty { width:28px; text-align:center; font-weight:700; font-variant-numeric:tabular-nums; }
    .ae-total { background:linear-gradient(135deg,#ea580c,#dc2626); color:#fff; border-radius:14px; padding:18px; display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .ae-total .lbl { opacity:.9; } .ae-total .num { font-size:28px; font-weight:900; font-variant-numeric:tabular-nums; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-items" id="items">
      <div class="ae-item" data-price="780"><div class="nm">日替わり弁当<small>¥780</small></div><div class="ae-step"><button type="button" data-act="dec" aria-label="減らす">−</button><span class="qty">1</span><button type="button" data-act="inc" aria-label="増やす">＋</button></div></div>
      <div class="ae-item" data-price="850"><div class="nm">唐揚げ弁当<small>¥850</small></div><div class="ae-step"><button type="button" data-act="dec" aria-label="減らす">−</button><span class="qty">0</span><button type="button" data-act="inc" aria-label="増やす">＋</button></div></div>
      <div class="ae-item" data-price="980"><div class="nm">幕の内弁当<small>¥980</small></div><div class="ae-step"><button type="button" data-act="dec" aria-label="減らす">−</button><span class="qty">0</span><button type="button" data-act="inc" aria-label="増やす">＋</button></div></div>
    </div>
    <div class="ae-total"><span class="lbl">合計</span><span class="num" id="total">¥780</span></div>
    <div class="ae-card"><div class="t">この内容で注文する</div>%%content%%</div>
  </div>

  <script>
  (function () {
    var totalEl = document.getElementById("total");
    function yen(n) { return "¥" + n.toLocaleString("ja-JP"); }
    function recalc() {
      var sum = 0;
      Array.prototype.forEach.call(document.querySelectorAll("#items .ae-item"), function (row) {
        var price = parseInt(row.getAttribute("data-price"), 10);
        var qty = parseInt(row.querySelector(".qty").textContent, 10) || 0;
        sum += price * qty;
      });
      totalEl.textContent = yen(sum);
    }
    document.getElementById("items").addEventListener("click", function (e) {
      var btn = e.target.closest("button[data-act]");
      if (!btn) return;
      var qtyEl = btn.parentNode.querySelector(".qty");
      var q = parseInt(qtyEl.textContent, 10) || 0;
      q = btn.getAttribute("data-act") === "inc" ? q + 1 : Math.max(0, q - 1);
      qtyEl.textContent = q;
      recalc();
    });
    recalc();
  })();
  </script>
</body>
</html>
