<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0ea5e9; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eff8ff; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:64px 20px; text-align:center; }
    .ae-card { background:#fff; border-radius:18px; box-shadow:0 12px 34px rgba(14,165,233,.14); padding:42px 34px; }
    .ae-emoji { font-size:46px; }
    .ae-card h1 { margin:8px 0; font-size:24px; }
    .ae-card > p { color:var(--muted); }
    .ae-share { display:flex; gap:10px; justify-content:center; margin:22px 0 6px; flex-wrap:wrap; }
    .ae-share a { text-decoration:none; color:#fff; padding:11px 18px; border-radius:10px; font-size:13px; font-weight:700; }
    .ae-share .x { background:#0f172a; } .ae-share .fb { background:#1877f2; } .ae-share .ln { background:#0a66c2; } .ae-share .li { background:#06c755; }
    .ae-ref { margin-top:22px; padding-top:20px; border-top:1px solid var(--line); font-size:14px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-emoji">🎉</div>
      %%content%%
      <div class="ae-share"><a class="x" href="#">𝕏 でシェア</a><a class="fb" href="#">Facebook</a><a class="ln" href="#">LinkedIn</a><a class="li" href="#">LINE</a></div>
      <div class="ae-ref">シェアして友達を招待すると、特典が受け取れます 🎁</div>
    </div>
  </div>
</body>
</html>
