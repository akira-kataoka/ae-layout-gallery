<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0891b2; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#ecfeff; line-height:1.7; }
    .ae-wrap { max-width:460px; margin:0 auto; padding:60px 20px; text-align:center; }
    .ae-msg { margin-bottom:14px; }
    .ae-ticket { background:#fff; border-radius:18px; box-shadow:0 14px 40px rgba(8,145,178,.16); overflow:hidden; }
    .ae-tt { background:linear-gradient(120deg,#0e7490,#0891b2); color:#fff; padding:16px; font-weight:800; letter-spacing:.05em; }
    .ae-no { padding:24px 20px 8px; }
    .ae-no .lbl { color:var(--muted); font-size:13px; }
    .ae-no .num { font-size:64px; font-weight:900; color:var(--accent); line-height:1; }
    .ae-wait { border-top:2px dashed var(--line); margin-top:14px; padding:16px; display:flex; justify-content:space-around; }
    .ae-wait .v { font-weight:800; font-size:20px; } .ae-wait .k { color:var(--muted); font-size:12px; }
    .ae-note { margin-top:16px; font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-msg">%%content%%</div>
    <div class="ae-ticket">
      <div class="ae-tt">受付番号</div>
      <div class="ae-no"><div class="lbl">あなたの番号</div><div class="num">A-128</div></div>
      <div class="ae-wait"><div><div class="v">7組</div><div class="k">前にお待ち</div></div><div><div class="v">約25分</div><div class="k">目安待ち時間</div></div></div>
    </div>
    <div class="ae-note">順番が近づくとメールでお知らせします。会場を離れても大丈夫です。</div>
  </div>
</body>
</html>
