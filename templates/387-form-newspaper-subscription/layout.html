<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1e293b; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f4f5f7; line-height:1.7; }
    .ae-wrap { max-width:580px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-plans { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .ae-p { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 8px; text-align:center; box-shadow:0 6px 18px rgba(15,23,42,.05); }
    .ae-p .nm { font-weight:800; font-size:13px; } .ae-p .sp { font-size:11px; color:var(--muted); } .ae-p .pr { color:var(--accent); font-weight:900; font-size:14px; margin-top:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:440px){ .ae-plans { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">📰</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-plans">
      <div class="ae-p"><div class="nm">朝刊のみ</div><div class="sp">月〜日</div><div class="pr">¥2,900/月</div></div>
      <div class="ae-p"><div class="nm">朝・夕刊セット</div><div class="sp">いちばん人気</div><div class="pr">¥4,400/月</div></div>
      <div class="ae-p"><div class="nm">電子版</div><div class="sp">スマホ・PC</div><div class="pr">¥1,980/月</div></div>
    </div>
    <div class="ae-card">
      <div class="t">定期購読のお申し込み</div>
      %%content%%
    </div>
  </div>
</body>
</html>
