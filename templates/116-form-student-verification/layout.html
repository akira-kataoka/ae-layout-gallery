<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#2563eb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef3fc; line-height:1.7; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:16px; }
    .ae-badge { display:inline-block; background:#dbeafe; color:var(--accent); font-weight:800; padding:6px 16px; border-radius:999px; font-size:13px; }
    .ae-head h1 { margin:12px 0 4px; font-size:23px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-off { font-size:40px; font-weight:900; color:var(--accent); text-align:center; margin:6px 0 12px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(37,99,235,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=file],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    .ae-note { font-size:12px; color:var(--muted); margin-top:10px; text-align:center; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><span class="ae-badge">学生限定</span><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-off">最大 50% OFF</div>
    <div class="ae-card">%%content%%<div class="ae-note">在学確認のため、学生証等の提出をお願いする場合があります。</div></div>
  </div>
</body>
</html>
