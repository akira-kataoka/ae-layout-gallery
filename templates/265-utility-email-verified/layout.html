<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#16a34a; --ink:#0f231a; --muted:#5b7167; --line:#d7ece0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fbf4; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:64px 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:40px 30px; text-align:center; box-shadow:0 16px 40px rgba(22,163,74,.1); }
    .ae-check { width:84px; height:84px; border-radius:50%; background:#dcfce7; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; position:relative; }
    .ae-check .c { width:60px; height:60px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:30px; }
    .ae-card h1 { font-size:24px; margin:0 0 10px; }
    .ae-card .lead { color:var(--muted); margin:0 0 8px; font-size:14px; }
    .ae-email { display:inline-block; background:#f0fdf4; border:1px dashed var(--accent); color:var(--accent); font-weight:700; padding:7px 16px; border-radius:10px; margin-bottom:24px; font-size:14px; }
    .ae-next { background:#f8fdfa; border:1px solid var(--line); border-radius:14px; padding:18px; text-align:left; margin-bottom:24px; }
    .ae-next .t { font-weight:700; font-size:14px; margin-bottom:8px; }
    .ae-next li { font-size:13px; color:#3c5c4f; margin-bottom:5px; }
    .ae-optin { border-top:1px dashed var(--line); padding-top:22px; }
    .ae-optin .t { font-weight:700; font-size:14px; margin-bottom:12px; }
    .ae-optin form input[type=email] { width:100%; padding:13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-optin form p { margin:0 0 12px; }
    .ae-optin form .submit input,.ae-optin form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-check"><div class="c">✓</div></div>
      <h1>%%title%%</h1>
      <p class="lead">%%description%%</p>
      <div class="ae-email">taro@example.com</div>
      <div class="ae-next">
        <div class="t">次にできること</div>
        <ul>
          <li>マイページにログインして利用を開始</li>
          <li>プロフィールを設定して機能をフル活用</li>
          <li>配信設定からお知らせの受け取りを調整</li>
        </ul>
      </div>
      <div class="ae-optin">
        <div class="t">お役立ち情報やお得なお知らせを受け取る</div>
        %%content%%
      </div>
    </div>
  </div>
</body>
</html>
