<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#1f1320; --muted:#6b7280; --line:#f3d9e7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf2f8; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#db2777,#f59e0b); color:#fff; padding:48px 20px; text-align:center; }
    .ae-hero h1 { margin:0 0 8px; font-size:28px; }
    .ae-hero p { margin:0; opacity:.95; }
    .ae-perks { max-width:760px; margin:-22px auto 0; padding:0 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .ae-perks div { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; text-align:center; box-shadow:0 6px 18px rgba(219,39,119,.08); font-size:13px; }
    .ae-perks .ic { font-size:24px; }
    .ae-card { max-width:560px; margin:28px auto 56px; background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 10px 30px rgba(219,39,119,.1); }
    .ae-card h2 { margin-top:0; font-size:18px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:560px){ .ae-perks { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="ae-hero"><h1>%%title%%</h1><p>%%description%%</p></header>
  <section class="ae-perks">
    <div><div class="ic">💰</div>報酬・コミッション</div>
    <div><div class="ic">🎁</div>限定グッズ・先行体験</div>
    <div><div class="ic">📣</div>公式での紹介</div>
  </section>
  <section class="ae-card"><h2>アンバサダーに応募</h2>%%content%%</section>
</body>
</html>
