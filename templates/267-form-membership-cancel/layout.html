<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#475569; --warn:#dc2626; --ink:#1e293b; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f5f9; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:23px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-offer { background:linear-gradient(135deg,#fef9c3,#fde68a); border-radius:16px; padding:20px; text-align:center; margin-bottom:18px; }
    .ae-offer .ti { font-weight:800; font-size:16px; color:#92722a; }
    .ae-offer .de { font-size:13px; color:#7a5c0a; margin-top:4px; }
    .ae-offer .btn { display:inline-block; margin-top:12px; background:#ca8a04; color:#fff; font-weight:800; padding:10px 22px; border-radius:9px; text-decoration:none; font-size:14px; }
    .ae-lose { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:18px; }
    .ae-lose .t { font-weight:700; font-size:13px; margin-bottom:8px; }
    .ae-lose li { font-size:13px; color:#475569; margin-bottom:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:15px; margin-bottom:14px; }
    .ae-card form select,.ae-card form textarea,.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--warn); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    .ae-foot { color:var(--muted); font-size:12px; text-align:center; margin-top:12px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-offer">
      <div class="ti">🎁 退会前に、特別なご提案</div>
      <div class="de">いま継続いただくと、次の3ヶ月を50%OFFでご利用いただけます。</div>
      <a class="btn" href="#">割引で続ける</a>
    </div>
    <div class="ae-lose">
      <div class="t">退会すると、以下が利用できなくなります</div>
      <ul>
        <li>保存したデータ・履歴（復元できません）</li>
        <li>会員限定価格・ポイント残高</li>
        <li>継続利用特典（再入会時はリセット）</li>
      </ul>
    </div>
    <div class="ae-card">
      <div class="t">それでも退会する</div>
      %%content%%
      <p class="ae-foot">退会手続きの完了メールをお送りします。</p>
    </div>
  </div>
</body>
</html>
