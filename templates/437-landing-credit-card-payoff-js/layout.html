<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#be123c; --ink:#2a0f18; --muted:#7c5a64; --line:#f1dde2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf2f5; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(190,18,60,.09); }
    .ae-field { margin-bottom:18px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-act { display:flex; gap:6px; background:#fbe1e7; border-radius:10px; padding:4px; }
    .ae-act button { flex:1; border:0; background:transparent; padding:9px 4px; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; color:var(--muted); }
    .ae-act button.on { background:#fff; color:var(--accent); box-shadow:0 2px 8px rgba(190,18,60,.18); }
    .ae-out { background:linear-gradient(135deg,#e11d48,#be123c); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .lab { font-size:13px; opacity:.9; } .ae-out .big { font-size:38px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-out .big small { font-size:15px; } .ae-out .sub { font-size:13px; opacity:.95; margin-top:6px; }
    .ae-row2 { display:flex; gap:8px; margin-top:14px; }
    .ae-g { flex:1; background:rgba(255,255,255,.15); border-radius:10px; padding:10px 6px; }
    .ae-g .k { font-size:11px; opacity:.9; } .ae-g .n { font-weight:800; font-variant-numeric:tabular-nums; }
    .ae-warn { background:rgba(0,0,0,.18); border-radius:10px; padding:10px; font-size:12px; margin-top:12px; }
    .ae-note { font-size:11px; color:var(--muted); margin-top:12px; text-align:center; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>残高（借入残高） <span class="v"><span id="vB">30</span> 万円</span></label>
        <input type="range" id="b" min="5" max="200" step="5" value="30"></div>
      <div class="ae-field"><label>毎月の返済額 <span class="v">¥<span id="vM">10000</span></span></label>
        <input type="range" id="m" min="3000" max="60000" step="1000" value="10000"></div>
      <div class="ae-field"><label>実質年率（金利）</label>
        <div class="ae-act" id="rate">
          <button type="button" data-r="12">12%</button>
          <button type="button" data-r="15" class="on">15%</button>
          <button type="button" data-r="18">18%</button>
        </div></div>
      <div class="ae-out">
        <div class="lab">完済までにかかる期間</div>
        <div class="big"><span id="period">0</span></div>
        <div class="sub"><span id="periodSub">— </span></div>
        <div class="ae-row2">
          <div class="ae-g"><div class="k">支払う利息の合計</div><div class="n">¥<span id="interest">0</span></div></div>
          <div class="ae-g"><div class="k">総支払額</div><div class="n">¥<span id="total">0</span></div></div>
        </div>
        <div class="ae-warn" id="warn" hidden>⚠️ 毎月の返済額が利息に追いつかず、このままでは完済できません。返済額を増やしましょう。</div>
      </div>
      <div class="ae-note">※ 概算です。手数料・締め日等により実際とは異なります。</div>
    </div>
    <div class="ae-cta">
      <div class="t">かしこい返済・おまとめのヒントを受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var b = document.getElementById("b"), m = document.getElementById("m");
    var vB = document.getElementById("vB"), vM = document.getElementById("vM");
    var periodEl = document.getElementById("period"), periodSub = document.getElementById("periodSub");
    var interestEl = document.getElementById("interest"), totalEl = document.getElementById("total"), warn = document.getElementById("warn");
    var rateBtns = Array.prototype.slice.call(document.querySelectorAll("#rate button"));
    var ratePct = 15;
    function yen(n) { return Math.round(n).toLocaleString(); }
    function calc() {
      var balance = (parseInt(b.value, 10) || 0) * 10000;
      var monthly = parseInt(m.value, 10) || 0;
      vB.textContent = parseInt(b.value, 10) || 0;
      vM.textContent = monthly.toLocaleString();
      var r = ratePct / 100 / 12;
      var firstInterest = balance * r;
      if (monthly <= firstInterest) {
        warn.hidden = false;
        periodEl.textContent = "—"; periodSub.textContent = "完済できません";
        interestEl.textContent = "—"; totalEl.textContent = "—";
        return;
      }
      warn.hidden = true;
      var n = Math.ceil(-Math.log(1 - (r * balance) / monthly) / Math.log(1 + r));
      var years = Math.floor(n / 12), months = n % 12;
      periodEl.textContent = years > 0 ? years + "年" + months + "ヶ月" : months + "ヶ月";
      periodSub.textContent = "（" + n + "回払い）";
      var total = monthly * n;
      var interest = total - balance;
      interestEl.textContent = yen(interest);
      totalEl.textContent = yen(total);
    }
    [b, m].forEach(function (el) { el.addEventListener("input", calc); });
    rateBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        rateBtns.forEach(function (x) { x.classList.remove("on"); });
        btn.classList.add("on"); ratePct = parseFloat(btn.getAttribute("data-r")); calc();
      });
    });
    calc();
  })();
  </script>
</body>
</html>
