<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#c2410c; --green:#15803d; --ink:#f8eede; --muted:#c8b9a4; --line:#3a2a20; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#1a1009; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(160deg,#3b1d12,#1f120a); border:1px solid var(--line); border-radius:20px; padding:32px 24px; text-align:center; position:relative; overflow:hidden; }
    .ae-hero::after { content:"❄ ✦ ❄ ✦ ❄ ✦ ❄ ✦ ❄ ✦ ❄ ✦ ❄"; position:absolute; top:8px; left:0; right:0; font-size:12px; letter-spacing:6px; color:rgba(248,238,222,.18); }
    .ae-hero .lights { font-size:22px; letter-spacing:4px; margin-bottom:12px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; color:#fff; }
    .ae-hero p { margin:0; color:var(--muted); font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#241710; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:22px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-stalls { background:#241710; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-stalls .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#fff; }
    .ae-stalls .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-s { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-s .e { font-size:18px; }
    .ae-card { background:#241710; border:1px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#1a1009; color:#f8eede; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-stalls .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="lights">🎄 ✨ 🕯️ ✨ 🎄</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">12.13–12.25</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">中央広場</div></div>
      <div class="ae-i"><div class="ic">🎟️</div><div class="k">入場</div><div class="v">無料</div></div>
    </div>
    <div class="ae-stalls">
      <div class="t">マーケットの楽しみ</div>
      <div class="g">
        <div class="ae-s"><span class="e">☕</span> ホットワイン＆グリューワイン</div>
        <div class="ae-s"><span class="e">🍞</span> 焼きたてシュトーレン</div>
        <div class="ae-s"><span class="e">🎁</span> 雑貨・オーナメント</div>
        <div class="ae-s"><span class="e">🎶</span> ゴスペル・聖歌隊ライブ</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">来場予約・最新情報の登録</div>
      <div class="d">点灯式やライブの日程をいち早くお届けします</div>
      %%content%%
    </div>
  </div>
</body>
</html>
