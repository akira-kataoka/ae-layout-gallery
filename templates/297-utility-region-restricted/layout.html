<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#475569; --ink:#1e293b; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1f5f9; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:64px 20px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:40px 30px; text-align:center; box-shadow:0 16px 40px rgba(15,23,42,.07); }
    .ae-ico { width:80px; height:80px; border-radius:50%; background:#f1f5f9; display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto 18px; }
    .ae-card h1 { font-size:23px; margin:0 0 10px; }
    .ae-card .lead { color:var(--muted); margin:0 0 24px; font-size:14px; }
    .ae-note { background:#f8fafc; border:1px solid var(--line); border-radius:12px; padding:16px; font-size:13px; color:#475569; margin-bottom:24px; text-align:left; }
    .ae-optin { border-top:1px dashed var(--line); padding-top:22px; }
    .ae-optin .t { font-weight:700; font-size:14px; margin-bottom:6px; }
    .ae-optin .d { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .ae-optin form input[type=email] { width:100%; padding:13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-optin form p { margin:0 0 12px; }
    .ae-optin form .submit input,.ae-optin form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-ico">🌐</div>
      <h1>%%title%%</h1>
      <p class="lead">%%description%%</p>
      <div class="ae-note">このサービスは現在、一部の国・地域でのみご利用いただけます。お住まいの地域での提供開始まで、いましばらくお待ちください。</div>
      <div class="ae-optin">
        <div class="t">提供開始のお知らせを受け取る</div>
        <div class="d">あなたの地域で利用可能になり次第、いち早くご連絡します</div>
        %%content%%
      </div>
    </div>
  </div>
</body>
</html>
