<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#15803d; --ink:#0c2415; --muted:#566b5d; --line:#d9ead9; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f1faf3; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-pests { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:20px; }
    .ae-p { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 4px; text-align:center; box-shadow:0 6px 18px rgba(21,128,61,.05); }
    .ae-p .em { font-size:22px; } .ae-p .nm { font-size:10px; font-weight:700; }
    .ae-banner { background:linear-gradient(135deg,#15803d,#16a34a); color:#fff; border-radius:14px; padding:14px; text-align:center; margin-bottom:20px; }
    .ae-banner .big { font-size:18px; font-weight:900; } .ae-banner .sm { font-size:12px; opacity:.92; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:440px){ .ae-pests { grid-template-columns:repeat(3,1fr); } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🐜</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-pests">
      <div class="ae-p"><div class="em">🪳</div><div class="nm">ゴキブリ</div></div>
      <div class="ae-p"><div class="em">🐀</div><div class="nm">ネズミ</div></div>
      <div class="ae-p"><div class="em">🐝</div><div class="nm">ハチ</div></div>
      <div class="ae-p"><div class="em">🐜</div><div class="nm">シロアリ</div></div>
      <div class="ae-p"><div class="em">🦟</div><div class="nm">害虫全般</div></div>
    </div>
    <div class="ae-banner">
      <div class="big">最短即日対応・見積もり後の追加料金なし</div>
      <div class="sm">作業後の再発保証つき（一部対象外）</div>
    </div>
    <div class="ae-card">
      <div class="t">無料お見積もり・現地調査の依頼</div>
      %%content%%
    </div>
  </div>
</body>
</html>
