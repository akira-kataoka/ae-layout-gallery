<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0f1f2a; --muted:#5a7184; --line:#d8e6ef; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef6fb; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .badge { display:inline-block; background:#d4ebf7; color:var(--accent); font-weight:700; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-class { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px; }
    .ae-c { background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 8px; text-align:center; }
    .ae-c .ic { font-size:26px; } .ae-c .k { font-size:13px; font-weight:700; margin-top:4px; } .ae-c .p { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(3,105,161,.08); }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:440px){ .ae-class { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">Web予約で 10% OFF</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-class">
      <div class="ae-c"><div class="ic">🚗</div><div class="k">コンパクト</div><div class="p">¥5,500/日〜</div></div>
      <div class="ae-c"><div class="ic">🚙</div><div class="k">SUV / ミニバン</div><div class="p">¥9,800/日〜</div></div>
      <div class="ae-c"><div class="ic">🚐</div><div class="k">大型 / 商用</div><div class="p">¥13,200/日〜</div></div>
    </div>
    <div class="ae-card">
      <div class="t">空き状況の確認・予約</div>
      <div class="s">ご希望の日時と車種をご入力ください。空き状況をご連絡します。</div>
      %%content%%
      <div class="ae-note">🔒 免許証・支払い情報のご提示は当日店頭で承ります</div>
    </div>
  </div>
</body>
</html>
