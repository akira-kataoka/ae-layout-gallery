<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0369a1; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0f6fb; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:14px; }
    .ae-shield { width:64px; height:64px; margin:0 auto 10px; border-radius:16px; background:#e0f2fe; color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:30px; }
    .ae-head h1 { margin:0 0 4px; font-size:24px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-plans { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:16px 0; }
    .ae-plans div { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; text-align:center; font-size:13px; }
    .ae-plans .pr { font-weight:800; color:var(--accent); font-size:18px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 8px 24px rgba(3,105,161,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form .row { display:flex; gap:14px; } .ae-card form .row > p { flex:1; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:520px){ .ae-plans { grid-template-columns:1fr; } .ae-card form .row { flex-direction:column; gap:0; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><div class="ae-shield">🛡️</div><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-plans">
      <div>+1年<br><span class="pr">¥1,980</span></div>
      <div>+3年<br><span class="pr">¥4,980</span></div>
      <div>+5年<br><span class="pr">¥7,980</span></div>
    </div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
