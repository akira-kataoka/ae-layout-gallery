<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#b45309; --ink:#1c1610; --muted:#78716c; --line:#eee2d3; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fbf8f3; line-height:1.7; }
    .ae-grid { max-width:900px; margin:0 auto; padding:48px 20px; display:grid; grid-template-columns:.9fr 1.1fr; gap:30px; align-items:start; }
    .ae-pitch .box { height:200px; border-radius:16px; background:linear-gradient(160deg,#fcd34d,#b45309); display:flex; align-items:center; justify-content:center; font-size:64px; box-shadow:0 12px 30px rgba(180,83,9,.2); }
    .ae-pitch h1 { font-size:22px; margin:14px 0 6px; }
    .ae-pitch p { color:var(--muted); font-size:14px; margin:0; }
    .ae-pitch ul { list-style:none; padding:0; margin:12px 0 0; font-size:13px; color:var(--muted); }
    .ae-pitch li { padding:4px 0 4px 20px; position:relative; } .ae-pitch li::before { content:"✓"; position:absolute; left:0; color:var(--accent); font-weight:800; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:28px 26px; box-shadow:0 8px 24px rgba(180,83,9,.1); }
    .ae-card h2 { margin-top:0; font-size:18px; }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form .row { display:flex; gap:14px; } .ae-card form .row > p { flex:1; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:720px){ .ae-grid { grid-template-columns:1fr; } .ae-card form .row { flex-direction:column; gap:0; } }
  </style>
</head>
<body>
  <div class="ae-grid">
    <div class="ae-pitch">
      <div class="box">🏠</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
      <ul><li>現地調査・お見積り無料</li><li>施工実績5,000件以上</li><li>アフター保証10年</li></ul>
    </div>
    <div class="ae-card"><h2>無料見積もり依頼</h2>%%content%%</div>
  </div>
</body>
</html>
