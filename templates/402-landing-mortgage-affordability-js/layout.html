<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#1d4ed8; --ink:#101a33; --muted:#5d6b8a; --line:#dde6f5; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef3fb; line-height:1.7; }
    .ae-wrap { max-width:520px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head h1 { font-size:24px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(29,78,216,.09); }
    .ae-field { margin-bottom:18px; }
    .ae-field label { font-weight:700; font-size:14px; display:flex; justify-content:space-between; margin-bottom:8px; }
    .ae-field label .v { color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-field input[type=range] { width:100%; accent-color:var(--accent); }
    .ae-act { display:flex; gap:6px; background:#e6edfb; border-radius:10px; padding:4px; }
    .ae-act button { flex:1; border:0; background:transparent; padding:9px 4px; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; color:var(--muted); }
    .ae-act button.on { background:#fff; color:var(--accent); box-shadow:0 2px 8px rgba(29,78,216,.18); }
    .ae-out { background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; border-radius:14px; padding:24px; text-align:center; margin-top:18px; }
    .ae-out .lab { font-size:13px; opacity:.9; } .ae-out .big { font-size:40px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1.1; } .ae-out .big small { font-size:16px; } .ae-out .sub { font-size:13px; opacity:.95; margin-top:6px; }
    .ae-row2 { display:flex; gap:8px; margin-top:14px; }
    .ae-g { flex:1; background:rgba(255,255,255,.16); border-radius:10px; padding:10px 6px; }
    .ae-g .k { font-size:11px; opacity:.9; } .ae-g .n { font-weight:800; font-variant-numeric:tabular-nums; }
    .ae-note { font-size:11px; color:var(--muted); margin-top:12px; text-align:center; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-field"><label>年収 <span class="v"><span id="vInc">500</span> 万円</span></label>
        <input type="range" id="inc" min="200" max="2000" step="25" value="500"></div>
      <div class="ae-field"><label>返済期間 <span class="v"><span id="vYr">35</span> 年</span></label>
        <input type="range" id="yr" min="10" max="40" step="1" value="35"></div>
      <div class="ae-field"><label>金利（年）</label>
        <div class="ae-act" id="rate">
          <button type="button" data-r="0.7">0.7%</button>
          <button type="button" data-r="1.0" class="on">1.0%</button>
          <button type="button" data-r="1.5">1.5%</button>
          <button type="button" data-r="2.0">2.0%</button>
        </div></div>
      <div class="ae-field"><label>返済負担率</label>
        <div class="ae-act" id="burden">
          <button type="button" data-b="0.25">25%</button>
          <button type="button" data-b="0.30" class="on">30%</button>
          <button type="button" data-b="0.35">35%</button>
        </div></div>
      <div class="ae-out">
        <div class="lab">借入可能額の目安</div>
        <div class="big"><span id="loan">0</span><small> 万円</small></div>
        <div class="sub">この範囲を上限の目安に物件をお探しいただけます</div>
        <div class="ae-row2">
          <div class="ae-g"><div class="k">毎月返済額</div><div class="n"><span id="mon">0</span> 円</div></div>
          <div class="ae-g"><div class="k">年間返済額</div><div class="n"><span id="yrp">0</span> 万円</div></div>
        </div>
      </div>
      <div class="ae-note">※ 概算です。実際の借入可能額は金融機関の審査により異なります。</div>
    </div>
    <div class="ae-cta">
      <div class="t">無理のない資金計画のご相談・最新金利情報を受け取る</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var inc = document.getElementById("inc"), yr = document.getElementById("yr");
    var vInc = document.getElementById("vInc"), vYr = document.getElementById("vYr");
    var loanEl = document.getElementById("loan"), monEl = document.getElementById("mon"), yrpEl = document.getElementById("yrp");
    var rateBtns = Array.prototype.slice.call(document.querySelectorAll("#rate button"));
    var burdenBtns = Array.prototype.slice.call(document.querySelectorAll("#burden button"));
    var ratePct = 1.0, burden = 0.30;
    function calc() {
      var income = parseInt(inc.value, 10) || 0;     // 万円
      var years = parseInt(yr.value, 10) || 0;
      vInc.textContent = income; vYr.textContent = years;
      var annualPay = income * burden;               // 年間返済額(万円)
      var monthly = annualPay * 10000 / 12;          // 円
      var r = ratePct / 100 / 12;                    // 月利
      var n = years * 12;
      // 元利均等: 借入額 = 月返済 * (1-(1+r)^-n)/r
      var principal = r > 0 ? monthly * (1 - Math.pow(1 + r, -n)) / r : monthly * n;
      loanEl.textContent = Math.round(principal / 10000).toLocaleString();
      monEl.textContent = Math.round(monthly).toLocaleString();
      yrpEl.textContent = Math.round(annualPay).toLocaleString();
    }
    [inc, yr].forEach(function (el) { el.addEventListener("input", calc); });
    rateBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        rateBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); ratePct = parseFloat(b.getAttribute("data-r")); calc();
      });
    });
    burdenBtns.forEach(function (b) {
      b.addEventListener("click", function () {
        burdenBtns.forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); burden = parseFloat(b.getAttribute("data-b")); calc();
      });
    });
    calc();
  })();
  </script>
</body>
</html>
