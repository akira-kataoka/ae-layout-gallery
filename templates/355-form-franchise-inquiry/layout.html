<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#b91c1c; --ink:#2a1212; --muted:#6e5555; --line:#f0dcdc; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf4f4; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
    .ae-s { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 8px; text-align:center; box-shadow:0 6px 18px rgba(185,28,28,.05); }
    .ae-s .n { font-size:20px; font-weight:900; color:var(--accent); } .ae-s .l { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:380px){ .ae-stats { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🏪</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-stats">
      <div class="ae-s"><div class="n">320店</div><div class="l">全国展開</div></div>
      <div class="ae-s"><div class="n">92%</div><div class="l">黒字化率</div></div>
      <div class="ae-s"><div class="n">未経験OK</div><div class="l">研修制度充実</div></div>
    </div>
    <div class="ae-card">
      <div class="t">加盟資料の請求・説明会のお申し込み</div>
      %%content%%
    </div>
  </div>
</body>
</html>
