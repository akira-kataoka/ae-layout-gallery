<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#4f46e5; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f4f5fb; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-prog { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:16px; box-shadow:0 4px 14px rgba(79,70,229,.06); }
    .ae-prog .top { display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:8px; }
    .ae-prog .top b { color:var(--accent); }
    .ae-bar { height:10px; background:#eef2ff; border-radius:999px; overflow:hidden; }
    .ae-bar i { display:block; height:100%; width:60%; background:linear-gradient(90deg,#818cf8,#4f46e5); }
    .ae-head { text-align:center; margin:14px 0 16px; }
    .ae-head h1 { margin:0 0 4px; font-size:23px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:30px 28px; box-shadow:0 8px 26px rgba(79,70,229,.1); }
    .ae-card form label { font-size:13px; font-weight:600; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form .chk { display:inline-flex; gap:6px; align-items:center; margin:2px 12px 2px 0; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-prog"><div class="top"><span>プロフィール完成度</span><b>60%</b></div><div class="ae-bar"><i></i></div></div>
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
