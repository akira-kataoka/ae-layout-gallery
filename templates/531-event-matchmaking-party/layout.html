<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#db2777; --ink:#2a1320; --muted:#7c5a68; --line:#f3dce7; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf1f7; line-height:1.7; }
    .ae-wrap { max-width:580px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(135deg,#ec4899,#db2777); color:#fff; border-radius:22px; padding:38px 26px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 42px rgba(219,39,119,.28); }
    .ae-hero::after { content:"💕 ✨ 💞 ✨ 💕"; position:absolute; bottom:8px; left:0; right:0; font-size:15px; letter-spacing:6px; opacity:.25; }
    .ae-hero .badge { display:inline-block; background:rgba(255,255,255,.22); font-weight:800; font-size:11px; letter-spacing:2px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-hero h1 { font-size:26px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; box-shadow:0 6px 16px rgba(219,39,119,.06); }
    .ae-i .ic { font-size:21px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-fun { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; box-shadow:0 8px 22px rgba(219,39,119,.05); }
    .ae-fun .t { font-weight:800; font-size:14px; margin-bottom:12px; }
    .ae-f { display:flex; gap:10px; align-items:center; font-size:13px; padding:6px 0; }
    .ae-f .e { font-size:18px; flex:0 0 auto; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:800; font-size:18px; margin-bottom:4px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <span class="badge">MATCHING PARTY</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">10.25 (土) 18:00〜</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">サンプルラウンジ</div></div>
      <div class="ae-i"><div class="ic">🎫</div><div class="k">参加費</div><div class="v">男性¥4,000/女性¥1,000</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">安心して楽しめる理由</div>
      <div class="ae-f"><span class="e">🪪</span> 本人確認・独身証明の提示で安心の参加者</div>
      <div class="ae-f"><span class="e">💬</span> 全員と話せる席替えローテーション</div>
      <div class="ae-f"><span class="e">🤝</span> スタッフがさりげなくサポート</div>
      <div class="ae-f"><span class="e">📩</span> マッチング後の連絡先交換もスムーズ</div>
    </div>
    <div class="ae-card">
      <div class="t">参加お申し込み</div>
      <div class="d">定員に達し次第締め切ります。お一人での参加も大歓迎です</div>
      %%content%%
    </div>
  </div>
</body>
</html>
