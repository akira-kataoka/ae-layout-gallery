<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0c2421; --muted:#5a746f; --line:#d7ece0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fbf8; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:18px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-svc { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
    .ae-s { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 6px; text-align:center; box-shadow:0 6px 18px rgba(13,148,136,.05); }
    .ae-s .em { font-size:22px; } .ae-s .nm { font-size:10px; font-weight:700; margin-top:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:440px){ .ae-svc { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🐾</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-svc">
      <div class="ae-s"><div class="em">💉</div><div class="nm">予防接種</div></div>
      <div class="ae-s"><div class="em">🩺</div><div class="nm">健康診断</div></div>
      <div class="ae-s"><div class="em">🦷</div><div class="nm">歯科ケア</div></div>
      <div class="ae-s"><div class="em">✂️</div><div class="nm">去勢・避妊</div></div>
    </div>
    <div class="ae-card">
      <div class="t">診察のご予約</div>
      %%content%%
    </div>
  </div>
</body>
</html>
