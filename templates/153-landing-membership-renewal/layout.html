<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0faf8; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:52px 20px; text-align:center; }
    .ae-emoji { font-size:48px; }
    .ae-wrap h1 { font-size:25px; margin:8px 0; }
    .ae-wrap > p { color:var(--muted); margin:0 0 18px; }
    .ae-expiry { display:inline-flex; align-items:center; gap:8px; background:#fff7ed; border:1px solid #fed7aa; color:#c2410c; padding:8px 16px; border-radius:999px; font-size:14px; font-weight:700; margin-bottom:18px; }
    .ae-perks { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; text-align:left; margin-bottom:18px; }
    .ae-perks li { margin:5px 0; font-size:14px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:10px; font-weight:800; font-size:16px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-emoji">🔔</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-expiry">⏳ 有効期限：2026年7月31日</div>
    <ul class="ae-perks">
      <li>✅ 継続で<b>10%OFF</b>の更新特典</li>
      <li>✅ ポイント・ランクをそのまま引き継ぎ</li>
      <li>✅ 会員限定セールへの優先案内</li>
    </ul>
    <div class="ae-card"><div class="t">いますぐ更新手続き</div>%%content%%</div>
  </div>
</body>
</html>
