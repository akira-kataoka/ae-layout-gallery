<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#d97706; --ink:#2a1c0a; --muted:#7c6a52; --line:#f0e4d2; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf8f0; line-height:1.7; }
    .ae-wrap { max-width:480px; margin:0 auto; padding:54px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .ic { width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg,#fbbf24,#d97706); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 16px; box-shadow:0 14px 32px rgba(217,119,6,.26); }
    .ae-head h1 { font-size:23px; margin:0 0 6px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-alert { background:#fffbeb; border:1px solid #fde68a; border-radius:14px; padding:16px 18px; margin-bottom:18px; display:flex; gap:11px; align-items:flex-start; }
    .ae-alert .e { font-size:20px; flex:0 0 auto; } .ae-alert .x { font-size:13.5px; color:#92400e; }
    .ae-cardbox { background:#fff; border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-bottom:18px; display:flex; align-items:center; gap:14px; box-shadow:0 8px 22px rgba(217,119,6,.06); }
    .ae-cardbox .vi { width:54px; height:36px; border-radius:7px; background:linear-gradient(135deg,#475569,#1e293b); flex:0 0 auto; position:relative; }
    .ae-cardbox .vi::after { content:""; position:absolute; left:7px; top:9px; width:16px; height:11px; border-radius:3px; background:linear-gradient(135deg,#f3d27a,#d4a13a); }
    .ae-cardbox .no { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:14px; } .ae-cardbox .ex { font-size:12px; color:#b45309; font-weight:700; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; margin-bottom:4px; text-align:center; } .ae-card .s { font-size:13px; color:var(--muted); margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    .ae-foot { font-size:12px; color:var(--muted); text-align:center; margin-top:14px; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="ic">💳</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-alert">
      <span class="e">⚠️</span>
      <span class="x">ご登録のお支払い方法がまもなく有効期限を迎えます。更新いただけない場合、次回のお引き落としができずサービスが停止する可能性があります。</span>
    </div>
    <div class="ae-cardbox">
      <div class="vi"></div>
      <div>
        <div class="no">•••• •••• •••• 1234</div>
        <div class="ex">有効期限 07/26 — まもなく失効</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">お支払い方法を更新する</div>
      <div class="s">数分で完了します。サービスを止めずにご利用いただけます。</div>
      %%content%%
      <div class="ae-foot">🔒 カード情報は暗号化され安全に処理されます</div>
    </div>
  </div>
</body>
</html>
