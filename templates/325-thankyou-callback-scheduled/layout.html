<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0891b2; --ink:#0c2228; --muted:#5a747c; --line:#d6eaee; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eefbfd; line-height:1.7; }
    .ae-wrap { max-width:500px; margin:0 auto; padding:54px 20px; }
    .ae-done { text-align:center; margin-bottom:22px; }
    .ae-done .chk { width:66px; height:66px; border-radius:50%; background:#16a34a; color:#fff; display:flex; align-items:center; justify-content:center; font-size:32px; margin:0 auto 12px; }
    .ae-done h1 { font-size:23px; margin:0 0 4px; }
    .ae-done p { color:var(--muted); margin:0; font-size:14px; }
    .ae-slot { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; margin-bottom:18px; box-shadow:0 8px 26px rgba(8,145,178,.07); text-align:center; }
    .ae-slot .ic { font-size:34px; }
    .ae-slot .when { font-size:22px; font-weight:900; color:var(--accent); margin:6px 0 2px; }
    .ae-slot .num { font-size:13px; color:var(--muted); }
    .ae-prep { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:22px; }
    .ae-prep .t { font-weight:700; font-size:13px; margin-bottom:8px; }
    .ae-prep li { font-size:13px; color:#33514c; margin-bottom:4px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
    .ae-card .t { font-weight:700; margin-bottom:12px; }
    .ae-card form input[type=text],.ae-card form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-done">
      <div class="chk">✓</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-slot">
      <div class="ic">📞</div>
      <div class="when">6月13日(土) 14:00頃</div>
      <div class="num">担当よりこのお電話番号にご連絡します：090-0000-0000</div>
    </div>
    <div class="ae-prep">
      <div class="t">スムーズなご案内のために</div>
      <ul>
        <li>静かな場所でお電話をお受けください</li>
        <li>ご相談内容をメモしておくと安心です</li>
        <li>番号は「0800」から始まる場合があります</li>
      </ul>
    </div>
    <div class="ae-card">
      <div class="t">日程変更・リマインドが必要な方へ</div>
      %%content%%
    </div>
  </div>
</body>
</html>
