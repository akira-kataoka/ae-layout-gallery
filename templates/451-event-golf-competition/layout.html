<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#15803d; --gold:#ca8a04; --ink:#0e2417; --muted:#52715f; --line:#d3e7d8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef7f0; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(150deg,#166534,#15803d 60%,#3f6212); color:#fff; border-radius:20px; padding:34px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 40px rgba(21,128,61,.24); }
    .ae-hero .em { font-size:44px; margin-bottom:2px; }
    .ae-hero .badge { display:inline-block; border:1px solid rgba(255,255,255,.5); color:#fff; font-weight:700; font-size:11px; letter-spacing:2px; padding:5px 14px; border-radius:999px; margin-bottom:10px; }
    .ae-hero h1 { font-size:27px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:22px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; }
    .ae-prize { background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-prize .t { font-weight:700; font-size:14px; margin-bottom:12px; }
    .ae-p { display:flex; gap:12px; align-items:center; padding:9px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-p:first-of-type { border-top:0; } .ae-p .rk { font-weight:800; color:var(--gold); min-width:48px; }
    .ae-card { background:#fff; border:2px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">⛳</div>
      <span class="badge">CHARITY GOLF CUP</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">10.18 (土) 8:00 集合</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">サンプルCC 東コース</div></div>
      <div class="ae-i"><div class="ic">⛳</div><div class="k">方式</div><div class="v">新ペリア・18H</div></div>
    </div>
    <div class="ae-prize">
      <div class="t">賞品・特典</div>
      <div class="ae-p"><span class="rk">優勝</span><span>旅行ギフト券＆トロフィー</span></div>
      <div class="ae-p"><span class="rk">準優勝</span><span>ゴルフ用品セット</span></div>
      <div class="ae-p"><span class="rk">ニアピン<br>ドラコン</span><span>各賞・飛び賞を多数ご用意</span></div>
    </div>
    <div class="ae-card">
      <div class="t">参加お申し込み</div>
      <div class="d">組数に限りがあります。お早めにエントリーください</div>
      %%content%%
    </div>
  </div>
</body>
</html>
