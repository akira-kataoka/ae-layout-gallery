<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fdfa; line-height:1.7; }
    .ae-wrap { max-width:640px; margin:0 auto; padding:52px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head h1 { margin:0 0 6px; font-size:23px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:32px 28px; box-shadow:0 8px 26px rgba(13,148,136,.10); }
    .ae-scale { display:flex; gap:6px; flex-wrap:wrap; justify-content:space-between; margin:6px 0 6px; }
    .ae-scale label { flex:1; min-width:34px; }
    .ae-scale label input { position:absolute; opacity:0; }
    .ae-scale label span { display:block; text-align:center; padding:10px 0; border:1px solid var(--line); border-radius:9px; cursor:pointer; font-weight:700; font-size:14px; }
    .ae-scale label input:checked + span { background:var(--accent); color:#fff; border-color:var(--accent); }
    .ae-ends { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:18px; }
    .ae-card form textarea { width:100%; padding:12px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 14px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:700; font-size:15px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">%%content%%</div>
  </div>
</body>
</html>
