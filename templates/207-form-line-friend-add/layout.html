<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#06c755; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fdf4; line-height:1.7; }
    .ae-wrap { max-width:460px; margin:0 auto; padding:54px 20px; text-align:center; }
    .ae-ic { width:72px; height:72px; margin:0 auto 12px; border-radius:18px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; }
    .ae-wrap h1 { font-size:24px; margin:6px 0; }
    .ae-wrap > p { color:var(--muted); margin:0 0 18px; }
    .ae-qr { width:140px; height:140px; margin:0 auto 14px; border-radius:14px; background:repeating-linear-gradient(45deg,#06351a 0 7px,#fff 7px 14px); border:6px solid #fff; box-shadow:0 0 0 1px var(--line); }
    .ae-addbtn { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#fff; text-decoration:none; padding:14px 28px; border-radius:12px; font-weight:800; margin-bottom:20px; }
    .ae-perks { display:flex; gap:14px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; font-size:13px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-ic">💬</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-qr"></div>
    <a class="ae-addbtn" href="#">＋ 友だち追加</a>
    <div class="ae-perks"><span>🎁 友だち限定クーポン</span><span>📣 最新情報をいち早く</span></div>
    <div class="ae-card"><div class="t">メールでもお知らせを受け取る</div>%%content%%</div>
  </div>
</body>
</html>
