<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f3faf9; line-height:1.7; }
    .ae-head { text-align:center; padding:48px 20px 8px; }
    .ae-head h1 { font-size:28px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-team { max-width:880px; margin:24px auto; padding:0 20px; display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    .ae-m { background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; text-align:center; box-shadow:0 4px 14px rgba(13,148,136,.06); }
    .ae-m .av { width:64px; height:64px; border-radius:50%; margin:0 auto 8px; background:linear-gradient(135deg,#5eead4,#0d9488); display:flex; align-items:center; justify-content:center; font-size:28px; color:#fff; }
    .ae-m .nm { font-weight:700; font-size:14px; }
    .ae-m .ro { color:var(--muted); font-size:12px; }
    .ae-card { max-width:520px; margin:20px auto 56px; padding:0 20px; }
    .ae-card .inner { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; text-align:center; box-shadow:0 8px 24px rgba(13,148,136,.08); }
    .ae-card .t { font-weight:700; margin-bottom:10px; }
    .ae-card form input[type=email],.ae-card form input[type=text] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:720px){ .ae-team { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
  <header class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></header>
  <section class="ae-team">
    <div class="ae-m"><div class="av">👨‍💼</div><div class="nm">青木 健太</div><div class="ro">CEO</div></div>
    <div class="ae-m"><div class="av">👩‍💻</div><div class="nm">佐藤 美咲</div><div class="ro">CTO</div></div>
    <div class="ae-m"><div class="av">🧑‍🎨</div><div class="nm">田中 涼</div><div class="ro">デザイナー</div></div>
    <div class="ae-m"><div class="av">👩‍🔬</div><div class="nm">川口 葵</div><div class="ro">データ分析</div></div>
  </section>
  <div class="ae-card"><div class="inner"><div class="t">わたしたちと話してみませんか？</div>%%content%%</div></div>
</body>
</html>
