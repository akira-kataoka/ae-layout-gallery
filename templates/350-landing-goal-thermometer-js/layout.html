<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#e11d48; --ink:#2a0f1a; --muted:#6b5560; --line:#f3dce0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff1f4; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 32px rgba(225,29,72,.08); display:flex; gap:24px; align-items:stretch; }
    .ae-thermo { width:54px; flex:0 0 auto; position:relative; display:flex; flex-direction:column; align-items:center; }
    .ae-tube { width:26px; flex:1; background:#fde2e6; border-radius:999px; position:relative; overflow:hidden; }
    .ae-fill { position:absolute; left:0; right:0; bottom:0; height:0; background:linear-gradient(0deg,#e11d48,#fb7185); border-radius:999px; transition:height 1.1s cubic-bezier(.2,.7,.2,1); }
    .ae-bulb { width:42px; height:42px; border-radius:50%; background:#e11d48; margin-top:-8px; }
    .ae-side { flex:1; }
    .ae-cur { font-size:34px; font-weight:900; color:var(--accent); font-variant-numeric:tabular-nums; line-height:1.1; }
    .ae-goal { font-size:13px; color:var(--muted); margin-bottom:4px; }
    .ae-pct { font-size:13px; font-weight:700; margin-bottom:16px; }
    .ae-stats { display:flex; gap:14px; margin-bottom:16px; }
    .ae-stats .s .n { font-weight:800; font-variant-numeric:tabular-nums; } .ae-stats .s .l { font-size:11px; color:var(--muted); }
    .ae-presets { display:flex; gap:8px; }
    .ae-presets button { flex:1; border:2px solid var(--line); background:#fff; border-radius:10px; padding:10px 4px; font-weight:800; font-size:13px; cursor:pointer; font-family:inherit; }
    .ae-presets button.sel { border-color:var(--accent); background:#fff1f4; color:var(--accent); }
    .ae-proj { font-size:12px; color:var(--accent); margin-top:10px; min-height:18px; font-weight:700; }
    .ae-cta { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; margin-top:18px; }
    .ae-cta .t { font-weight:700; margin-bottom:12px; }
    .ae-cta form input[type=text],.ae-cta form input[type=email] { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-cta form p { margin:0 0 12px; text-align:left; }
    .ae-cta form .submit input,.ae-cta form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head"><h1>%%title%%</h1><p>%%description%%</p></div>
    <div class="ae-card">
      <div class="ae-thermo">
        <div class="ae-tube"><div class="ae-fill" id="fill"></div></div>
        <div class="ae-bulb"></div>
      </div>
      <div class="ae-side">
        <div class="ae-goal">目標 ¥1,000,000</div>
        <div class="ae-cur">¥<span id="cur">0</span></div>
        <div class="ae-pct"><span id="pct">0</span>% 達成</div>
        <div class="ae-stats">
          <div class="s"><div class="n" id="backers">0</div><div class="l">支援者</div></div>
          <div class="s"><div class="n">残り12日</div><div class="l">募集期間</div></div>
        </div>
        <div class="ae-presets" id="presets">
          <button type="button" data-amt="1000">¥1,000</button>
          <button type="button" data-amt="3000" class="sel">¥3,000</button>
          <button type="button" data-amt="5000">¥5,000</button>
        </div>
        <div class="ae-proj" id="proj"></div>
      </div>
    </div>
    <div class="ae-cta">
      <div class="t">このプロジェクトを支援する</div>
      %%content%%
    </div>
  </div>

  <script>
  (function () {
    var GOAL = 1000000, RAISED = 742000, BACKERS = 318;
    var fill = document.getElementById("fill"), curEl = document.getElementById("cur"), pctEl = document.getElementById("pct"), backersEl = document.getElementById("backers");
    var presets = Array.prototype.slice.call(document.querySelectorAll("#presets button"));
    var projEl = document.getElementById("proj");
    var amt = 3000;
    function setFill(value) {
      var p = Math.min(value / GOAL * 100, 100);
      fill.style.height = p + "%";
    }
    function proj() {
      var after = Math.min(RAISED + amt, GOAL);
      var p = Math.round(after / GOAL * 100);
      projEl.textContent = "あなたの ¥" + amt.toLocaleString("ja-JP") + " で " + p + "% に！";
    }
    // カウントアップ表示
    var start = null;
    function step(ts) {
      if (start === null) start = ts;
      var t = Math.min((ts - start) / 1200, 1);
      var eased = 1 - Math.pow(1 - t, 3);
      curEl.textContent = Math.round(RAISED * eased).toLocaleString("ja-JP");
      pctEl.textContent = Math.round(RAISED / GOAL * 100 * eased);
      backersEl.textContent = Math.round(BACKERS * eased);
      if (t < 1) window.requestAnimationFrame(step);
    }
    presets.forEach(function (b) {
      b.addEventListener("click", function () {
        presets.forEach(function (x) { x.classList.remove("sel"); });
        b.classList.add("sel");
        amt = parseInt(b.getAttribute("data-amt"), 10) || 0;
        proj();
      });
    });
    window.requestAnimationFrame(step);
    setFill(RAISED);
    proj();
  })();
  </script>
</body>
</html>
