<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#c2410c; --gold:#d4a13a; --ink:#f6ece0; --muted:#cbb491; --line:#3a2a1c; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#1a1108; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:46px 20px; }
    .ae-hero { background:linear-gradient(160deg,#7c2d12,#9a3412 45%,#b45309); border:1px solid var(--line); border-radius:20px; padding:36px 24px; text-align:center; position:relative; overflow:hidden; box-shadow:0 18px 44px rgba(124,45,18,.4); }
    .ae-hero::after { content:"🍁 🍂 🍁 🍂 🍁 🍂 🍁 🍂 🍁 🍂"; position:absolute; bottom:10px; left:0; right:0; font-size:14px; letter-spacing:4px; opacity:.5; }
    .ae-hero .em { font-size:46px; margin-bottom:2px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; color:#fff; text-shadow:0 2px 14px rgba(0,0,0,.3); }
    .ae-hero p { margin:0; color:#fbe8d2; font-size:14px; opacity:.95; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:22px 0; }
    .ae-i { background:#241710; border:1px solid var(--line); border-radius:14px; padding:15px 10px; text-align:center; }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-fun { background:#241710; border:1px solid var(--line); border-radius:16px; padding:20px 22px; margin-bottom:22px; }
    .ae-fun .t { font-weight:700; font-size:14px; margin-bottom:12px; color:#fff; }
    .ae-fun .g { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .ae-f { display:flex; gap:9px; align-items:center; font-size:13px; }
    .ae-f .e { font-size:18px; }
    .ae-card { background:#241710; border:1px solid var(--gold); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:18px; margin-bottom:4px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:16px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#1a1108; color:#f6ece0; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } .ae-fun .g { grid-template-columns:1fr; } .ae-hero h1 { font-size:23px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-hero">
      <div class="em">🍁</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">期間</div><div class="v">11.1〜11.30 日没〜21:00</div></div>
      <div class="ae-i"><div class="ic">📍</div><div class="k">会場</div><div class="v">もみじ庭園</div></div>
      <div class="ae-i"><div class="ic">🎟️</div><div class="k">夜間特別拝観</div><div class="v">大人 ¥800</div></div>
    </div>
    <div class="ae-fun">
      <div class="t">紅葉ライトアップのみどころ</div>
      <div class="g">
        <div class="ae-f"><span class="e">🍁</span> 池に映る逆さもみじの幻想</div>
        <div class="ae-f"><span class="e">🏮</span> 参道の行灯と竹灯り</div>
        <div class="ae-f"><span class="e">🍵</span> 期間限定の茶席・甘味</div>
        <div class="ae-f"><span class="e">📸</span> ライトアップ撮影スポット</div>
      </div>
    </div>
    <div class="ae-card">
      <div class="t">来場予約・色づき情報の登録</div>
      <div class="d">見頃の色づき状況やライトアップ点灯日をお届けします</div>
      %%content%%
    </div>
  </div>
</body>
</html>
