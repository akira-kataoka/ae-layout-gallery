<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#7c3aed; --ink:#1f1533; --muted:#6b7280; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f3ff; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:64px 20px; text-align:center; }
    .ae-card { background:#fff; border-radius:18px; box-shadow:0 12px 34px rgba(124,58,237,.14); padding:42px 34px; }
    .ae-emoji { font-size:48px; }
    .ae-card h1 { margin:8px 0 8px; font-size:24px; }
    .ae-card > p { color:var(--muted); }
    .ae-coupon { margin:22px 0 8px; border:2px dashed var(--accent); border-radius:14px; padding:20px; background:linear-gradient(135deg,#faf5ff,#f3e8ff); position:relative; }
    .ae-coupon .lbl { font-size:12px; color:var(--accent); font-weight:700; letter-spacing:.1em; }
    .ae-coupon .code { font-size:30px; font-weight:800; letter-spacing:.15em; color:var(--ink); margin:6px 0; }
    .ae-coupon .exp { font-size:12px; color:var(--muted); }
    .ae-btn { display:inline-block; margin-top:18px; background:var(--accent); color:#fff; text-decoration:none; padding:14px 32px; border-radius:10px; font-weight:700; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-card">
      <div class="ae-emoji">🎉</div>
      %%content%%
      <div class="ae-coupon">
        <div class="lbl">COUPON CODE</div>
        <div class="code">WELCOME15</div>
        <div class="exp">有効期限: ご登録から30日間</div>
      </div>
      <a class="ae-btn" href="%%account-website%%">今すぐ使う</a>
    </div>
  </div>
</body>
</html>
