<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0d9488; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f0fbfa; line-height:1.7; }
    .ae-wrap { max-width:580px; margin:0 auto; padding:54px 20px; text-align:center; }
    .ae-emoji { font-size:50px; }
    .ae-wrap h1 { font-size:26px; margin:8px 0; }
    .ae-wrap > p { color:var(--muted); max-width:460px; margin:0 auto 22px; }
    .ae-offer { background:linear-gradient(135deg,#0d9488,#0891b2); color:#fff; border-radius:18px; padding:26px; margin-bottom:14px; box-shadow:0 14px 36px rgba(13,148,136,.28); }
    .ae-offer .big { font-size:34px; font-weight:900; } .ae-offer .sm { opacity:.95; }
    .ae-keep { display:inline-block; background:#fff; color:var(--accent); border:2px solid var(--accent); text-decoration:none; padding:14px 30px; border-radius:10px; font-weight:800; margin-bottom:18px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; margin-bottom:10px; font-size:14px; }
    .ae-card form fieldset { border:0; padding:0; margin:0; text-align:left; }
    .ae-card form label { display:flex; gap:8px; align-items:center; padding:8px 0; font-size:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form select,.ae-card form textarea { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; }
    .ae-card form p { margin:10px 0 0; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--muted); color:#fff; border:0; padding:12px; border-radius:8px; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-emoji">🙏</div>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
    <div class="ae-offer"><div class="big">3ヶ月 50%OFF</div><div class="sm">継続いただける方への特別プラン</div></div>
    <a class="ae-keep" href="#">このオファーで続ける</a>
    <div class="ae-card"><div class="t">それでも解約する場合は理由をお聞かせください</div>%%content%%</div>
  </div>
</body>
</html>
