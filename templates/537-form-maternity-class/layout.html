<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#e8799f; --ink:#33222a; --muted:#86717a; --line:#f6e2ea; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf4f7; line-height:1.7; }
    .ae-wrap { max-width:560px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:22px; }
    .ae-head .badge { display:inline-block; background:#fbe1ea; color:#c75d83; font-weight:800; font-size:12px; padding:5px 14px; border-radius:999px; margin-bottom:12px; }
    .ae-head h1 { font-size:25px; margin:0 0 8px; }
    .ae-head p { color:var(--muted); margin:0; font-size:14px; }
    .ae-pts { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px; }
    .ae-pt { background:#fff; border:1px solid var(--line); border-radius:13px; padding:15px 8px; text-align:center; box-shadow:0 6px 16px rgba(232,121,159,.07); }
    .ae-pt .ic { font-size:23px; } .ae-pt .k { font-size:12px; font-weight:700; margin-top:4px; } .ae-pt .d { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; box-shadow:0 12px 30px rgba(232,121,159,.09); }
    .ae-card .t { font-weight:800; font-size:17px; margin-bottom:4px; }
    .ae-card .s { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; margin-top:4px; }
    .ae-note { color:var(--muted); font-size:12px; text-align:center; margin-top:14px; }
    @media (max-width:440px){ .ae-pts { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <span class="badge">参加無料・助産師がサポート</span>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-pts">
      <div class="ae-pt"><div class="ic">🤰</div><div class="k">沐浴・抱っこ体験</div><div class="d">人形で練習</div></div>
      <div class="ae-pt"><div class="ic">👶</div><div class="k">産後の生活</div><div class="d">不安を解消</div></div>
      <div class="ae-pt"><div class="ic">👫</div><div class="k">パートナーと</div><div class="d">一緒に学ぶ</div></div>
    </div>
    <div class="ae-card">
      <div class="t">両親学級のお申し込み</div>
      <div class="s">ご希望の開催日・出産予定月をお選びください。おひとりでの参加も歓迎です。</div>
      %%content%%
      <div class="ae-note">🌸 動きやすい服装でお越しください。母子手帳をお持ちの方はご持参ください</div>
    </div>
  </div>
</body>
</html>
