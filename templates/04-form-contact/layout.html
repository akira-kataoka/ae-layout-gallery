<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0b5cab; --ink:#16202b; --muted:#5b6b7b; --line:#dde3ea; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#f5f7fa; line-height:1.7; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:48px 20px 64px; }
    .ae-head { text-align:center; margin-bottom:24px; }
    .ae-head h1 { margin:0 0 8px; font-size:26px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-card { background:#fff; border-radius:14px; box-shadow:0 6px 24px rgba(22,32,43,.08); padding:36px 32px; }
    .ae-card form input[type=text],
    .ae-card form input[type=email],
    .ae-card form input[type=tel],
    .ae-card form select,
    .ae-card form textarea { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
    .ae-card form textarea { min-height:120px; }
    .ae-card form label { font-weight:600; font-size:14px; }
    .ae-card form .submit input,
    .ae-card form button { background:var(--accent); color:#fff; border:0; padding:14px 24px; border-radius:8px; font-size:15px; cursor:pointer; width:100%; }
    .ae-card form p { margin:0 0 16px; }
    .ae-note { text-align:center; color:var(--muted); font-size:12px; margin-top:20px; }
    @media (max-width:560px){ .ae-card { padding:28px 20px; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-card">
      %%content%%
    </div>
    <p class="ae-note">ご入力いただいた情報はプライバシーポリシーに基づき適切に管理します。</p>
  </div>
</body>
</html>
