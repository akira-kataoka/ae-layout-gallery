<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#22d3ee; --ink:#e2e8f0; --muted:#94a3b8; --line:#1e293b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#0a0f1d; line-height:1.7; }
    .ae-hero { background:radial-gradient(circle at 70% 10%,#0e7490,#0a0f1d 60%); text-align:center; padding:56px 20px 46px; }
    .ae-hero .badge { display:inline-block; border:1px solid var(--accent); color:var(--accent); font-weight:700; font-size:12px; letter-spacing:3px; padding:6px 16px; border-radius:999px; margin-bottom:14px; }
    .ae-hero h1 { font-size:30px; margin:0 0 8px; color:#fff; font-family:"Courier New",monospace; }
    .ae-hero p { margin:0; color:var(--muted); font-size:14px; }
    .ae-wrap { max-width:640px; margin:0 auto; padding:36px 20px 48px; }
    .ae-info { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .ae-i { background:#0f1a2e; border:1px solid var(--line); border-radius:14px; padding:14px; text-align:center; }
    .ae-i .ic { font-size:20px; } .ae-i .k { font-size:11px; color:var(--muted); } .ae-i .v { font-weight:800; font-size:13px; color:#fff; }
    .ae-prizes { background:#0f1a2e; border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:24px; }
    .ae-prizes .t { font-weight:700; text-align:center; margin-bottom:12px; color:#fff; }
    .ae-pz { display:flex; align-items:center; gap:12px; padding:8px 0; border-top:1px dashed var(--line); font-size:14px; }
    .ae-pz:first-of-type { border-top:0; }
    .ae-pz .em { font-size:22px; } .ae-pz .amt { margin-left:auto; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; }
    .ae-card { background:#0f1a2e; border:1px solid var(--accent); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:6px; text-align:center; color:#fff; }
    .ae-card .d { color:var(--muted); font-size:13px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; background:#0a0f1d; color:#e2e8f0; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:linear-gradient(135deg,#22d3ee,#0891b2); color:#04202a; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
    @media (max-width:480px){ .ae-info { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">HACKATHON 2026</span>
    <h1>&lt;/build the future&gt;</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-i"><div class="ic">📅</div><div class="k">開催</div><div class="v">11.21–11.23（48h）</div></div>
      <div class="ae-i"><div class="ic">🌐</div><div class="k">形式</div><div class="v">オンライン＋現地</div></div>
      <div class="ae-i"><div class="ic">👥</div><div class="k">チーム</div><div class="v">1〜4名</div></div>
    </div>
    <div class="ae-prizes">
      <div class="t">🏆 賞金・賞品</div>
      <div class="ae-pz"><span class="em">🥇</span><span>最優秀賞</span><span class="amt">¥1,000,000</span></div>
      <div class="ae-pz"><span class="em">🥈</span><span>優秀賞</span><span class="amt">¥300,000</span></div>
      <div class="ae-pz"><span class="em">⭐</span><span>スポンサー賞</span><span class="amt">各¥100,000</span></div>
    </div>
    <div class="ae-card">
      <div class="t">参加エントリー</div>
      <div class="d">個人参加もOK・当日チームビルディングあり</div>
      %%content%%
    </div>
  </div>
</body>
</html>
