<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#c2410c; --ink:#2a1810; --muted:#6e5b4c; --line:#f0e3d6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fff8f2; line-height:1.7; }
    .ae-wrap { max-width:620px; margin:0 auto; padding:48px 20px; }
    .ae-head { text-align:center; margin-bottom:20px; }
    .ae-head .emo { font-size:42px; }
    .ae-head h1 { font-size:24px; margin:4px 0 8px; }
    .ae-head p { color:var(--muted); margin:0; }
    .ae-menus { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
    .ae-menu { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 10px; text-align:center; box-shadow:0 6px 18px rgba(194,65,12,.05); }
    .ae-menu .em { font-size:28px; } .ae-menu .nm { font-weight:800; font-size:13px; margin-top:4px; } .ae-menu .pr { color:var(--accent); font-weight:900; font-size:13px; } .ae-menu .de { font-size:11px; color:var(--muted); }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:24px; }
    .ae-card .t { font-weight:700; font-size:16px; margin-bottom:14px; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form input[type=tel],.ae-card form input[type=date],.ae-card form input[type=number],.ae-card form select,.ae-card form textarea { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; font-family:inherit; }
    .ae-card form label { font-weight:700; font-size:13px; }
    .ae-card form p { margin:0 0 13px; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:15px; border-radius:9px; font-weight:800; font-size:15px; cursor:pointer; }
    @media (max-width:480px){ .ae-menus { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="ae-wrap">
    <div class="ae-head">
      <div class="emo">🍱</div>
      <h1>%%title%%</h1>
      <p>%%description%%</p>
    </div>
    <div class="ae-menus">
      <div class="ae-menu"><div class="em">🥗</div><div class="nm">スタンダード</div><div class="pr">¥1,500/人</div><div class="de">全8品・ドリンク付</div></div>
      <div class="ae-menu"><div class="em">🍣</div><div class="nm">プレミアム</div><div class="pr">¥2,800/人</div><div class="de">全12品・寿司含む</div></div>
      <div class="ae-menu"><div class="em">🌱</div><div class="nm">ヘルシー</div><div class="pr">¥1,800/人</div><div class="de">野菜中心・低糖質</div></div>
    </div>
    <div class="ae-card">
      <div class="t">ご注文内容の入力</div>
      %%content%%
    </div>
  </div>
</body>
</html>
