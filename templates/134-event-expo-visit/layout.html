<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#0284c7; --ink:#0f1b2a; --muted:#5b6b7b; --line:#dbe6f0; --dark:#0a2540; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#eef4fa; line-height:1.7; }
    .ae-hero { background:var(--dark); color:#fff; padding:50px 20px; text-align:center; }
    .ae-hero .badge { display:inline-block; background:var(--accent); padding:5px 14px; border-radius:999px; font-size:13px; font-weight:700; }
    .ae-hero h1 { font-size:28px; margin:12px 0 4px; }
    .ae-hero .meta { opacity:.88; font-size:14px; }
    .ae-bar { max-width:840px; margin:-22px auto 0; padding:0 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .ae-bar div { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; text-align:center; box-shadow:0 6px 18px rgba(2,132,199,.08); }
    .ae-bar .lbl { font-size:12px; color:var(--muted); } .ae-bar .val { font-weight:800; margin-top:3px; }
    .ae-grid { max-width:840px; margin:30px auto; padding:0 20px 56px; display:grid; grid-template-columns:1.2fr .8fr; gap:30px; align-items:start; }
    .ae-detail h2 { margin-top:0; }
    .ae-apply { background:#fff; border-radius:16px; box-shadow:0 8px 24px rgba(2,132,199,.1); padding:26px 24px; position:sticky; top:20px; border-top:4px solid var(--accent); }
    .ae-apply h3 { margin-top:0; color:var(--accent); }
    .ae-apply form input[type=text],.ae-apply form input[type=email],.ae-apply form select { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; }
    .ae-apply form p { margin:0 0 13px; }
    .ae-apply form .submit input,.ae-apply form button { width:100%; background:var(--accent); color:#fff; border:0; padding:13px; border-radius:8px; font-weight:700; cursor:pointer; }
    @media (max-width:760px){ .ae-bar { grid-template-columns:1fr; } .ae-grid { grid-template-columns:1fr; } .ae-apply { position:static; } }
  </style>
</head>
<body>
  <header class="ae-hero"><span class="badge">来場登録・入場無料</span><h1>%%title%%</h1><div class="meta">%%description%%</div></header>
  <section class="ae-bar">
    <div><div class="lbl">会期</div><div class="val">7/22 - 7/24</div></div>
    <div><div class="lbl">会場</div><div class="val">サンプル国際展示場</div></div>
    <div><div class="lbl">出展社数</div><div class="val">300社</div></div>
  </section>
  <div class="ae-grid">
    <article class="ae-detail">%%content%%</article>
    <aside class="ae-apply"><h3>来場事前登録</h3><p style="color:var(--muted);font-size:14px;margin-top:0;">登録証をメールでお送りします。当日受付がスムーズです。</p></aside>
  </div>
</body>
</html>
