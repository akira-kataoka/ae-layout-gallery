<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root { --accent:#9f1239; --ink:#2a0f1a; --muted:#7a5560; --line:#f0dde3; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); background:#fdf3f5; line-height:1.7; }
    .ae-hero { background:linear-gradient(135deg,#881337,#9f1239); color:#fff; text-align:center; padding:54px 20px 42px; }
    .ae-hero .badge { display:inline-block; border:1px solid rgba(255,255,255,.5); font-weight:700; font-size:12px; letter-spacing:3px; padding:6px 16px; border-radius:999px; margin-bottom:14px; }
    .ae-hero h1 { font-size:28px; margin:0 0 8px; }
    .ae-hero p { margin:0; opacity:.95; font-size:14px; }
    .ae-wrap { max-width:600px; margin:0 auto; padding:38px 20px 48px; }
    .ae-menu { background:#fff; border:1px solid var(--line); border-radius:16px; padding:22px; margin-bottom:24px; box-shadow:0 8px 24px rgba(159,18,57,.07); }
    .ae-menu .t { font-weight:700; text-align:center; margin-bottom:12px; color:var(--accent); letter-spacing:1px; }
    .ae-m { display:flex; align-items:center; gap:12px; padding:10px 0; border-top:1px dashed var(--line); }
    .ae-m:first-of-type { border-top:0; }
    .ae-m .em { font-size:24px; } .ae-m .nm { font-weight:700; font-size:14px; } .ae-m .de { font-size:12px; color:var(--muted); }
    .ae-info { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
    .ae-chip { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 18px; text-align:center; min-width:130px; }
    .ae-chip .k { font-size:11px; color:var(--muted); } .ae-chip .v { font-weight:800; font-size:14px; }
    .ae-card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:26px; }
    .ae-card .t { font-weight:700; font-size:17px; margin-bottom:14px; text-align:center; }
    .ae-card form input[type=text],.ae-card form input[type=email],.ae-card form select { width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:9px; font-size:14px; }
    .ae-card form p { margin:0 0 12px; text-align:left; }
    .ae-card form .submit input,.ae-card form button { width:100%; background:var(--accent); color:#fff; border:0; padding:14px; border-radius:9px; font-weight:800; cursor:pointer; }
  </style>
</head>
<body>
  <div class="ae-hero">
    <span class="badge">TASTING EVENT</span>
    <h1>%%title%%</h1>
    <p>%%description%%</p>
  </div>
  <div class="ae-wrap">
    <div class="ae-info">
      <div class="ae-chip"><div class="k">開催日</div><div class="v">11.08 (土) 15:00〜</div></div>
      <div class="ae-chip"><div class="k">会場</div><div class="v">ワイナリー直営店</div></div>
      <div class="ae-chip"><div class="k">参加費</div><div class="v">3,000円</div></div>
    </div>
    <div class="ae-menu">
      <div class="t">― 当日のラインナップ ―</div>
      <div class="ae-m"><span class="em">🍷</span><div><div class="nm">数量限定の赤ワイン3種</div><div class="de">ソムリエの解説付きで飲み比べ</div></div></div>
      <div class="ae-m"><span class="em">🧀</span><div><div class="nm">ペアリングチーズプレート</div><div class="de">各ワインに合わせた厳選チーズ</div></div></div>
      <div class="ae-m"><span class="em">🎁</span><div><div class="nm">お気に入りボトルの特別価格</div><div class="de">当日購入で10%OFF＆お持ち帰り</div></div></div>
    </div>
    <div class="ae-card">
      <div class="t">試飲会に申し込む（定員20名）</div>
      %%content%%
    </div>
  </div>
</body>
</html>
