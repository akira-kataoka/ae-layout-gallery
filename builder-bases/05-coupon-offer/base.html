<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%title%%</title>
  <style>
    :root {
      --accent:#d97706;
      --accent-deep: color-mix(in srgb, var(--accent) 68%, #000);
      --accent-dark: color-mix(in srgb, var(--accent) 84%, #000);
      --accent-soft: color-mix(in srgb, var(--accent) 13%, #fff);
      --accent-tint: color-mix(in srgb, var(--accent) 7%, #fff);
      --accent-line: color-mix(in srgb, var(--accent) 26%, #fff);
      --accent-ink:  color-mix(in srgb, var(--accent) 52%, #000);
      --ink:#251f17; --muted:#6e6457;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; color:var(--ink); line-height:1.8;
      background:color-mix(in srgb, var(--accent) 88%, #000); }
    /* subtle diagonal stripes on dark bg */
    .stage { min-height:100vh; padding:54px 18px 70px;
      background:repeating-linear-gradient(-45deg,
        color-mix(in srgb, #fff 4%, transparent) 0 14px, transparent 14px 28px); }
    .wrap { max-width:560px; margin:0 auto; }

    .top { text-align:center; color:#fff; margin-bottom:30px; }
    .top .limited { display:inline-block; background:#fff; color:var(--accent-deep); font-weight:800; font-size:12.5px;
      letter-spacing:.18em; padding:7px 22px; border-radius:999px; margin-bottom:18px;
      animation:blink 1.6s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.55; } }
    .top h1 { font-size:clamp(27px, 6vw, 38px); margin:0 0 12px; line-height:1.4; font-weight:800;
      text-shadow:0 3px 14px color-mix(in srgb, #000 35%, transparent); }
    .top p { margin:0; opacity:.94; font-size:15px; }

    /* ===== Coupon card ===== */
    .coupon { background:#fff; border-radius:20px; padding:36px 30px 30px; text-align:center; position:relative;
      box-shadow:0 24px 60px color-mix(in srgb, #000 35%, transparent); margin-bottom:26px; }
    .coupon::before, .coupon::after { content:""; position:absolute; width:34px; height:34px; border-radius:50%;
      background:color-mix(in srgb, var(--accent) 88%, #000); top:50%; margin-top:-17px; }
    .coupon::before { left:-17px; }
    .coupon::after { right:-17px; }
    .off { font-size:clamp(56px, 15vw, 84px); font-weight:800; line-height:1;
      background:linear-gradient(135deg, var(--accent), var(--accent-dark));
      -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:-.02em; }
    .off small { font-size:.42em; font-weight:800; }
    .off-sub { font-weight:800; color:var(--accent-ink); margin:6px 0 22px; font-size:16px; }
    .code { border:2.5px dashed var(--accent); border-radius:12px; background:var(--accent-tint);
      padding:14px 10px; margin:0 auto 8px; max-width:340px; }
    .code .lbl { display:block; font-size:11px; font-weight:800; letter-spacing:.22em; color:var(--accent-deep); }
    .code .val { font-size:27px; font-weight:800; letter-spacing:.3em; color:var(--accent-ink); font-family:Consolas,Menlo,monospace; }
    .deadline { font-size:12.5px; color:var(--muted); margin:10px 0 0; }
    .deadline b { color:var(--accent-deep); }

    /* ===== How to ===== */
    .how { background:color-mix(in srgb, #fff 94%, var(--accent)); border-radius:18px; padding:26px 26px; margin-bottom:26px; }
    .how h2 { margin:0 0 14px; font-size:15px; color:var(--accent-ink); text-align:center; letter-spacing:.08em; }
    .how ol { margin:0; padding:0; list-style:none; counter-reset:s; }
    .how li { counter-increment:s; display:flex; gap:13px; align-items:flex-start; padding:9px 0; font-size:14px;
      border-bottom:1px dashed var(--accent-line); }
    .how li:last-child { border-bottom:0; }
    .how li::before { content:counter(s); flex:none; width:25px; height:25px; border-radius:50%;
      background:linear-gradient(135deg, var(--accent), var(--accent-dark)); color:#fff; font-weight:800;
      font-size:13px; display:grid; place-items:center; margin-top:3px; }

    /* ===== Form ===== */
    .get { background:#fff; border-radius:20px; padding:34px 28px;
      box-shadow:0 18px 48px color-mix(in srgb, #000 30%, transparent); }
    .get .t { text-align:center; font-weight:800; font-size:18px; margin:0 0 4px; color:var(--accent-ink); }
    .get .s { text-align:center; font-size:13px; color:var(--muted); margin:0 0 22px; }
    form p { margin:0 0 14px; }
    form label { font-weight:700; font-size:13px; display:block; margin-bottom:4px; }
    form input[type=text], form input[type=email], form input[type=tel], form select, form textarea {
      width:100%; padding:13px 14px; border:1.5px solid var(--accent-line); border-radius:10px; font-size:14px;
      font-family:inherit; transition:border-color .15s, box-shadow .15s; }
    form input:focus, form select:focus, form textarea:focus { outline:none; border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-soft); }
    form textarea { min-height:100px; resize:vertical; }
    .submit input, form button { width:100%; border:0; cursor:pointer; color:#fff; font-weight:800; font-size:16px;
      padding:16px; border-radius:12px; font-family:inherit;
      background:linear-gradient(135deg, var(--accent), var(--accent-dark));
      box-shadow:0 10px 26px color-mix(in srgb, var(--accent-deep) 45%, transparent); }
    form .row { display:flex; gap:13px; }
    form .row > * { flex:1; }
    @media (max-width:480px){ form .row { flex-direction:column; gap:0; } }

    .cta-wrap { text-align:center; margin:26px 0 0; }
    .btn { display:inline-block; background:#fff; color:var(--accent-deep); font-weight:800; font-size:16px;
      padding:16px 54px; border-radius:999px; text-decoration:none; cursor:pointer;
      box-shadow:0 14px 32px color-mix(in srgb, #000 32%, transparent); }
    .foot { text-align:center; color:color-mix(in srgb, #fff 75%, var(--accent)); font-size:11.5px; margin-top:26px; }
    @media (max-width:520px){ .coupon { padding:28px 18px 24px; } .get, .how { padding:24px 18px; } }
  </style>
</head>
<body>
  <div class="stage">
    <div class="wrap">
      <header class="top">
        <span class="limited">期間限定オファー</span>
        <h1>%%title%%</h1>
        <p>%%description%%</p>
      </header>

      <section class="coupon">
        <div class="off">20<small>%</small><small> OFF</small></div>
        <p class="off-sub">いまだけの特別割引クーポン</p>
        <div class="code">
          <span class="lbl">COUPON CODE</span>
          <span class="val">SPECIAL20</span>
        </div>
        <p class="deadline">有効期限: <b>2026年7月31日(金) まで</b> ／ お一人さま1回限り</p>
      </section>

      <section class="how">
        <h2>ご利用方法</h2>
        <ol>
          <li>下のフォームからクーポンを受け取る</li>
          <li>届いたメールのクーポンコードを控える</li>
          <li>お会計時にコードをご提示・ご入力ください</li>
        </ol>
      </section>

      <section class="get">
        <p class="t">クーポンを受け取る</p>
        <p class="s">メールアドレスをご登録いただくと、クーポンをお送りします。</p>
        %%content%%
      </section>

      <div class="cta-wrap">
        <a class="btn" href="#">%%cta%%</a>
      </div>
      <p class="foot">※ 本クーポンは他の割引・キャンペーンとの併用はできません。</p>
    </div>
  </div>
</body>
</html>
